openapi: 3.0.3
info:
  title: Simulation BT Agent Frontend-Backend API
  version: 1.0.0
  description: |
    Frontend-facing API of the simulation BT agent window in AS KODA.

    This contract is intentionally limited to the browser boundary:
    - frontend does not work with RAIN directly;
    - frontend does not receive OTT, mTLS details, internal RAIN URLs, or run_id;
    - session_id is an opaque token managed by backend;
    - message history is loaded page by page with cursor-based backward pagination;
    - history_changed is not part of the frontend/backend API;
    - user message is limited to 3000 characters.
tags:
  - name: Dialog Session
  - name: Agent Status
  - name: Dialog History
paths:
  /dialog/session:
    post:
      tags: [Dialog Session]
      operationId: openDialogSession
      summary: Create, continue, or reset a dialog UI session
      description: |
        If session_id is omitted, backend creates a new empty UI session.
        This call does not invoke RAIN chat processing.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: Session opened or restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DialogSessionView'
              example:
                session_id: sess-7f7d2d4e-5b6f-4a38-9e13-7c1b8a7d0011
                can_send_message: true
                dialog_status: idle
                error: null
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/SessionNotFound'
  /dialog/agent/status:
    get:
      tags: [Agent Status]
      operationId: getAgentStatus
      summary: Get normalized agent availability status
      responses:
        '200':
          description: Normalized agent status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentStatusResponse'
              example:
                status: ready
                liveness: alive
                readiness: ready
                checked_at: '2026-05-04T10:15:04+03:00'
                reason: null
        '403':
          $ref: '#/components/responses/AccessDenied'
  /dialog/message:
    post:
      tags: [Dialog Session]
      operationId: sendDialogMessage
      summary: Send a user message to the agent
      description: |
        Starts asynchronous processing of one user message.
        Backend returns quickly and does not wait for the full agent answer.
        Frontend never receives run_id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
            example:
              session_id: sess-7f7d2d4e-5b6f-4a38-9e13-7c1b8a7d0011
              message: Сформируй БТ для текущей симуляции.
              simulation_id: SIM-CC-148
              mode: bt_creation
      responses:
        '202':
          description: Message accepted, asynchronous processing started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DialogSessionView'
              example:
                session_id: sess-7f7d2d4e-5b6f-4a38-9e13-7c1b8a7d0011
                can_send_message: false
                dialog_status: queued
                error: null
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/SessionNotFound'
        '409':
          $ref: '#/components/responses/RunInProgress'
        '503':
          $ref: '#/components/responses/AgentNotReady'
  /dialog/status:
    get:
      tags: [Dialog Session]
      operationId: getDialogStatus
      summary: Get session-level dialog status
      description: |
        Frontend polls this endpoint while dialog_status is queued or running.
        The response does not include run_id or history_changed.
      parameters:
        - name: session_id
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SessionId'
      responses:
        '200':
          description: Current state of the dialog session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DialogSessionView'
              example:
                session_id: sess-7f7d2d4e-5b6f-4a38-9e13-7c1b8a7d0011
                can_send_message: true
                dialog_status: succeeded
                error: null
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/SessionNotFound'
  /dialog/messages:
    get:
      tags: [Dialog History]
      operationId: getDialogMessages
      summary: Get one page of dialog history
      description: |
        Latest page is requested without before.
        Older history is requested with before=<older_cursor>.
      parameters:
        - name: session_id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/SessionId'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: before
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Cursor'
      responses:
        '200':
          description: Page of dialog history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DialogMessagesPage'
              example:
                items:
                  - message_id: msg-181
                    role: user
                    content: Сообщение 181
                    created_at: '2026-05-04T10:00:01+03:00'
                  - message_id: msg-182
                    role: assistant
                    content: Ответ 182
                    created_at: '2026-05-04T10:00:05+03:00'
                older_cursor: cur_older_180_7YpQaL
                has_more_before: true
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/SessionNotFound'
components:
  schemas:
    SessionId:
      type: string
      minLength: 1
      example: sess-7f7d2d4e-5b6f-4a38-9e13-7c1b8a7d0011
    Cursor:
      type: string
      minLength: 1
      example: cur_older_180_7YpQaL
    DialogStatus:
      type: string
      enum: [idle, queued, running, succeeded, failed, timeout, cancelled]
    AgentStatus:
      type: string
      enum: [ready, not_ready, unavailable, unknown]
    CreateSessionRequest:
      type: object
      additionalProperties: false
      properties:
        session_id:
          allOf:
            - $ref: '#/components/schemas/SessionId'
          nullable: true
    SendMessageMode:
      type: string
      enum: [consultation, bt_creation]
    SendMessageRequest:
      type: object
      additionalProperties: false
      required: [message]
      properties:
        session_id:
          allOf:
            - $ref: '#/components/schemas/SessionId'
          nullable: true
        message:
          type: string
          minLength: 1
          maxLength: 3000
        simulation_id:
          type: string
          nullable: true
        mode:
          allOf:
            - $ref: '#/components/schemas/SendMessageMode'
          nullable: true
          default: consultation
    DialogError:
      type: object
      additionalProperties: false
      description: |
        Frontend-facing safe error object.
        Frontend reads the machine-readable code from error.code in HTTP error responses
        and from DialogSessionView.error.code for terminal failed/timeout states.
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable code used by frontend UI mapping, telemetry and diagnostics.
        message:
          type: string
          description: Safe user-facing or near-user-facing text without internal RAIN details.
        retryable:
          type: boolean
          nullable: true
    ApiErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/DialogError'
    DialogSessionView:
      type: object
      additionalProperties: false
      required: [session_id, can_send_message, dialog_status]
      properties:
        session_id:
          $ref: '#/components/schemas/SessionId'
        can_send_message:
          type: boolean
        dialog_status:
          $ref: '#/components/schemas/DialogStatus'
        error:
          allOf:
            - $ref: '#/components/schemas/DialogError'
          nullable: true
    AgentStatusResponse:
      type: object
      additionalProperties: false
      required: [status, checked_at]
      properties:
        status:
          $ref: '#/components/schemas/AgentStatus'
        liveness:
          type: string
          nullable: true
        readiness:
          type: string
          nullable: true
        checked_at:
          type: string
          format: date-time
        reason:
          type: string
          nullable: true
    DialogMessageRole:
      type: string
      enum: [user, assistant, system]
    DialogMessage:
      type: object
      additionalProperties: false
      required: [message_id, role, content, created_at]
      properties:
        message_id:
          type: string
        role:
          $ref: '#/components/schemas/DialogMessageRole'
        content:
          type: string
        created_at:
          type: string
          format: date-time
    DialogMessagesPage:
      type: object
      additionalProperties: false
      required: [items, older_cursor, has_more_before]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DialogMessage'
        older_cursor:
          allOf:
            - $ref: '#/components/schemas/Cursor'
          nullable: true
        has_more_before:
          type: boolean
  responses:
    InvalidRequest:
      description: Validation or request-shape error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    AccessDenied:
      description: The user is authenticated but not allowed to access the requested data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    SessionNotFound:
      description: Session token not found or not owned by the current user
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    RunInProgress:
      description: Another message is already being processed in this session
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    AgentNotReady:
      description: The agent is currently not ready to accept a new message
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
