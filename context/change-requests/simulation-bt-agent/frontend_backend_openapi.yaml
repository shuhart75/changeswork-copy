openapi: 3.0.3
info:
  title: Simulation BT Agent Frontend-Backend API
  version: 1.0.0
  description: |
    Frontend-facing API of the simulation BT agent window in AS KODA.

    This contract is intentionally limited to the browser boundary:
    - frontend does not work with RAIN directly;
    - frontend does not receive OTT, mTLS details, internal RAIN URLs, or run_id;
    - session_id is an opaque token managed by backend;
    - message history is loaded page by page with cursor-based backward pagination.
    - history_changed is derived only against known_sync_cursor supplied by frontend.
    - user message is limited to 3000 characters.

    Source of truth:
    - features/simulation-bt-agent/requirements.md
    - features/simulation-bt-agent/slices/agent-entrypoint/requirements/backend.md
    - features/simulation-bt-agent/slices/dialog-session/requirements/backend.md
    - features/simulation-bt-agent/slices/bt-publication/requirements/backend.md
tags:
  - name: Dialog Session
    description: Create, continue, reset, and inspect agent UI sessions.
  - name: Agent Status
    description: Read normalized readiness of the RAIN agent through AS KODA backend.
  - name: Dialog History
    description: Load dialog history pages for the agent panel.
paths:
  /dialog/session:
    post:
      tags: [Dialog Session]
      operationId: openDialogSession
      summary: Create, continue, or reset a dialog UI session
      description: |
        Opens or restores the agent UI session for the current authenticated user.

        Rules:
        - if session_id is omitted, backend creates a new empty UI session;
        - if session_id is provided, backend restores that session for the current user;
        - this call does not invoke RAIN chat processing.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
            examples:
              create_new:
                summary: Create a new empty session
                value: {}
              continue_existing:
                summary: Continue an existing session
                value:
                  session_id: sess-7f7d2d4e-5b6f-4a38-9e13-7c1b8a7d0011
      responses:
        '200':
          description: Session opened or restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DialogSessionView'
              examples:
                idle_session:
                  summary: New session
                  value:
                    session_id: sess-7f7d2d4e-5b6f-4a38-9e13-7c1b8a7d0011
                    can_send_message: true
                    dialog_status: idle
                    error: null
                running_session:
                  summary: Existing session with active processing
                  value:
                    session_id: sess-7f7d2d4e-5b6f-4a38-9e13-7c1b8a7d0011
                    can_send_message: false
                    dialog_status: running
                    error: null
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/SessionNotFound'
  /dialog/agent/status:
    get:
      tags: [Agent Status]
      operationId: getAgentStatus
      summary: Get normalized agent availability status
      description: |
        Returns the normalized agent status for the frontend status chip.

        Backend aggregates RAIN liveness/readiness checks and hides all internal
        transport details from the browser.
      responses:
        '200':
          description: Normalized agent status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentStatusResponse'
              examples:
                ready:
                  value:
                    status: ready
                    liveness: alive
                    readiness: ready
                    checked_at: '2026-05-04T10:15:04+03:00'
                    reason: null
                not_ready:
                  value:
                    status: not_ready
                    liveness: alive
                    readiness: not_ready
                    checked_at: '2026-05-04T10:15:04+03:00'
                    reason: model_initializing
                unavailable:
                  value:
                    status: unavailable
                    liveness: null
                    readiness: null
                    checked_at: '2026-05-04T10:15:04+03:00'
                    reason: health_check_timeout
        '403':
          $ref: '#/components/responses/AccessDenied'
  /dialog/message:
    post:
      tags: [Dialog Session]
      operationId: sendDialogMessage
      summary: Send a user message to the agent
      description: |
        Starts asynchronous processing of one user message.

        Rules:
        - backend returns quickly and does not wait for the full agent answer;
        - if session_id is omitted, backend creates a new UI session first;
        - frontend never receives run_id;
        - if mode is bt_creation, simulation_id must be provided and backend
          validates the simulation context before calling RAIN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
            examples:
              consultation:
                summary: Plain consultation message
                value:
                  session_id: sess-7f7d2d4e-5b6f-4a38-9e13-7c1b8a7d0011
                  message: Подскажи, что изменилось по этой симуляции.
                  mode: consultation
              bt_creation:
                summary: BT creation message
                value:
                  session_id: sess-7f7d2d4e-5b6f-4a38-9e13-7c1b8a7d0011
                  message: Сформируй БТ для текущей симуляции.
                  simulation_id: SIM-CC-148
                  mode: bt_creation
      responses:
        '202':
          description: Message accepted, asynchronous processing started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DialogSessionView'
              examples:
                queued:
                  value:
                    session_id: sess-7f7d2d4e-5b6f-4a38-9e13-7c1b8a7d0011
                    can_send_message: false
                    dialog_status: queued
                    error: null
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/SessionNotFound'
        '409':
          $ref: '#/components/responses/RunInProgress'
        '503':
          $ref: '#/components/responses/AgentNotReady'
  /dialog/status:
    get:
      tags: [Dialog Session]
      operationId: getDialogStatus
      summary: Get session-level dialog status
      description: |
        Returns the current frontend-facing state of the dialog session.

        Rules:
        - frontend polls this endpoint while dialog_status is queued or running;
        - frontend does not see current run details or run_id;
        - backend derives history_changed only when frontend sends known_sync_cursor;
        - if session_id is omitted, backend creates a new empty UI session and
          returns dialog_status=idle.
      parameters:
        - name: session_id
          in: query
          required: false
          description: Opaque backend-managed session token.
          schema:
            $ref: '#/components/schemas/SessionId'
        - name: known_sync_cursor
          in: query
          required: false
          description: Opaque sync cursor from the latest GET /dialog/messages response.
          schema:
            $ref: '#/components/schemas/Cursor'
      responses:
        '200':
          description: Current state of the dialog session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DialogSessionView'
              examples:
                idle:
                  value:
                    session_id: sess-7f7d2d4e-5b6f-4a38-9e13-7c1b8a7d0011
                    can_send_message: true
                    dialog_status: idle
                    error: null
                running:
                  value:
                    session_id: sess-7f7d2d4e-5b6f-4a38-9e13-7c1b8a7d0011
                    can_send_message: false
                    dialog_status: running
                    history_changed: false
                    error: null
                succeeded:
                  value:
                    session_id: sess-7f7d2d4e-5b6f-4a38-9e13-7c1b8a7d0011
                    can_send_message: true
                    dialog_status: succeeded
                    history_changed: true
                    error: null
                failed:
                  value:
                    session_id: sess-7f7d2d4e-5b6f-4a38-9e13-7c1b8a7d0011
                    can_send_message: true
                    dialog_status: failed
                    error:
                      code: agent_error
                      message: Не удалось получить ответ агента.
                      retryable: true
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/SessionNotFound'
  /dialog/messages:
    get:
      tags: [Dialog History]
      operationId: getDialogMessages
      summary: Get one page of dialog history
      description: |
        Returns one stable page of dialog messages in chronological order.

        Pagination rules:
        - the latest page is requested without before;
        - older history is requested with before=<older_cursor>;
        - older_cursor is an opaque token and must not be interpreted by frontend;
        - frontend should not request the full history at once.
      parameters:
        - name: session_id
          in: query
          required: true
          description: Opaque backend-managed session token.
          schema:
            $ref: '#/components/schemas/SessionId'
        - name: limit
          in: query
          required: false
          description: Number of messages to return.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: before
          in: query
          required: false
          description: Opaque cursor for loading earlier messages.
          schema:
            $ref: '#/components/schemas/Cursor'
      responses:
        '200':
          description: Page of dialog history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DialogMessagesPage'
              examples:
                latest_page:
                  summary: Latest messages
                  value:
                    items:
                      - message_id: msg-181
                        role: user
                        content: Сообщение 181
                        created_at: '2026-05-04T10:00:01+03:00'
                      - message_id: msg-182
                        role: assistant
                        content: Ответ 182
                        created_at: '2026-05-04T10:00:05+03:00'
                      - message_id: msg-200
                        role: assistant
                        content: Ответ 200
                        created_at: '2026-05-04T10:09:07+03:00'
                    older_cursor: cur_older_180_7YpQaL
                    sync_cursor: cur_sync_200_Gh8nPx
                    last_message_id: msg-200
                    last_message_seq: 200
                    history_version: hv-20260504-000200
                    has_more_before: true
                older_page:
                  summary: Earlier messages loaded with before cursor
                  value:
                    items:
                      - message_id: msg-161
                        role: user
                        content: Сообщение 161
                        created_at: '2026-05-04T09:50:01+03:00'
                      - message_id: msg-162
                        role: assistant
                        content: Ответ 162
                        created_at: '2026-05-04T09:50:06+03:00'
                      - message_id: msg-180
                        role: assistant
                        content: Ответ 180
                        created_at: '2026-05-04T09:59:06+03:00'
                    older_cursor: cur_older_160_aB91Zm
                    sync_cursor: cur_sync_200_Gh8nPx
                    last_message_id: msg-200
                    last_message_seq: 200
                    history_version: hv-20260504-000200
                    has_more_before: true
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/SessionNotFound'
components:
  schemas:
    SessionId:
      type: string
      description: Opaque backend-managed UI session token.
      minLength: 1
      example: sess-7f7d2d4e-5b6f-4a38-9e13-7c1b8a7d0011
    Cursor:
      type: string
      description: Opaque cursor for backward pagination or sync checks.
      minLength: 1
      example: cur_older_180_7YpQaL
    DialogStatus:
      type: string
      description: Frontend-facing dialog processing status.
      enum:
        - idle
        - queued
        - running
        - succeeded
        - failed
        - timeout
        - cancelled
    AgentStatus:
      type: string
      description: Normalized frontend-facing agent availability status.
      enum:
        - ready
        - not_ready
        - unavailable
        - unknown
    CreateSessionRequest:
      type: object
      additionalProperties: false
      properties:
        session_id:
          allOf:
            - $ref: '#/components/schemas/SessionId'
          nullable: true
          description: |
            Existing UI session token. If omitted or null, backend creates a new
            empty session and treats the call as reset/new-session.
    SendMessageMode:
      type: string
      description: Requested message processing mode.
      enum:
        - consultation
        - bt_creation
    SendMessageRequest:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        session_id:
          allOf:
            - $ref: '#/components/schemas/SessionId'
          nullable: true
          description: |
            Existing UI session token. If omitted or null, backend creates a new
            session before sending the message.
        message:
          type: string
          minLength: 1
          maxLength: 3000
          description: User message text.
          example: Сформируй БТ для текущей симуляции.
        simulation_id:
          type: string
          nullable: true
          description: |
            Simulation identifier. Required when mode=bt_creation.
          example: SIM-CC-148
        mode:
          allOf:
            - $ref: '#/components/schemas/SendMessageMode'
          nullable: true
          default: consultation
    DialogError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: |
            Stable machine-readable error code.
            Expected values include invalid_session_id_format, message_empty,
            message_too_long, simulation_context_required,
            simulation_not_eligible, invalid_cursor, access_denied,
            session_not_found, run_in_progress, agent_not_ready, agent_error.
          example: message_too_long
        message:
          type: string
          description: Safe user-facing error message.
        retryable:
          type: boolean
          nullable: true
          description: Whether retry may be offered to the user.
    ApiErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/DialogError'
    DialogSessionView:
      type: object
      additionalProperties: false
      required:
        - session_id
        - can_send_message
        - dialog_status
      properties:
        session_id:
          $ref: '#/components/schemas/SessionId'
        can_send_message:
          type: boolean
          description: |
            Whether the composer and inline actions are currently available.
        dialog_status:
          $ref: '#/components/schemas/DialogStatus'
        history_changed:
          type: boolean
          nullable: true
          description: |
            Present only when frontend supplied known_sync_cursor. True means the
            dialog history changed after that cursor; false means backend checked
            the cursor and found no newer messages.
        error:
          allOf:
            - $ref: '#/components/schemas/DialogError'
          nullable: true
          description: Optional safe error for terminal failed/timeout states.
    AgentStatusResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - checked_at
      properties:
        status:
          $ref: '#/components/schemas/AgentStatus'
        liveness:
          type: string
          nullable: true
          description: Raw liveness signal normalized by backend for diagnostics only.
          example: alive
        readiness:
          type: string
          nullable: true
          description: Raw readiness signal normalized by backend for diagnostics only.
          example: ready
        checked_at:
          type: string
          format: date-time
          description: Timestamp of the latest backend health check used for this response.
        reason:
          type: string
          nullable: true
          description: Optional safe reason for non-ready status.
          example: model_initializing
    DialogMessageRole:
      type: string
      enum:
        - user
        - assistant
        - system
    DialogMessage:
      type: object
      additionalProperties: false
      required:
        - message_id
        - role
        - content
        - created_at
      properties:
        message_id:
          type: string
          description: Opaque message identifier.
          example: msg-181
        role:
          $ref: '#/components/schemas/DialogMessageRole'
        content:
          type: string
          description: Message text shown in the dialog history.
        created_at:
          type: string
          format: date-time
          description: Message creation timestamp.
    DialogMessagesPage:
      type: object
      additionalProperties: false
      required:
        - items
        - older_cursor
        - sync_cursor
        - has_more_before
      properties:
        items:
          type: array
          description: Messages in chronological order within the returned page.
          items:
            $ref: '#/components/schemas/DialogMessage'
        older_cursor:
          allOf:
            - $ref: '#/components/schemas/Cursor'
          nullable: true
          description: Cursor for loading earlier messages, null when there is no older page.
        has_more_before:
          type: boolean
          description: Whether more earlier messages exist before this page.
        sync_cursor:
          allOf:
            - $ref: '#/components/schemas/Cursor'
          description: Cursor that represents the latest known history tail.
        last_message_id:
          type: string
          nullable: true
          description: Latest message id known to RAIN for this session.
        last_message_seq:
          type: integer
          nullable: true
          description: Latest message sequence, diagnostic/sync marker only.
        history_version:
          type: string
          nullable: true
          description: RAIN history version, diagnostic/sync marker only.
  responses:
    InvalidRequest:
      description: Validation or request-shape error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            invalid_session_id:
              value:
                error:
                  code: invalid_session_id_format
                  message: Некорректный идентификатор сессии.
                  retryable: false
            message_too_long:
              value:
                error:
                  code: message_too_long
                  message: Текст сообщения превышает допустимую длину.
                  retryable: false
            invalid_cursor:
              value:
                error:
                  code: invalid_cursor
                  message: Некорректный курсор истории.
                  retryable: false
    AccessDenied:
      description: The user is authenticated but not allowed to access the requested data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            default:
              value:
                error:
                  code: access_denied
                  message: Недостаточно прав для выполнения операции.
                  retryable: false
    SessionNotFound:
      description: Session token not found or not owned by the current user
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            default:
              value:
                error:
                  code: session_not_found
                  message: Сессия не найдена или недоступна.
                  retryable: false
    RunInProgress:
      description: Another message is already being processed in this session
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            default:
              value:
                error:
                  code: run_in_progress
                  message: Агент уже обрабатывает предыдущее сообщение.
                  retryable: true
    AgentNotReady:
      description: The agent is currently not ready to accept a new message
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            default:
              value:
                error:
                  code: agent_not_ready
                  message: Агент сейчас не готов принимать сообщения.
                  retryable: true
