<!DOCTYPE html>
<html lang="ru">
<head>

    <style>

            margin: 0;

        }

        .sidebar {

            color: #ffffff;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {

            border-bottom: 1px solid rgba(255, 255, 255, 0.1);

        .sidebar-menu {

<body>
    <div id="root"></div>

    <script type="text/babel">
        const {
            Box, Paper, Typography, Button, Tabs, Tab, Stack, Chip, Checkbox,
            Dialog, DialogTitle, DialogContent, DialogActions, TextField,
            Select, MenuItem, FormControl, InputLabel, IconButton, Alert,
            Table, TableBody, TableCell, TableContainer, TableHead, TableRow, Divider
        } = MaterialUI;
        const { useState } = React;

        // Helper functions
        const getStatusLabel = (status) => {
            const labels = {
                requires_ratification: 'Требует утверждения',
                in_approval: 'На согласовании',
                in_ratification: 'На утверждении',
                rejected: 'Отклонено',
                approved: 'Одобрено',
            };
            return labels[status] || status;
        };

        const getCriticalityStyles = (criticality) => {
            if (criticality === 'high') {
                return { bgcolor: '#ffebee', color: '#c62828' };
            }
            if (criticality === 'low') {
                return { bgcolor: '#e8f5e9', color: '#2e7d32' };
            }
            return { bgcolor: '#f5f5f5', color: '#616161' };
        };

        const getCriticalityLabel = (criticality) => {
            const labels = {
                high: 'высокая',
                low: 'низкая',
            };
            return labels[criticality] || 'низкая';
        };

        const getEntityCriticality = (entity) => {
            const scorecards = getScorecardsForEntity(entity);
            if (scorecards.length === 0) return null;
            return scorecards.some(scorecard => scorecard.criticality === 'high') ? 'high' : 'low';
        };

        const getScorecardById = (scorecardId) =>
            mockScorecards.find(scorecard => scorecard.id === scorecardId);

        const getScorecardsForEntity = (entity) =>
            (entity.scorecards || []).map(getScorecardById).filter(Boolean);

        // Mock data
        const products = [
            { id: 'credit_cards', label: 'Кредитные карты' },
            { id: 'auto', label: 'Автокредитование' },
            { id: 'consumer', label: 'Потребительские кредиты' }
        ];

        const mockDeployments = [
            {
                id: 1,
                name: 'Оптимизация риск-стратегии Premium карт',
                product: 'credit_cards',
            },
            {
                id: 2,
                name: 'Новая стратегия для Standard карт',
                product: 'credit_cards',
            },
            {
                id: 3,
                name: 'Исследование новых факторов',
                product: 'credit_cards',
            },
            {
                id: 4,
                name: 'Оптимизация автокредитования',
                product: 'auto',
            },
        ];

        const mockScorecards = [
            { id: 1, name: 'Скоркарта Premium v2.3', product: 'credit_cards', criticality: 'low' },
            { id: 2, name: 'Скоркарта Premium v2.4', product: 'credit_cards', criticality: 'high' },
            { id: 3, name: 'Скоркарта Standard лимиты v1.0', product: 'credit_cards', criticality: 'low' },
            { id: 4, name: 'Скоркарта Gold сегмент v1.0', product: 'credit_cards', criticality: 'high' },
            { id: 5, name: 'Скоркарта Антифрод v1.0', product: 'credit_cards', criticality: 'high' },
            { id: 6, name: 'Скоркарта Mass ставки v1.0', product: 'credit_cards', criticality: 'low' },
            { id: 7, name: 'Скоркарта Classic условия v1.0', product: 'credit_cards', criticality: 'low' },
            { id: 8, name: 'Скоркарта Auto Express v1.0', product: 'auto', criticality: 'high' },
        ];

        const mockPilots = [
            {
                id: 1,
                deploymentId: 1,
                name: 'Пилот Premium Q1 2026',
                product: 'credit_cards',
                status: 'requires_ratification',
                createdAt: '2026-02-01',
                scorecards: [1, 2],
                ratifierName: null
            },
            {
                id: 2,
                deploymentId: 2,
                name: 'Пилот Standard лимиты',
                product: 'credit_cards',
                status: 'requires_ratification',
                createdAt: '2026-02-15',

                ratifierName: 'Козлов Дмитрий Викторович'
            },

        const mockChanges = [
            {

                deploymentId: 1,
                name: 'Внедрение новой скоркарты Premium',
                product: 'credit_cards',
                status: 'requires_ratification',
                createdAt: '2026-02-01',

            {
                id: 2,

                name: 'Изменение лимитов Standard',
                product: 'credit_cards',
                status: 'requires_ratification',
                createdAt: '2026-02-15',
                scorecards: [3],
                ratifierName: 'Морозова Елена Игоревна'
            },
            {
                id: 3,

                name: 'Обновление антифрод правил',
                product: 'credit_cards',
                status: 'in_approval',
                createdAt: '2026-02-18',
                scorecards: [5],

        ];

        const mockRatifiers = [

            { id: 5, name: 'Морозова Елена Игоревна', role: 'Руководитель департамента' },

        ];

        // Component: CriticalityChip
        function CriticalityChip({ criticality, size = 'small', prefix = 'Критичность' }) {
            const styles = getCriticalityStyles(criticality);
            const prefixWithSeparator = prefix ? `${prefix}: ` : '';
            const label = criticality
                ? `${prefixWithSeparator}${getCriticalityLabel(criticality)}`
                : `${prefixWithSeparator}не рассчитана`;

            return (
                <Chip
                    label={label}
                    size={size}
                    sx={{
                        bgcolor: styles.bgcolor,
                        color: styles.color,
                        fontWeight: 500
                    }}
                />
            );
        }

        // Component: ScorecardLinks
        function ScorecardLinks({ entity, maxItems = 3, onSelectScorecard }) {
            const scorecards = getScorecardsForEntity(entity);

            if (scorecards.length === 0) {
                return (
                    <Typography variant="caption" color="text.secondary" sx={{ display: 'block', mt: 0.5 }}>
                        Скоркарты: не привязаны
                    </Typography>
                );
            }

            return (
                <Stack direction="row" spacing={0.5} flexWrap="wrap" useFlexGap sx={{ mt: 0.5 }}>
                    {scorecards.slice(0, maxItems).map(scorecard => {
                        const styles = getCriticalityStyles(scorecard.criticality);
                        return (
                            <Chip
                                key={scorecard.id}
                                size="small"
                                label={`SC-${scorecard.id} • ${scorecard.name} • ${getCriticalityLabel(scorecard.criticality)}`}
                                onClick={onSelectScorecard ? () => onSelectScorecard(scorecard) : undefined}
                                sx={{
                                    bgcolor: styles.bgcolor,
                                    color: styles.color,
                                    fontWeight: 500,
                                    cursor: onSelectScorecard ? 'pointer' : 'default',
                                    '&:hover': onSelectScorecard ? { opacity: 0.8 } : {}
                                }}
                            />
                        );
                    })}
                    {scorecards.length > maxItems && (
                        <Typography variant="caption" color="text.secondary" sx={{ alignSelf: 'center' }}>
                            +{scorecards.length - maxItems} ещё
                        </Typography>
                    )}
                </Stack>
            );
        }

        // Component: EntityScorecardBlock
        function EntityScorecardBlock({ entity, maxItems = 3, onSelectScorecard }) {
            const criticality = getEntityCriticality(entity);

            return (
                <Box sx={{ mt: 0.75 }}>
                    <Stack direction="row" spacing={1} flexWrap="wrap" useFlexGap>
                        <CriticalityChip criticality={criticality} size="small" />
                    </Stack>
                    <ScorecardLinks entity={entity} maxItems={maxItems} onSelectScorecard={onSelectScorecard} />
                </Box>
            );
        }

        // Component: RatificationRouteDialog
        function RatificationRouteDialog({ open, onClose, items, onSubmit }) {
            const [ratifier, setRatifier] = useState('');

            const handleSubmit = () => {
                if (!ratifier) {
                    alert('Выберите утверждающего');
                    return;
                }

                onSubmit({
                    stages: [],
                    ratifier,
                    autoRatification: false
                });
            };

            return (
                <Dialog open={open} onClose={onClose} maxWidth="md" fullWidth>
                    <DialogTitle sx={{ borderBottom: '1px solid #e0e0e0', pb: 2 }}>
                        <Box sx={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <Typography variant="h6" sx={{ fontWeight: 500 }}>
                                Настройка маршрута утверждения
                            </Typography>
                            <IconButton onClick={onClose} size="small">
                                <span className="material-icons">close</span>
                            </IconButton>
                        </Box>
                    </DialogTitle>
                    <DialogContent sx={{ p: 3 }}>
                        <Alert severity="info" sx={{ mb: 3 }}>
                            Отправка на утверждение: <strong>{items.length}</strong> элемент(ов)
                        </Alert>

                        <Paper sx={{ p: 3, border: '2px solid #4caf50', bgcolor: '#f1f8f4' }}>
                            <Typography variant="h6" sx={{ fontWeight: 500, mb: 1 }}>
                                Этап утверждения
                            </Typography>
                            <Typography variant="body2" color="text.secondary" sx={{ mb: 2 }}>
                                Выберите утверждающего для выбранных элементов.
                            </Typography>

                            <FormControl fullWidth size="small">
                                <InputLabel>Утверждающий</InputLabel>
                                <Select
                                    value={ratifier}
                                    onChange={(e) => setRatifier(e.target.value)}
                                    label="Утверждающий"
                                >
                                    <MenuItem value="">Не выбрано</MenuItem>
                                    {mockRatifiers.map(user => (
                                        <MenuItem key={user.id} value={user.id}>
                                            {user.name} ({user.role})
                                        </MenuItem>
                                    ))}
                                </Select>
                            </FormControl>
                        </Paper>
                    </DialogContent>
                    <DialogActions sx={{ p: 2, borderTop: '1px solid #e0e0e0' }}>
                        <Button onClick={onClose} variant="outlined">
                            Отмена
                        </Button>
                        <Button
                            onClick={handleSubmit}
                            variant="contained"
                            sx={{ bgcolor: '#2c4f7c', '&:hover': { bgcolor: '#1e3a5f' } }}
                        >
                            Далее: Предпросмотр брифа
                        </Button>
                    </DialogActions>
                </Dialog>
            );
        }

        // Component: MarkdownEditor
        function MarkdownEditor({ value, onChange, placeholder, minHeight = '200px' }) {
            const editorRef = React.useRef(null);
            const instanceRef = React.useRef(null);

            React.useEffect(() => {
                if (editorRef.current && !instanceRef.current) {
                    instanceRef.current = new EasyMDE({
                        element: editorRef.current,
                        placeholder: placeholder || 'Введите текст...',
                        spellChecker: false,
                        status: false,
                        toolbar: [
                            'bold', 'italic', 'heading', '|',
                            'unordered-list', 'ordered-list', '|',
                            'preview', 'side-by-side', 'fullscreen', '|',
                            'guide'
                        ],
                        minHeight: minHeight,
                        initialValue: value || ''
                    });

                    instanceRef.current.codemirror.on('change', () => {
                        const newValue = instanceRef.current.value();
                        if (onChange) {
                            onChange(newValue);
                        }
                    });
                }

                return () => {
                    if (instanceRef.current) {
                        instanceRef.current.toTextArea();
                        instanceRef.current = null;
                    }
                };
            }, []);

            // Update editor value when prop changes
            React.useEffect(() => {
                if (instanceRef.current && value !== instanceRef.current.value()) {
                    instanceRef.current.value(value || '');
                }
            }, [value]);

            return <textarea ref={editorRef} />;
        }

        // Component: BriefPreviewDialog
        function BriefPreviewDialog({ open, onClose, items, route, onSend }) {
            // Generate draft brief based on selected items
            const generateDraftBrief = () => {
                if (items.length === 0) {
                    return {
                        title: 'Прошу утвердить',
                        goal: '',
                        changes: '',
                        scope: ''
                    };
                }

                // Generate title based on first item
                const firstItem = items[0];
                const itemType = firstItem.type === 'pilot' ? 'пилота' : 'внедрения';
                const itemCode = firstItem.type === 'pilot' ? `PLT-${firstItem.id}` : `CHG-${firstItem.id}`;
                const title = `Прошу утвердить активацию ${itemType} ${itemCode} "${firstItem.name}"`;

                // Generate goal (placeholder - in real system would come from item data)
                const goal = `Учёт доходности (NPV) кредитного портфеля при принятии решения о выдаче кредита на основе прогнозной модели по потоку клиентов, обращающихся за кредитными картами в онлайн-канале.`;

                // Generate changes list
                const changesList = [
                    'Обновление весовых коэффициентов факторов скоринговой модели',
                    'Корректировка пороговых значений для сегментов Mass и Premium',
                    'Изменение лимитной политики для клиентов с ПДН > 50%',
                    'Внедрение дополнительных правил верификации для онлайн-канала'
                ];
                const changes = `Проведение пилотного тестирования по следующим направлениям:\n\n${changesList.map(c => `- ${c}`).join('\n')}`;

                // Generate scope based on product
                const productLabels = {
                    'credit_cards': 'Кредитные карты',
                    'auto': 'Автокредитование',
                    'consumer': 'Потребительские кредиты'
                };
                const products = [...new Set(items.map(item => item.product))];
                const scope = products.map(p => productLabels[p] || p).join(', ');

                return { title, goal, changes, scope };
            };

            const [briefData, setBriefData] = useState(generateDraftBrief());

            // Update brief when items change
            React.useEffect(() => {
                if (open) {
                    setBriefData(generateDraftBrief());
                }
            }, [open, items]);

            const handleFieldChange = (field, value) => {
                setBriefData(prev => ({ ...prev, [field]: value }));
            };

            const handleSendBrief = () => {
                onSend(briefData);
            };

            return (
                <Dialog open={open} onClose={onClose} maxWidth="md" fullWidth>
                    <DialogTitle sx={{ borderBottom: '1px solid #e0e0e0', pb: 2 }}>
                        <Box sx={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <Typography variant="h6" sx={{ fontWeight: 500 }}>
                                Формирование брифа на утверждение
                            </Typography>
                            <IconButton onClick={onClose} size="small">
                                <span className="material-icons">close</span>
                            </IconButton>
                        </Box>
                    </DialogTitle>
                    <DialogContent sx={{ p: 3 }}>
                        <Alert severity="info" sx={{ mb: 3 }}>
                            Отредактируйте бриф перед отправкой. Все поля можно изменить.
                        </Alert>

                        <Paper sx={{ p: 3, bgcolor: '#fafafa' }}>
                            <Typography variant="h5" sx={{ mb: 3, fontWeight: 600, color: '#2c4f7c' }}>
                                Бриф
                            </Typography>

                            {/* Title */}
                            <Box sx={{ mb: 3 }}>
                                <TextField
                                    fullWidth
                                    multiline
                                    rows={2}
                                    value={briefData.title}
                                    onChange={(e) => handleFieldChange('title', e.target.value)}
                                    variant="outlined"
                                    sx={{
                                        '& .MuiOutlinedInput-root': {
                                            bgcolor: 'white',
                                            fontSize: '1.1rem',
                                            fontWeight: 500
                                        }
                                    }}
                                />
                            </Box>

                            {/* Goal */}
                            <Box sx={{ mb: 3 }}>
                                <Typography variant="subtitle1" sx={{ mb: 1, fontWeight: 600, color: '#2c4f7c' }}>
                                    Цель
                                </Typography>
                                <Box sx={{ bgcolor: 'white', borderRadius: 1, border: '1px solid #e0e0e0' }}>
                                    <MarkdownEditor
                                        value={briefData.goal}
                                        onChange={(value) => handleFieldChange('goal', value)}
                                        placeholder="Опишите цель утверждения..."
                                        minHeight="150px"
                                    />
                                </Box>
                            </Box>

                            {/* Main Changes */}
                            <Box sx={{ mb: 3 }}>
                                <Typography variant="subtitle1" sx={{ mb: 1, fontWeight: 600, color: '#2c4f7c' }}>
                                    Основные изменения
                                </Typography>
                                <Box sx={{ bgcolor: 'white', borderRadius: 1, border: '1px solid #e0e0e0' }}>
                                    <MarkdownEditor
                                        value={briefData.changes}
                                        onChange={(value) => handleFieldChange('changes', value)}
                                        placeholder="Опишите основные изменения (используйте Markdown для форматирования)..."
                                        minHeight="250px"
                                    />
                                </Box>
                                <Typography variant="caption" color="text.secondary" sx={{ mt: 0.5, display: 'block' }}>
                                    Используйте Markdown: **жирный**, *курсив*, - списки
                                </Typography>
                            </Box>

                            {/* Scope */}
                            <Box sx={{ mb: 2 }}>
                                <Typography variant="subtitle1" sx={{ mb: 1, fontWeight: 600, color: '#2c4f7c' }}>
                                    Периметр применения
                                </Typography>
                                <TextField
                                    fullWidth
                                    multiline
                                    rows={2}
                                    value={briefData.scope}
                                    onChange={(e) => handleFieldChange('scope', e.target.value)}
                                    variant="outlined"
                                    placeholder="Укажите продукты и сегменты..."
                                    sx={{
                                        '& .MuiOutlinedInput-root': {
                                            bgcolor: 'white'
                                        }
                                    }}
                                />
                            </Box>
                        </Paper>

                        {/* Items included */}
                        <Box sx={{ mt: 3 }}>
                            <Typography variant="subtitle2" sx={{ mb: 1, color: '#666' }}>
                                Элементы, включенные в бриф ({items.length}):
                            </Typography>
                            <Stack spacing={0.5}>
                                {items.map((item) => (
                                    <Chip
                                        key={item.id}
                                        label={`${item.type === 'pilot' ? 'PLT' : 'CHG'}-${item.id}: ${item.name}`}
                                        size="small"
                                        sx={{ justifyContent: 'flex-start' }}
                                    />
                                ))}
                            </Stack>
                        </Box>
                    </DialogContent>
                    <DialogActions sx={{ p: 2, borderTop: '1px solid #e0e0e0' }}>
                        <Button onClick={onClose} variant="outlined">
                            Отмена
                        </Button>
                        <Button

                            sx={{ bgcolor: '#2c4f7c', '&:hover': { bgcolor: '#1e3a5f' } }}
                            onClick={handleSendBrief}
                            startIcon={<span className="material-icons">send</span>}
                        >
                            Отправить на утверждение
                        </Button>
                    </DialogActions>
                </Dialog>
            );
        }

        // Main Component: PackagesView
        function PackagesView({ productFilter, onSelectPilot, onSelectChange, onSelectScorecard }) {
            const [activeTab, setActiveTab] = useState(0);
            const [selectedForApproval, setSelectedForApproval] = useState([]);
            const [selectedForRecall, setSelectedForRecall] = useState([]);
            const [approvalDialogOpen, setApprovalDialogOpen] = useState(false);
            const [briefPreviewOpen, setBriefPreviewOpen] = useState(false);
            const [approvalRoute, setApprovalRoute] = useState(null);

            const handleToggleApprovalSelection = (id) => {
                setSelectedForApproval(prev =>
                    prev.includes(id) ? prev.filter(itemId => itemId !== id) : [...prev, id]
                );
            };

            const handleToggleRecallSelection = (id) => {
                setSelectedForRecall(prev =>
                    prev.includes(id) ? prev.filter(itemId => itemId !== id) : [...prev, id]
                );
            };

            const handleSendForApproval = () => {
                setApprovalDialogOpen(true);
            };

            const handleApprovalSubmit = (route) => {
                setApprovalRoute(route);
                setApprovalDialogOpen(false);
                setBriefPreviewOpen(true);
            };

            const handleBriefSend = (briefData) => {
                console.log('Brief data:', briefData);
                alert(`Отправлено на утверждение: ${selectedForApproval.length} элемент(ов)\n\nБриф:\n${briefData.title}`);
                setBriefPreviewOpen(false);
                setSelectedForApproval([]);
            };

            const handleRecall = () => {
                alert(`Отозвано с согласования/утверждения: ${selectedForRecall.length} элемент(ов)`);
                setSelectedForRecall([]);
            };

            // Получаем пилоты и изменения с учетом выбранного продуктового фильтра
            const allPilots = productFilter === 'all'
                ? mockPilots
                : mockPilots.filter(pilot => pilot.product === productFilter);
            const allChanges = productFilter === 'all'
                ? mockChanges
                : mockChanges.filter(change => change.product === productFilter);

            const getRatifierMeta = (item) => {
                if (item.ratifierName) {
                    return {
                        label: `Утверждающий: ${item.ratifierName}`,
                        bgcolor: '#e8f5e9',
                        color: '#2e7d32'
                    };
                }

                return {
                    label: 'Утверждающий: не выбран',
                    bgcolor: '#fff3e0',
                    color: '#e65100'
                };
            };

            const getItemBySelectionId = (itemId) => {
                if (itemId.startsWith('pilot-')) {
                    const pilotId = parseInt(itemId.replace('pilot-', ''));
                    return allPilots.find(p => p.id === pilotId);
                }
                if (itemId.startsWith('change-')) {
                    const changeId = parseInt(itemId.replace('change-', ''));
                    return allChanges.find(c => c.id === changeId);
                }
                return null;
            };

            const selectedApprovalItems = selectedForApproval
                .map(getItemBySelectionId)
                .filter(Boolean);

            // Подсчитываем количество элементов для каждой вкладки
            const requiresRatificationCount =
                allPilots.filter(p => p.status === 'requires_ratification').length +
                allChanges.filter(c => c.status === 'requires_ratification').length;

            const inProcessCount =
                allPilots.filter(p => p.status === 'in_approval' || p.status === 'in_ratification').length +
                allChanges.filter(c => c.status === 'in_approval' || c.status === 'in_ratification').length;

            const rejectedCount =
                allPilots.filter(p => p.status === 'rejected').length +
                allChanges.filter(c => c.status === 'rejected').length;

            // Группируем элементы по внедрениям
            const groupByDeployment = (items) => {
                const grouped = {};
                items.forEach(item => {
                    if (!grouped[item.deploymentId]) {
                        const deployment = mockDeployments.find(d => d.id === item.deploymentId);
                        grouped[item.deploymentId] = {
                            deployment: deployment,
                            items: []
                        };
                    }
                    grouped[item.deploymentId].items.push(item);
                });
                return Object.values(grouped);
            };

            return (
                <Box sx={{ width: '100%' }}>
                    <Paper>
                        <Tabs value={activeTab} onChange={(e, v) => setActiveTab(v)}>
                            <Tab label={`Требуют утверждения (${requiresRatificationCount})`} />
                            <Tab label={`На согласовании/утверждении (${inProcessCount})`} />
                            <Tab label={`Отклонено (${rejectedCount})`} />
                            <Tab label="История согласований/утверждений" />
                        </Tabs>

                        <Box sx={{ p: 3 }}>
                            {/* Tab 0: Требуют утверждения */}
                            {activeTab === 0 && (
                                <Box>
                                    <Stack direction="row" justifyContent="space-between" alignItems="center" sx={{ mb: 2 }}>
                                        <Typography variant="h6">Требуют утверждения</Typography>
                                        {selectedForApproval.length > 0 && (
                                            <Button
                                                variant="contained"
                                                startIcon={<span className="material-icons">send</span>}
                                                onClick={handleSendForApproval}
                                                sx={{ bgcolor: '#2c4f7c', '&:hover': { bgcolor: '#1e3a5f' } }}
                                            >
                                                Отправить на утверждение ({selectedForApproval.length})
                                            </Button>
                                        )}
                                    </Stack>

                                    {(() => {
                                        const requiresRatificationItems = [
                                            ...allPilots.filter(p => p.status === 'requires_ratification').map(p => ({...p, type: 'pilot'})),
                                            ...allChanges.filter(c => c.status === 'requires_ratification').map(c => ({...c, type: 'change'}))
                                        ];
                                        const grouped = groupByDeployment(requiresRatificationItems);

                                        return grouped.length > 0 ? (
                                            <Stack spacing={3}>
                                                {grouped.map(group => (
                                                    <Box key={group.deployment.id}>
                                                        <Typography variant="subtitle2" sx={{ mb: 1, color: '#666', fontWeight: 600 }}>
                                                            Инициатива: {group.deployment.name}
                                                        </Typography>
                                                        <Stack spacing={1}>
                                                            {group.items.map(item => {
                                                                const itemId = `${item.type}-${item.id}`;
                                                                const isSelected = selectedForApproval.includes(itemId);
                                                                const ratifierMeta = getRatifierMeta(item);
                                                                return (
                                                                    <Box
                                                                        key={itemId}
                                                                        sx={{
                                                                            p: 1.5,
                                                                            bgcolor: isSelected ? '#e3f2fd' : '#fafafa',
                                                                            borderRadius: 1,
                                                                            border: isSelected ? '2px solid #90caf9' : '1px solid #e0e0e0'
                                                                        }}
                                                                    >
                                                                        <Stack direction="row" justifyContent="space-between" alignItems="center">
                                                                            <Stack direction="row" spacing={2} alignItems="center" sx={{ flex: 1 }}>
                                                                                <Checkbox
                                                                                    checked={isSelected}
                                                                                    onChange={() => handleToggleApprovalSelection(itemId)}
                                                                                />
                                                                                <Box>
                                                                                    <Typography
                                                                                        variant="body2"
                                                                                        fontWeight={500}
                                                                                        sx={{
                                                                                            color: '#1976d2',
                                                                                            cursor: 'pointer',
                                                                                            '&:hover': { textDecoration: 'underline' }
                                                                                        }}
                                                                                        onClick={(e) => {
                                                                                            e.stopPropagation();
                                                                                            if (item.type === 'pilot') {
                                                                                                onSelectPilot && onSelectPilot(item);
                                                                                            } else {
                                                                                                onSelectChange && onSelectChange(item);
                                                                                            }
                                                                                        }}
                                                                                    >
                                                                                        {item.type === 'pilot' ? 'Пилот' : 'Внедрение'}: {item.name}
                                                                                    </Typography>
                                                                                    <Typography variant="caption" color="text.secondary">
                                                                                        {item.type === 'pilot' ? 'PLT' : 'CHG'}-{item.id} • Создан {item.createdAt}
                                                                                    </Typography>
                                                                                    <EntityScorecardBlock entity={item} maxItems={2} onSelectScorecard={onSelectScorecard} />
                                                                                    <Box sx={{ mt: 0.75 }}>
                                                                                        <Chip
                                                                                            label={ratifierMeta.label}
                                                                                            size="small"
                                                                                            sx={{
                                                                                                bgcolor: ratifierMeta.bgcolor,
                                                                                                color: ratifierMeta.color,
                                                                                                fontWeight: 500,
                                                                                                height: 22
                                                                                            }}
                                                                                        />
                                                                                    </Box>
                                                                                </Box>
                                                                            </Stack>
                                                                            <Chip
                                                                                label={getStatusLabel(item.status)}
                                                                                size="small"
                                                                                color="warning"
                                                                            />
                                                                        </Stack>
                                                                    </Box>
                                                                );
                                                            })}
                                                        </Stack>
                                                    </Box>
                                                ))}
                                            </Stack>
                                        ) : (
                                            <Typography variant="body2" color="text.secondary">
                                                Нет элементов, требующих утверждения
                                            </Typography>
                                        );
                                    })()}
                                </Box>
                            )}

                            {/* Tab 1: На согласовании/утверждении */}
                            {activeTab === 1 && (
                                <Box>
                                    <Stack direction="row" justifyContent="space-between" alignItems="center" sx={{ mb: 2 }}>
                                        <Typography variant="h6">На согласовании/утверждении</Typography>
                                        {selectedForRecall.length > 0 && (
                                            <Button
                                                variant="outlined"
                                                color="error"
                                                startIcon={<span className="material-icons">undo</span>}
                                                onClick={handleRecall}
                                            >
                                                Отозвать ({selectedForRecall.length})
                                            </Button>
                                        )}
                                    </Stack>

                                    {(() => {
                                        const inProcessItems = [
                                            ...allPilots.filter(p => p.status === 'in_approval' || p.status === 'in_ratification').map(p => ({...p, type: 'pilot'})),
                                            ...allChanges.filter(c => c.status === 'in_approval' || c.status === 'in_ratification').map(c => ({...c, type: 'change'}))
                                        ];
                                        const grouped = groupByDeployment(inProcessItems);

                                        return grouped.length > 0 ? (
                                            <Stack spacing={3}>
                                                {grouped.map(group => (
                                                    <Box key={group.deployment.id}>
                                                        <Typography variant="subtitle2" sx={{ mb: 1, color: '#666', fontWeight: 600 }}>
                                                            Инициатива: {group.deployment.name}
                                                        </Typography>
                                                        <Stack spacing={1}>
                                                            {group.items.map(item => {
                                                                const itemId = `${item.type}-${item.id}`;
                                                                const isSelected = selectedForRecall.includes(itemId);
                                                                const ratifierMeta = getRatifierMeta(item);
                                                                return (
                                                                    <Box
                                                                        key={itemId}
                                                                        sx={{
                                                                            p: 1.5,
                                                                            bgcolor: isSelected ? '#ffebee' : '#fafafa',
                                                                            borderRadius: 1,
                                                                            border: isSelected ? '2px solid #ef9a9a' : '1px solid #e0e0e0'
                                                                        }}
                                                                    >
                                                                        <Stack direction="row" justifyContent="space-between" alignItems="center">
                                                                            <Stack direction="row" spacing={2} alignItems="center" sx={{ flex: 1 }}>
                                                                                <Checkbox
                                                                                    checked={isSelected}
                                                                                    onChange={() => handleToggleRecallSelection(itemId)}
                                                                                />
                                                                                <Box>
                                                                                    <Typography
                                                                                        variant="body2"
                                                                                        fontWeight={500}
                                                                                        sx={{
                                                                                            color: '#1976d2',
                                                                                            cursor: 'pointer',
                                                                                            '&:hover': { textDecoration: 'underline' }
                                                                                        }}
                                                                                        onClick={(e) => {
                                                                                            e.stopPropagation();
                                                                                            if (item.type === 'pilot') {
                                                                                                onSelectPilot && onSelectPilot(item);
                                                                                            } else {
                                                                                                onSelectChange && onSelectChange(item);
                                                                                            }
                                                                                        }}
                                                                                    >
                                                                                        {item.type === 'pilot' ? 'Пилот' : 'Внедрение'}: {item.name}
                                                                                    </Typography>
                                                                                    <Typography variant="caption" color="text.secondary">
                                                                                        {item.type === 'pilot' ? 'PLT' : 'CHG'}-{item.id} • Создан {item.createdAt}
                                                                                    </Typography>
                                                                                    <EntityScorecardBlock entity={item} maxItems={2} onSelectScorecard={onSelectScorecard} />
                                                                                    <Box sx={{ mt: 0.75 }}>
                                                                                        <Chip
                                                                                            label={ratifierMeta.label}
                                                                                            size="small"
                                                                                            sx={{
                                                                                                bgcolor: ratifierMeta.bgcolor,
                                                                                                color: ratifierMeta.color,
                                                                                                fontWeight: 500,
                                                                                                height: 22
                                                                                            }}
                                                                                        />
                                                                                    </Box>
                                                                                </Box>
                                                                            </Stack>
                                                                            <Chip
                                                                                label={getStatusLabel(item.status)}
                                                                                size="small"
                                                                                color="info"
                                                                            />
                                                                        </Stack>
                                                                    </Box>
                                                                );
                                                            })}
                                                        </Stack>
                                                    </Box>
                                                ))}
                                            </Stack>
                                        ) : (
                                            <Typography variant="body2" color="text.secondary">
                                                Нет элементов на согласовании/утверждении
                                            </Typography>
                                        );
                                    })()}
                                </Box>
                            )}

                            {/* Tab 2: Отклонено */}
                            {activeTab === 2 && (
                                <Box>
                                    <Typography variant="h6" sx={{ mb: 2 }}>Отклонено</Typography>
                                    <Typography variant="body2" color="text.secondary">
                                        Нет отклоненных элементов
                                    </Typography>
                                </Box>
                            )}

                            {/* Tab 3: История согласований/утверждений */}
                            {activeTab === 3 && (
                                <Box>
                                    <Typography variant="h6" sx={{ mb: 2 }}>История согласований/утверждений</Typography>
                                    <Stack spacing={2}>
                                        <Box sx={{ p: 1.5, bgcolor: '#f5f5f5', borderRadius: 1 }}>
                                            <Typography variant="body2" fontWeight={500}>
                                                Внедрение "Внедрение новой скоркарты Premium" одобрено
                                            </Typography>
                                            <Typography variant="caption" color="text.secondary">
                                                2026-02-20 • Одобрил: Петров П.П.
                                            </Typography>
                                        </Box>
                                        <Box sx={{ p: 1.5, bgcolor: '#f5f5f5', borderRadius: 1 }}>
                                            <Typography variant="body2" fontWeight={500}>
                                                Пилот "Пилот Premium Q1 2026" активирован
                                            </Typography>
                                            <Typography variant="caption" color="text.secondary">
                                                2026-02-10 • Одобрил: Иванов И.И.
                                            </Typography>
                                        </Box>
                                    </Stack>
                                </Box>
                            )}
                        </Box>
                    </Paper>

                    <RatificationRouteDialog
                        open={approvalDialogOpen}
                        onClose={() => setApprovalDialogOpen(false)}
                        items={selectedApprovalItems}
                        onSubmit={handleApprovalSubmit}
                    />

                    <BriefPreviewDialog
                        open={briefPreviewOpen}
                        onClose={() => setBriefPreviewOpen(false)}
                        items={selectedApprovalItems}
                        route={approvalRoute}
                        onSend={handleBriefSend}
                    />
                </Box>
            );
        }

        // App component with sidebar
        function App() {
            const [currentView, setCurrentView] = useState('packages');
            const [productFilter, setProductFilter] = useState('all');

            return (
                <Box sx={{ display: 'flex', height: '100vh' }}>
                    {/* Sidebar */}
                    <Box className="sidebar">
                        <Box className="sidebar-header">
                            <Typography variant="h6" sx={{ fontWeight: 600 }}>
                                Система управления
                            </Typography>
                            <Typography variant="caption" sx={{ color: 'rgba(255, 255, 255, 0.6)' }}>
                                Риск-стратегии
                            </Typography>
                        </Box>
                        <Box className="sidebar-menu">
                            <Box className="sidebar-item">
                                <span className="material-icons">science</span>
                                <span>Симуляции</span>
                            </Box>
                            <Box className="sidebar-item">
                                <span className="material-icons">science</span>
                                <span>Пилоты</span>
                            </Box>
                            <Box className="sidebar-item">
                                <span className="material-icons">rocket_launch</span>
                                <span>Внедрения</span>
                            </Box>
                            <Box
                                className={`sidebar-item ${currentView === 'packages' ? 'active' : ''}`}
                                onClick={() => setCurrentView('packages')}
                            >
                                <span className="material-icons">inventory_2</span>
                                <span>Пакеты</span>
                            </Box>
                            <Box className="sidebar-item">
                                <span className="material-icons">approval</span>
                                <span>Согласования</span>
                            </Box>
                        </Box>
                    </Box>

                    {/* Main content */}
                    <Box className="main-content">
                        {/* Top bar */}
                        <Box className="top-bar">
                            <Typography variant="h6">
                                Пакеты
                            </Typography>
                            <Box sx={{ display: 'flex', alignItems: 'center', gap: 2 }}>
                                <Typography variant="body2" color="text.secondary">
                                    Иванов И.И. (ПРМ)
                                </Typography>
                            </Box>
                        </Box>

                        {/* Content area */}
                        <Box className="content-area">
                            {currentView === 'packages' && (
                                <PackagesView
                                    productFilter={productFilter}
                                    onSelectPilot={(pilot) => console.log('Selected pilot:', pilot)}
                                    onSelectChange={(change) => console.log('Selected change:', change)}
                                    onSelectScorecard={(scorecard) => console.log('Selected scorecard:', scorecard)}
                                />
                            )}
                        </Box>
                    </Box>
                </Box>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
