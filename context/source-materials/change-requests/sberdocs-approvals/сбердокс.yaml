	openapi: 3.0.3
tags:
  - name: public
info:
  title: public_agw_mtls
  description: |2-
     Публичный REST API АС SberDocs с авторизацией OpenId для:
     - операции по добавлению нового документа в Системе
     - запроса  статуса операции добавления документа в Системе
     - редактирования карточки существующего документа в Системе
     - запроса статуса документа в Системе
     - запроса истории согласования документа в Системе
     - запроса статуса версии документа в Системе
     - запроса файлов документа в Системе
     - запроса файлов документа в Системе в архиве ZIP
     - запроса файлов подписи для версии документа
     - отправка файлов подписи документа в Системе указанной версии
     - отказ от подписания файлов документа в Системе указанной версии
     - получение сертификата пользователя по BiCrypt_ID
     - проверка сертификата пользователя по BiCrypt_ID
     - проверка работоспособности сервиса
     - запроса на изменение информации о регистрации документа
     - запроса на получение информации о защищенных файлах версии документа
     - запроса на получение потокового контента вложения документа, зашифрованного на указанного пользователя
     - запроса на получение статуса документа в Системе по задаче
     - запрос на добавление отчета об исполнении документа/поручения на этапе ЖЦ Исполнение
  version: 3.14.0
  contact:
    name: Углецов Артемий
    email: ugletsov.a.a@sberbank.ru
servers:
  - url: '/v3'
    variables:
      protocol:
        enum:
          - http
          - https
        default: http
      environment:
        enum:
          - tls.sberdocs.sigma.sbrf.ru
          - mtls.sberdocs.sigma.sbrf.ru
          - tls.ift.sberdocs.sigma.sbrf.ru
          - mtls.ift.sberdocs.sigma.sbrf.ru
          - tls.psi.sberdocs.sigma.sbrf.ru
          - mtls.psi.sberdocs.sigma.sbrf.ru
          - dev.sberdocs.sigma.sbrf.ru
        default: sberdocs.sigma.sbrf.ru
paths:
  /public/Gateway/attachment/{fileId}/encrypted-for-employee-content:
    parameters:
      - $ref: '#/components/parameters/RqUID'
      - $ref: '#/components/parameters/Tenant'
      - $ref: '#/components/parameters/X-PersonnelNumber'
    get:
      tags:
        - public
      summary: Метод потокового получения контента вложения, зашифрованного для сотрудника
      description: Метод потокового получения контента вложения, зашифрованного на переданного в параметре метода сотрудника
      operationId: getEncryptedForEmployeeContent
      parameters:
        - name: taskId
          in: query
          required: true
          description: Идентификатор задачи
          schema:
            type: string
            example: 16fd2706-8baf-433b-82eb-8c7fada847da
            pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
            maxLength: 36
            description: Идентификатор задачи. По задаче определяется документ, к которому относится файл
        - name: fileId
          in: path
          required: true
          description: Идентификатор файла, контент которого получается
          schema:
            type: string
            example: 16fd2706-8baf-433b-82eb-8c7fada847da
            pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
            maxLength: 36
            description: Идентификатор файла, контент которого получается
      responses:
        '200':
          description: Ответ в случае успеха
          headers:
            RqUID:
              schema:
                type: string
                pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
              example: 329b66b1-1124-437a-b195-d316bc1a32bb
              description: Уникальный идентификатор запроса
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
                example: some file content
        '400':
          description: Bad request
          headers:
            RqUID:
              schema:
                type: string
                pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
                example: 329b66b1-1124-437a-b195-d316bc1a32bb
              description: Уникальный идентификатор запроса
          content:
