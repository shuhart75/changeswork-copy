    DocumentJobState:
      title: Статус задания создания нового документа
      type: string
      maxLength: 255
      pattern: ^[0-9A-Z_]*$
      description: |2-
         Статус задания создания нового документа
         Описание статусов:
         _ ACCEPTED - запрос операции прошел валидацию , но не были отправлены запросы на создание документа
         - IN_WORK - отпралены один или несколько запросов по созданию документа, но получены не все ответы
         - FAILED - один или несколько запросов на создание документа потерпели неудачу, терминальный статус
         - COMPLETED - все запросы по созданию документа отработали успешно, терминальный статус
         - VALIDATION_CHECK - проверка атрибутов документа завершилась успешно
         - VALIDATION_ERROR - ошибка проверки атрибутов документа
         Описание возможных переходов:
         * ACCEPTED - запрос прошел валидацию,  иначе ошибка HTTP
         * ACCEPTED - IN_WORK - отправлен как минимум 1 запрос на создание документа
         * ACCEPTED - FAILED - *- не удалось отправить как минимум один запрос на создание документа в течении N времени за X попыток
         * IN_WORK - FAILED - *  - получили как минимум одну ошибку по запросу на создание документа
         * IN_WORK - COMPLETED - * - операция по созданию документа выполнена успешно, получен documentId

      enum:
        - ACCEPTED
        - IN_WORK
        - FAILED
        - COMPLETED
        - VALIDATION_CHECK
        - VALIDATION_ERROR
      example: IN_WORK
      x-tags:
        - enum
