          example: Иванов Иван Иванович
      required:
        - givenName
        - familyName
        - positionName
        - organizationName
    EmployeeGenderCode:
      title: EmployeeGenderCode
      description: Пол сотрудника
      type: string
      enum:
        - MALE
        - FEMALE
    Recipient:
      type: object
      oneOf:
        - $ref: '#/components/schemas/RecipientEmployeeObject'
        - $ref: '#/components/schemas/RecipientMailingListObject'
        - $ref: '#/components/schemas/RecipientOrganizationUnitObject'

    RecipientEmployeeObject:
      type: object
      allOf:
        - $ref: '#/components/schemas/RecipientObject'
      properties:
        recipient:
          $ref: '#/components/schemas/EmployeeObject'
      required:
        - recipient
    RecipientMailingListObject:
      type: object
      allOf:
        - $ref: '#/components/schemas/RecipientObject'
      properties:
        recipient:
          $ref: '#/components/schemas/MailingListObject'
      required:
        - recipient
    RecipientOrganizationUnitObject:
      type: object
      allOf:
        - $ref: '#/components/schemas/RecipientObject'
      properties:
        recipient:
          $ref: '#/components/schemas/OrganizationUnitObject'
      required:
        - recipient
    RecipientObject:
      type: object
      additionalProperties: false
      properties:
        type:
          $ref: '#/components/schemas/DocumentRecipientType'
        mode:
          $ref: '#/components/schemas/DocumentRecipientMode'
        copy:
          type: boolean
          deprecated: true
          description: Признак основного получателя или копии
      required:
        - type
    DocumentRecipientMode:
      title: Способ указания получателя
      description: Способ указания получателя (адресат, копия, скрытый)
      type: string
      enum:
        - DIRECT
        - COPY
        - HIDDEN
      example: DIRECT
    MailingListObject:
      type: object
      description: Модель списка рассылки
      additionalProperties: false
      properties:
        name:
          type: string
          description: Наименование списка рассылки
          pattern: ^(.)*$
          maxLength: 255
          example: Руководство банка
      required:
        - name
    OrganizationUnitObject:
      type: object
      description: Модель подразделения
      additionalProperties: false
      properties:
        name:
          type: string
          description: Наименование подразделения
          pattern: ^(.)*$
          maxLength: 255
          example: Департамент управления делами
        parentOrganizationUnitName:
          type: string
          description: Наименование родительского подразделения
          pattern: ^(.)*$
          maxLength: 255
          example: Департамент управления делами
        territoryAbbreviation:
          type: string
          description: Наименование территории
          pattern: ^(.)*$
          maxLength: 255
          example: ЦА
        manager:
          $ref: '#/components/schemas/EmployeeObject'
      required:
        - name

    TasksRequest:
      title: TaskRequest
      type: object
      description: Запрос на получение списка заданий пользователя, выбранного типа и статуса
      additionalProperties: false
      properties:
        externalId:
          type: string
          description: Идентификатор сотрудника в учетной системе, для tenantCode - SBERBANK это табельный номер.
          example: r-003234
          pattern: ^(.)*$
          maxLength: 255
        taskTypes:
          description: Массив с выбранными типами заданий. При выборе нескольких типов происходит объединение результатов. Отсутствие параметра означает выбор всех типов заданий
          type: array
          maxItems: 100
          uniqueItems: true
          items:
            type: string
            maxLength: 255
            example: APPROVAL
            pattern: ^[A-Z_]*$
            description: |-
              Типы заданий
              AGREEMENT - Задание на согласование,
              APPROVAL - задание на подписание,
              EXECUTION - задание на исполнение,
              EXECUTION_BY_POINT - задание на исполнение по пункту,
              ASSIGNMENT_POINT - задание на исполнение по пункту инициативного поручения,
              AGREEMENT_DECISION - задание на автора документа для принятия решения,
              ASSIGNMENT_DECISION - задание на автора ИП для принятия решения,
              APPROVAL_RESOLUTION - задание на доп. согласование на стадии подписания,
              AGREEMENT_RESOLUTION - задание на доп. согласование на стадии согласования
        taskStatesList:
          type: array
          description: Список статусов заданий
          maxItems: 100
          uniqueItems: true
          items:
            type: string
            description: Статус задания определенного типа
            pattern: ^(.)*$
            maxLength: 255
            example: IN_WORK
        completed:
          type: boolean
          description: Признак завершенного задания. true - завершено.
          example: false
        taskCreateDateFrom:
          type: string
          description: От даты создания задания
          pattern: ^\d{2,4}-\d{2,4}-\d{2,4}$
          example: '2020-01-01'
        taskCreateDateTo:
          type: string
          description: По дату создания задания
          pattern: ^\d{2,4}-\d{2,4}-\d{2,4}$
          example: '2020-01-01'
        sort:
          type: string
          maxLength: 255
          example: 'createdAt:(ASC|DESC)+'
          description: Правила сортировки результата
          pattern: ^(.)*$
      required:
        - externalId
    TasksResponse:
      title: TasksResponse
      type: object
      description: Ответ со списком заданий пользователя, соответствующих запросу
      additionalProperties: false
      properties:
        list:
          type: array
          uniqueItems: true
          maxItems: 100
          description: Список заданий пользователя
          items:
            $ref: '#/components/schemas/Task'
        page:
          type: integer
          format: int32
          description: Номер текущей страницы
          example: 10
          maximum: 2147483641
          minimum: 0
        limit:
          type: integer
          format: int32
          description: Количество записей на странице
          example: 16
          maximum: 1000
          minimum: 0
        total:
          type: integer
          format: int32
          description: Количество записей в результате поиска (всего)
          example: 15
          maximum: 100000
          minimum: 0
      required:
        - list
        - page
        - limit
        - total
    Task:
      title: Task
      type: object
      description: Модель задания
      additionalProperties: false
      properties:
        id:
          type: string
          description: Идентификатор задания
          example: 16fd2706-8baf-433b-82eb-8c7fada847da
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
          maxLength: 36
        executor:
          $ref: '#/components/schemas/EmployeeShortInfo'
        taskText:
          type: string
          description: Текст задания
          example: Текст
          pattern: ^(.)*$
          maxLength: 500
        author:
          $ref: '#/components/schemas/EmployeeObject'
        taskType:
          type: string
          description: Тип задания
          maxLength: 100
          example: APPROVAL
          pattern: ^[A-Z_]*$
        taskTypeName:
          type: string
          pattern: ^(.)*$
          maxLength: 255
          description: Бизнес-описание типа задания
          example: Задание на согласование
        createdAt:
          type: string
          description: Дата и время создания задания
          format: date-time
          example: '2017-01-15T01:30:15.01Z'
        taskState:
          type: string
          description: Состояние задания
          example: IN_WORK
          maxLength: 100
          pattern: ^[A-Z_]*$
        taskStateName:
          type: string
          pattern: ^(.)*$
          maxLength: 255
          description: Бизнес-описание статуса задания
          example: На распределении
        responsible:
          type: boolean
          description: Признак ответственного исполнителя (true - ответственный)
          example: true
        rootObjectId:
          type: string
          description: Идентификатор связанной сущности (документа или ИП)
          example: 16fd2706-8baf-433b-82eb-8c7fada847da
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
          maxLength: 36
        rootObjectCode:
          type: string
          description: Код связанной сущности. DOCUMENT - Документ, ASSIGNMENT - ИП
          example: ASSIGNMENT
          pattern: ^[A-Z_]*$
          maxLength: 100
        rootObjectNumber:
          type: string
          description: Системный номер связанной сущности
          maxLength: 2000
          pattern: ^(.)*$
          example: Сн-ЦА/1-21
        summary:
          description: Краткое описание связанной сущности
          type: string
          pattern: ^(.)*$
          maxLength: 1000
          example: О создании закупки под проектирование
        documentType:
          type: string
          description: Наименование типа документа
          pattern: ^(.)*$
          example: Внутренниий документ
          maxLength: 255
        documentKind:
          type: string
          description: Наименование вида документа
          pattern: ^(.)*$
          example: Служебная записка
          maxLength: 255
        documentRegisterNumber:
          type: string
          description: Регистрационный номер документа в Системе
          maxLength: 2000
          pattern: ^(.)*$
          example: Сн-ЦА/1-21
        rootObjectRegisteredAt:
          type: string
          example: '2020-01-01'
          pattern: ^\d{2,4}-\d{2,4}-\d{2,4}$
          description: Дата регистрации документа или дата утверждения инициативного поручения
        completed:
          type: boolean
          description: Признак завершенного задания. true - завершено.
          example: false
      required:
        - id
        - executor
        - taskText
        - author
        - taskType
        - taskTypeName
        - createdAt
        - taskState
        - taskStateName
        - responsible
        - rootObjectId
        - rootObjectCode
        - rootObjectNumber
        - completed
    EmployeeShortInfo:
      title: EmployeeShortInfo
      type: object
      description: Краткая информация о сотруднике
      additionalProperties: false
      properties:
        externalId:
          type: string
          description: Идентификатор сотрудника в учетной системе, для tenantCode - SBERBANK это табельный номер.
          example: r-003234
          pattern: ^(.)*$
          maxLength: 255
        fullName:
          type: string
          description: ФИО Пользователя, в формате Фамилия Имя Отчество
          pattern: ^(.)*$
          maxLength: 255
          example: Иванов Иван Иванович
      required:
        - externalId
        - fullName

    ExecutionReportTextRequest:
      type: object
      description: Запрос на редактирование текста отчета
      additionalProperties: false
      properties:
        text:
          type: string
          maxLength: 100000
          pattern: ^(.*|\n)*.*$
          description: Текст отчета в формате base64 (добавляется новым абзацем)
          example: dGVzdCBkYXRh
      required:
        - text
  parameters:
    RqUID:
      name: RqUID
      in: header
      schema:
        type: string
        pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
        example: 329b66b1-1124-437a-b195-d316bc1a32bb
        description: Уникальный идентификатор запроса
        maxLength: 36
      description: Уникальный идентификатор запроса
      required: true
    Tenant:
      name: TenantCode
      in: header
      schema:
        $ref: '#/components/schemas/TenantCode'
      description: Код Организации
      required: true
    X-PersonnelNumber:
      name: X-personnelNumber
      in: header
      required: true
      description: Табельный номер сотрудника (employee_actual.external_id)
      schema:
        type: string
        pattern: ^[A-Za-z0-9_]+$
        maxLength: 255
        example: 123123
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Авторизационный токен
