            maxLength: 50
        participants:
          type: array
          maxItems: 100
          items:
            type: string
            description: Список участников документа в АС SberDocs для которых требуется запретить actions. Если пусто, то  значит для всех участников документа. Список участников документа публикуется в confluence
            pattern: ^[A-Z_]*$
