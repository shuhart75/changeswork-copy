        isChanged:
          type: boolean
          description: Признак изменения версии, true - изменения есть
          example: true
        taskId:
          type: string
          description: Идентификатор задания по версии документа
          example: 3bd27c92-5eb6-4b8e-a67d-493a4935702a
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
          maxLength: 36
        taskType:
          type: string
          description: Тип задания AGREEMENT - Задание на согласование, APPROVAL - задание на подписание, EXECUTION - задание на исполнение, EXECUTION_BY_POINT - задание на исполнение по пункту,    ASSIGNMENT_POINT - задание на исполнение по пункту инициативного поручения, AGREEMENT_DECISION - задание на автора документа для принятия решения
          maxLength: 255
          example: APPROVAL
          pattern: ^[A-Z_]*$
        updatedAt:
          type: string
          example: '2017-01-15T01:30:15.01Z'
          format: date-time
          description: Дата и время изменения статуса задания
          maxLength: 255
        decisionAt:
          type: string
          description: Дата и время исполнения задания по версии документа
          example: '2017-01-15T01:30:15.01Z'
          format: date-time
          maxLength: 255
