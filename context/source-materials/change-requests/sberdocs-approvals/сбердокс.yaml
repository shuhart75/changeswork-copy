          pattern: ^[A-Z-_]*$
          maxLength: 255
          example: CADES_BES
        signatureForFileId:
          type: string
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
          example: c53336ba-b079-478a-b81e-1746753450ec
          description: Идентификатор файла в Системе для которого передается подпись
          maxLength: 36
        signatureForFileName:
          type: string
          description: Наименование файла который подписали
          pattern: ^(.)*$
          maxLength: 255
          example: Документ.docx
        content:
          type: string
          description: Содержиое файла подписи в кодировке base64
          example: jsdofgjsou3un53i935nf934n2984r==
          maxLength: 52428800
          pattern: ^(.)*$
        signer:
          type: string
          description: Фамилия Имя Отчество подписанта
          example: Иванов Сергей Аркадьевич
          pattern: ^(.)*$
          maxLength: 500
        sortOrder:
