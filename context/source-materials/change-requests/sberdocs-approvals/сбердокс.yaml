    DocumentContext:
      title: DocumentContext
      type: object
      description: Модель данных документа, который нашли в результате поиска
      additionalProperties: false
      properties:
        objectType:
          $ref: '#/components/schemas/SearchObjectType'
        documentId:
          type: string
          description: Уникальный идентификатор документа
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
          example: 16fd2706-8baf-433b-82eb-8c7fada847da
          maxLength: 36
        versionId:
          type: string
          description: Уникальный идентификатор версии документа
          pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
          example: 16fd2706-8baf-433b-82eb-8c7fada847da
          maxLength: 36
        documentNumbers:
          type: array
          description: Массив номеров документа
          maxItems: 2
          items:
            type: object
            properties:
              code:
                type: string
                pattern: ^[A-Z_]*$
                example: SYSTEM
                description: Код нумерации системный - SYSTEM; регистрационный - REGISTRATION
                maxLength: 25
              number:
                type: string
                description: Номер документа
                pattern: ^(.)*$
                example: Сн-ЦА/1-21
                maxLength: 25
              createdAt:
                type: string
                description: Дата и время выдачи номера
                example: '2017-01-15T01:30:15.01Z'
                format: date-time
        documentType:
          type: string
          description: Наименование типа документа
          pattern: ^(.)*$
          example: Внутренниий документ
          maxLength: 255
        documentKind:
          type: string
          description: Наименование вида документа
          pattern: ^(.)*$
          example: Служебная записка
          maxLength: 255
        documentUrgency:
          type: string
          description: Наименование срочности документа
          pattern: ^(.)*$
          example: Срочно
          maxLength: 255
        documentPrivacyList:
          description: Массив видов информации в документе
          type: array
          maxItems: 100
          minItems: 0
          items:
            $ref: '#/components/schemas/DocumentPrivacy'
        documentSummary:
          type: string
          description: Краткое содержание документа
          pattern: ^(.)*$
          maxLength: 20000
          example: О запросе информации списанного оборудования в подразделении
        documentCreatedAt:
          type: string
          example: '2017-01-15T01:30:15.01Z'
          description: Дата и время создания документа
          format: date-time
        documentUpdatedAt:
          type: string
          example: '2017-01-15T01:30:15.01Z'
          description: Дата и время последнего изменения документа
          format: date-time
        documentAuthorList:
          type: array
          description: Список авторов и со-авторов
          maxItems: 3
          items:
            $ref: '#/components/schemas/EmployeeObject'
        documentSenderList:
          type: array
          maxItems: 3
          description: 'Список сотрудников поля От '
          items:
            $ref: '#/components/schemas/EmployeeObject'
        documentRecipientList:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            $ref: '#/components/schemas/Recipient'
        documentRecipientsCount:
          type: integer
          format: int32
          description: Количество получателей
          example: 10
          minimum: 0
          maximum: 300000
        detectionArea:
          type: string
          description: Часть документа где обнаружен вхождение
          enum:
            - DOCUMENT
            - COMMENT
            - ATTACHMENT
        documentStage:
          $ref: '#/components/schemas/DocumentStageCode'
        addresseeList:
          type: array
          maxItems: 1000
          items:
            type: string
            description: Наименование получателя
            maxLength: 255
            pattern: ^(.)*$
        correspondent:
          type: string
          description: Наименование получателя
          maxLength: 255
          pattern: ^(.)*$
      required:
        - documentId
        - objectType
        - documentNumbers
        - documentType
        - documentKind
        - documentPrivacyList
        - documentSummary
        - documentCreatedAt
        - documentUpdatedAt
        - documentAuthorList

