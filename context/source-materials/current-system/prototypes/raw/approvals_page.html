            const [activeTab, setActiveTab] = useState(0);

            const [packageDetailOpen, setPackageDetailOpen] = useState(false);
            const [selectedPackage, setSelectedPackage] = useState(null);
            const [packageDetailTab, setPackageDetailTab] = useState(0);

            // Get items on approval and ratification
            const inApprovalItems = [
                ...mockPilots.filter(p => p.status === 'in_approval').map(p => ({...p, type: 'pilot', stage: 'approval'})),
                ...mockChanges.filter(c => c.status === 'in_approval').map(c => ({...c, type: 'change', stage: 'approval'}))
            ];

            const inRatificationItems = [
                ...mockPilots.filter(p => p.status === 'in_ratification').map(p => ({...p, type: 'pilot', stage: 'ratification'})),
                ...mockChanges.filter(c => c.status === 'in_ratification').map(c => ({...c, type: 'change', stage: 'ratification'}))
            ];

            const currentItems = activeTab === 0 ? inApprovalItems : inRatificationItems;
            const currentStage = activeTab === 0 ? 'approval' : 'ratification';

            // Group by package
            const groupByPackage = (items) => {
                const packaged = {};
                const standalone = [];

                items.forEach(item => {
                    if (item.packageId) {
                        if (!packaged[item.packageId]) {
                            const pkg = mockPackages.find(p => p.id === item.packageId);
                            packaged[item.packageId] = {
                                package: pkg,
                                items: []
                            };
                        }
                        packaged[item.packageId].items.push(item);
                    } else {
                        standalone.push(item);
                    }
                });

                return {
                    packages: Object.values(packaged),
                    standalone
                };
            };

            const handleToggleSelection = (itemId) => {
                setSelectedItems(prev =>
                    prev.includes(itemId) ? prev.filter(id => id !== itemId) : [...prev, itemId]
                );
            };

            const handleSelectAll = (items) => {
                const itemIds = items.map(item => `${item.type}-${item.id}`);
                setSelectedItems(itemIds);
            };

            const handleDeselectAll = () => {
                setSelectedItems([]);
            };

            const handleTabChange = (e, newValue) => {
                setActiveTab(newValue);
                setSelectedItems([]);
            };

            const handleOpenDetail = (item) => {
                setSelectedItem(item);
                setDetailDialogOpen(true);
            };

            const handleBulkAction = (action) => {
                setActionType(action);
                setCommentDialogOpen(true);
            };

            const handleSubmitAction = () => {
                const actionText = actionType === 'approve' ? 'согласовано' :
                                   actionType === 'reject' ? 'отклонено' : 'утверждено';
                alert(`${selectedItems.length} элемент(ов) ${actionText}. Комментарий: ${comment || 'не указан'}`);
                setCommentDialogOpen(false);
                setSelectedItems([]);
                setComment('');
            };

            const handleItemAction = (item, action) => {
                setSelectedItem(item);
                setActionType(action);
                setCommentDialogOpen(true);
            };

            const handlePackageAction = (pkg, action) => {
                setSelectedPackage(pkg);
                setActionType(action);
                setCommentDialogOpen(true);
            };

            const getItemId = (item) => `${item.type}-${item.id}`;

            const renderItemCard = (item) => {
                const itemId = getItemId(item);
                const isSelected = selectedItems.includes(itemId);
                const deployment = mockDeployments.find(d => d.id === item.deploymentId);

                return (
                    <Paper
                        key={itemId}
                        variant="outlined"
                        sx={{
                            p: 2,
                            bgcolor: isSelected ? '#f0f7ff' : 'white',
                            border: isSelected ? '2px solid #1976d2' : '1px solid #e0e0e0',
                            cursor: 'pointer',
                            transition: 'all 0.2s',
                            '&:hover': { bgcolor: '#fafafa', boxShadow: 1 }
                        }}
                    >
                        <Stack direction="row" spacing={2} alignItems="flex-start">
                            <Checkbox
                                checked={isSelected}
                                onChange={() => handleToggleSelection(itemId)}
                                onClick={(e) => e.stopPropagation()}
                            />
                            <Box sx={{ flex: 1 }} onClick={() => handleOpenDetail(item)}>

                                    <Chip
                                        icon={<span className="material-icons" style={{ fontSize: 16 }}>

                                        </span>}
                                        label={item.type === 'pilot' ? `PLT-${item.id}` : `CHG-${item.id}`}
                                        size="small"
                                        sx={{
                                            bgcolor: item.type === 'pilot' ? '#e3f2fd' : '#e8f5e9',
                                            color: item.type === 'pilot' ? '#1565c0' : '#2e7d32',
                                            fontWeight: 600
                                        }}
                                    />
                                    <Chip
                                        label={`Критичность: ${getCriticalityLabel(item.criticality)}`}
                                        size="small"
                                        sx={{
                                            ...getCriticalityStyles(item.criticality),
                                            fontWeight: 500
                                        }}
                                    />
                                </Stack>
                                <Typography variant="subtitle1" fontWeight={600} sx={{ mb: 0.5 }}>

                                </Typography>
                                <Typography variant="body2" color="text.secondary" sx={{ mb: 1 }}>

                                </Typography>

                                    <Typography variant="caption" color="text.secondary">

                                        />

                                        {pkg.name}
                                    </Typography>
                                    <Typography variant="body2" color="text.secondary" sx={{ mb: 1 }}>
                                        {pkg.description}

                                                return prod?.label || prodId;
