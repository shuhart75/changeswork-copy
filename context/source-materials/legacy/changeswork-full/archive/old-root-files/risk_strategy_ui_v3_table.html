        const hasSharedScorecard = (pilot, deployment) => {
            const pilotScorecards = pilot.scorecards || [];
            const deploymentScorecards = deployment.scorecards || [];
            return pilotScorecards.some(scorecardId => deploymentScorecards.includes(scorecardId));
        };

        const getRelatedDeploymentsForPilot = (pilot, deployments = mockDeployments) =>
            // Кардинальность Pilot -> Deployment: не более одного внедрения на пилот.
            deployments.filter(deployment => hasSharedScorecard(pilot, deployment)).slice(0, 1);

        const getRelatedPilotsForDeployment = (deployment, pilots = mockPilots) =>
            pilots.filter(pilot => hasSharedScorecard(pilot, deployment));

            if (scorecards.length === 0) return null;
            return scorecards.some(scorecard => scorecard.criticality === 'high') ? 'high' : 'low';

            return (

                    size={size}
                    sx={{

                        color: styles.color,
                        fontWeight: 500

        // Компонент диалога настройки маршрута согласования
        function ApprovalRouteDialog({ open, onClose, items, onSubmit }) {
            const usersByRole = {
                'Риск-менеджеры': [
                    { id: 1, name: 'Иванов Иван Иванович', role: 'Риск-менеджер' },
                    { id: 2, name: 'Петрова Анна Сергеевна', role: 'Риск-менеджер' },
                    { id: 3, name: 'Сидоров Петр Александрович', role: 'Риск-менеджер' }
                ],
                'Руководители': [
                    { id: 4, name: 'Козлов Дмитрий Викторович', role: 'Руководитель отдела' },
                    { id: 5, name: 'Морозова Елена Игоревна', role: 'Руководитель департамента' }
                ],
                'Директора': [
                    { id: 6, name: 'Волков Андрей Николаевич', role: 'Директор по рискам' }
                ]
            };

            const [stages, setStages] = useState([
                { id: 1, name: 'Этап 1', approvers: [] }
            ]);
            const [selectedRole, setSelectedRole] = useState('Риск-менеджеры');
            const [ratifier, setRatifier] = useState(null);
            const [enableRatification, setEnableRatification] = useState(true);
            const [autoRatification, setAutoRatification] = useState(false);

            const addStage = () => {
                setStages([...stages, {
                    id: stages.length + 1,
                    name: `Этап ${stages.length + 1}`,
                    approvers: []
                }]);
            };

            const removeStage = (stageId) => {
                setStages(stages.filter(s => s.id !== stageId));
            };

            const addApproverToStage = (stageId, user, isRequired) => {
                setStages(stages.map(stage => {
                    if (stage.id === stageId) {
                        const approverExists = stage.approvers.some(a => a.userId === user.id);
                        if (!approverExists) {
                            return {
                                ...stage,
                                approvers: [...stage.approvers, { userId: user.id, userName: user.name, required: isRequired }]
                            };
                        }
                    }
                    return stage;
                }));
            };

            const removeApproverFromStage = (stageId, userId) => {
                setStages(stages.map(stage => {
                    if (stage.id === stageId) {
                        return {
                            ...stage,
                            approvers: stage.approvers.filter(a => a.userId !== userId)
                        };
                    }
                    return stage;
                }));
            };

            const toggleApproverRequired = (stageId, userId) => {
                setStages(stages.map(stage => {
                    if (stage.id === stageId) {
                        return {
                            ...stage,
                            approvers: stage.approvers.map(a =>
                                a.userId === userId ? { ...a, required: !a.required } : a
                            )
                        };
                    }
                    return stage;
                }));
            };

            const moveStageUp = (stageId) => {
                const index = stages.findIndex(s => s.id === stageId);
                if (index > 0) {
                    const newStages = [...stages];
                    [newStages[index - 1], newStages[index]] = [newStages[index], newStages[index - 1]];
                    setStages(newStages);
                }
            };

            const moveStageDown = (stageId) => {
                const index = stages.findIndex(s => s.id === stageId);
                if (index < stages.length - 1) {
                    const newStages = [...stages];
                    [newStages[index], newStages[index + 1]] = [newStages[index + 1], newStages[index]];
                    setStages(newStages);
                }
            };

            const handleSubmit = () => {
                const totalApprovers = stages.reduce((sum, stage) => sum + stage.approvers.length, 0);

                // Если выбран этап утверждения
                if (enableRatification) {
                    // Утверждающий обязателен при включенном этапе утверждения
                    if (!ratifier) {
                        alert('Выберите утверждающего');
                        return;
                    }
                    // Этап согласования опционален, если выбран этап утверждения
                } else {
                    // Если этап утверждения не выбран, требуется хотя бы один согласующий
                    if (totalApprovers === 0) {
                        alert('Добавьте хотя бы одного согласующего или включите этап утверждения');
                        return;
                    }
                }

                onSubmit({
                    stages,
                    ratifier: enableRatification ? ratifier : null,
                    autoRatification: enableRatification && autoRatification
                });
            };

            return (
                <Dialog open={open} onClose={onClose} maxWidth="lg" fullWidth>
                    <DialogTitle sx={{ borderBottom: '1px solid #e0e0e0', pb: 2 }}>
                        <Box sx={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <Typography variant="h6" sx={{ fontWeight: 500 }}>
                                Настройка маршрута согласования
                            </Typography>
                            <IconButton onClick={onClose} size="small">
                                <span className="material-icons">close</span>
                            </IconButton>
                        </Box>
                    </DialogTitle>
                    <DialogContent sx={{ p: 3 }}>
                        <Alert severity="info" sx={{ mb: 3 }}>
                            Отправка на согласование: <strong>{items.length}</strong> элемент(ов)
                        </Alert>

                        <Grid container spacing={3}>
                            {/* Левая панель - список пользователей */}
                            <Grid item xs={12} md={5}>
                                <Paper sx={{ p: 2, height: '500px', display: 'flex', flexDirection: 'column' }}>
                                    <Typography variant="h6" sx={{ mb: 2, fontWeight: 500 }}>
                                        Доступные согласующие
                                    </Typography>

                                    <Tabs
                                        value={selectedRole}
                                        onChange={(e, newValue) => setSelectedRole(newValue)}
                                        variant="scrollable"
                                        scrollButtons="auto"
                                        sx={{ borderBottom: 1, borderColor: 'divider', mb: 2 }}
                                    >
                                        {Object.keys(usersByRole).map(role => (
                                            <Tab key={role} label={role} value={role} sx={{ textTransform: 'none' }} />
                                        ))}
                                    </Tabs>

                                    <Box sx={{ flex: 1, overflowY: 'auto' }}>
                                        {usersByRole[selectedRole].map(user => (
                                            <Paper
                                                key={user.id}
                                                sx={{
                                                    p: 2,
                                                    mb: 1,
                                                    cursor: 'pointer',
                                                    '&:hover': { bgcolor: '#f5f5f5' }
                                                }}
                                            >
                                                <Typography variant="body2" sx={{ fontWeight: 500 }}>
                                                    {user.name}
                                                </Typography>
                                                <Typography variant="caption" color="text.secondary">
                                                    {user.role}
                                                </Typography>
                                                <Box sx={{ mt: 1, display: 'flex', gap: 1 }}>
                                                    <FormControl size="small" sx={{ flex: 1 }}>
                                                        <InputLabel>Добавить в этап</InputLabel>
                                                        <Select
                                                            label="Добавить в этап"
                                                            onChange={(e) => {
                                                                const value = e.target.value;
                                                                if (value.startsWith('req-')) {
                                                                    const stageId = parseInt(value.replace('req-', ''));
                                                                    addApproverToStage(stageId, user, true);
                                                                } else if (value.startsWith('info-')) {
                                                                    const stageId = parseInt(value.replace('info-', ''));
                                                                    addApproverToStage(stageId, user, false);
                                                                }
                                                            }}
                                                            value=""
                                                        >
                                                            {stages.map(stage => (
                                                                <MenuItem key={`req-${stage.id}`} value={`req-${stage.id}`}>
                                                                    {stage.name} (обязательно)
                                                                </MenuItem>
                                                            ))}
                                                            {stages.map(stage => (
                                                                <MenuItem key={`info-${stage.id}`} value={`info-${stage.id}`}>
                                                                    {stage.name} (ознакомление)
                                                                </MenuItem>
                                                            ))}
                                                        </Select>
                                                    </FormControl>
                                                </Box>
                                            </Paper>
                                        ))}
                                    </Box>
                                </Paper>
                            </Grid>

                            {/* Правая панель - этапы согласования */}
                            <Grid item xs={12} md={7}>
                                <Paper sx={{ p: 2, height: '500px', display: 'flex', flexDirection: 'column' }}>
                                    <Box sx={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', mb: 2 }}>
                                        <Typography variant="h6" sx={{ fontWeight: 500 }}>
                                            Этапы согласования
                                        </Typography>
                                        <Button
                                            size="small"
                                            startIcon={<span className="material-icons">add</span>}
                                            onClick={addStage}
                                            variant="outlined"
                                        >
                                            Добавить этап
                                        </Button>
                                    </Box>

                                    <Box sx={{ flex: 1, overflowY: 'auto' }}>
                                        {stages.map((stage, index) => (
                                            <Paper
                                                key={stage.id}
                                                sx={{
                                                    p: 2,
                                                    mb: 2,
                                                    border: '2px solid #e0e0e0',
                                                    bgcolor: '#fafafa'
                                                }}
                                            >
                                                <Box sx={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', mb: 2 }}>
                                                    <Typography variant="subtitle1" sx={{ fontWeight: 600 }}>
                                                        {stage.name}
                                                    </Typography>
                                                    <Box sx={{ display: 'flex', gap: 1 }}>
                                                        <IconButton
                                                            size="small"
                                                            onClick={() => moveStageUp(stage.id)}
                                                            disabled={index === 0}
                                                        >
                                                            <span className="material-icons">arrow_upward</span>
                                                        </IconButton>
                                                        <IconButton
                                                            size="small"
                                                            onClick={() => moveStageDown(stage.id)}
                                                            disabled={index === stages.length - 1}
                                                        >
                                                            <span className="material-icons">arrow_downward</span>
                                                        </IconButton>
                                                        <IconButton
                                                            size="small"
                                                            onClick={() => removeStage(stage.id)}
                                                            disabled={stages.length === 1}
                                                            color="error"
                                                        >
                                                            <span className="material-icons">delete</span>
                                                        </IconButton>
                                                    </Box>
                                                </Box>

                                                {stage.approvers.length === 0 ? (
                                                    <Typography variant="body2" color="text.secondary" sx={{ fontStyle: 'italic' }}>
                                                        Добавьте согласующих из списка слева
                                                    </Typography>
                                                ) : (
                                                    <Box>
                                                        {stage.approvers.map(approver => (
                                                            <Box
                                                                key={approver.userId}
                                                                sx={{
                                                                    display: 'flex',
                                                                    justifyContent: 'space-between',
                                                                    alignItems: 'center',
                                                                    p: 1,
                                                                    mb: 1,
                                                                    bgcolor: 'white',
                                                                    borderRadius: 1,
                                                                    border: '1px solid #e0e0e0'
                                                                }}
                                                            >
                                                                <Box sx={{ flex: 1 }}>
                                                                    <Typography variant="body2" sx={{ fontWeight: 500 }}>
                                                                        {approver.userName}
                                                                    </Typography>
                                                                    <Chip
                                                                        label={approver.required ? 'Обязательно' : 'Ознакомление'}
                                                                        size="small"
                                                                        sx={{
                                                                            mt: 0.5,
                                                                            bgcolor: approver.required ? '#e3f2fd' : '#fff3e0',
                                                                            color: approver.required ? '#1976d2' : '#e65100',
                                                                            fontSize: 11
                                                                        }}
                                                                    />
                                                                </Box>
                                                                <Box sx={{ display: 'flex', gap: 1 }}>
                                                                    <IconButton
                                                                        size="small"
                                                                        onClick={() => toggleApproverRequired(stage.id, approver.userId)}
                                                                        title="Переключить тип"
                                                                    >
                                                                        <span className="material-icons" style={{ fontSize: 18 }}>
                                                                            swap_horiz
                                                                        </span>
                                                                    </IconButton>
                                                                    <IconButton
                                                                        size="small"
                                                                        onClick={() => removeApproverFromStage(stage.id, approver.userId)}
                                                                        color="error"
                                                                    >
                                                                        <span className="material-icons" style={{ fontSize: 18 }}>
                                                                            close
                                                                        </span>
                                                                    </IconButton>
                                                                </Box>
                                                            </Box>
                                                        ))}
                                                    </Box>
                                                )}

                                                {index < stages.length - 1 && (
                                                    <Box sx={{ display: 'flex', justifyContent: 'center', mt: 2 }}>
                                                        <Chip
                                                            icon={<span className="material-icons" style={{ fontSize: 16 }}>arrow_downward</span>}
                                                            label="Следующий этап"
                                                            size="small"
                                                            sx={{ bgcolor: '#e0e0e0' }}
                                                        />
                                                    </Box>
                                                )}
                                            </Paper>
                                        ))}

                                        {/* Этап утверждения */}
                                        <Paper sx={{ p: 2, border: '2px solid #4caf50', bgcolor: '#f1f8f4' }}>
                                            <FormControlLabel
                                                control={
                                                    <Checkbox
                                                        checked={enableRatification}
                                                        onChange={(e) => {
                                                            setEnableRatification(e.target.checked);
                                                            if (!e.target.checked) {
                                                                setAutoRatification(false);
                                                                setRatifier(null);
                                                            }
                                                        }}
                                                    />
                                                }
                                                label={<Typography variant="subtitle1" sx={{ fontWeight: 600 }}>Этап утверждения</Typography>}
                                            />
                                            {enableRatification && (
                                                <Box sx={{ mt: 2 }}>
                                                    <FormControlLabel
                                                        control={
                                                            <Checkbox
                                                                checked={autoRatification}
                                                                onChange={(e) => setAutoRatification(e.target.checked)}
                                                            />
                                                        }
                                                        label={
                                                            <Box>
                                                                <Typography variant="body2" sx={{ fontWeight: 500 }}>
                                                                    Автоматическое утверждение
                                                                </Typography>
                                                                <Typography variant="caption" color="text.secondary">
                                                                    После успешного согласования автоматически направить на утверждение
                                                                </Typography>
                                                            </Box>
                                                        }
                                                        sx={{ mb: 2 }}
                                                    />
                                                    <FormControl fullWidth size="small">
                                                        <InputLabel>Утверждающий</InputLabel>
                                                        <Select
                                                            value={ratifier || ''}
                                                            onChange={(e) => setRatifier(e.target.value)}
                                                            label="Утверждающий"
                                                        >
                                                            <MenuItem value="">Не выбрано</MenuItem>
                                                            {usersByRole['Руководители'].map(user => (
                                                                <MenuItem key={user.id} value={user.id}>
                                                                    {user.name}
                                                                </MenuItem>
                                                            ))}
                                                            {usersByRole['Директора'].map(user => (
                                                                <MenuItem key={user.id} value={user.id}>
                                                                    {user.name}
                                                                </MenuItem>
                                                            ))}
                                                        </Select>
                                                    </FormControl>
                                                </Box>
                                            )}
                                        </Paper>
                                    </Box>
                                </Paper>
                            </Grid>
                        </Grid>
                    </DialogContent>
                    <DialogActions sx={{ p: 2, borderTop: '1px solid #e0e0e0' }}>
                        <Button onClick={onClose} variant="outlined">
                            Отмена
                        </Button>
                        <Button
                            onClick={handleSubmit}
                            variant="contained"
                            sx={{ bgcolor: '#2c4f7c', '&:hover': { bgcolor: '#1e3a5f' } }}
                        >
                            Далее: Предпросмотр брифа
                        </Button>
                    </DialogActions>
                </Dialog>
            );
        }

        // Компонент: Форма эффектов скоркарты
        function ScorecardForm({ effects, setEffects }) {
            const financialMetrics = [
                { id: 'ar', label: 'AR(абс)' },
                { id: 'volume', label: 'Объём выдач' },
                { id: 'rc', label: 'RC' },
                { id: 'npv', label: 'NPV' }
            ];

            const additionalMetrics = [
                { id: 'high_pd_share', label: 'Доля выдач с ПДН более 80%' },
                { id: 'pd_50_80_share', label: 'Доля выдач с ПДН от 50% до 80%' },
                { id: 'pilot_volume', label: 'Объем выдач в пилотной группе' },
                { id: 'loan_volume', label: 'Объем заявок' },
                { id: 'pilot_loan_volume', label: 'Объем заявок в пилотной группе' },
                { id: 'avg_rate', label: 'Средняя ставка выданных кредитов' },
                { id: 'avg_check', label: 'Средний чек' },
                { id: 'eva_no_chzk', label: 'EVA без ЧЗК' },
                { id: 'eva_with_chzk', label: 'EVA с ЧЗК' },
                { id: 'frp03', label: 'FRP03' },
                { id: 'npv_no_chzk', label: 'NPV без ЧЗК' },
                { id: 'npv_with_chzk', label: 'NPV с ЧЗК' },
                { id: 'rorwa', label: 'RORWA' },
                { id: 'tr', label: 'TR' }
            ];

            const [financialEffects, setFinancialEffects] = useState(
                effects?.financial || financialMetrics.reduce((acc, m) => ({ ...acc, [m.id]: { enabled: false, unit: '%', baseline: '', target: '' } }), {})
            );

            const [selectedAdditionalMetrics, setSelectedAdditionalMetrics] = useState(
                effects?.additionalMetrics || []
            );

            const [strategyIndicators, setStrategyIndicators] = useState(
                effects?.strategyIndicators || {}
            );

            // Функция расчета критичности на основе индикаторов стратегии
            const calculateCriticality = (indicators) => {
                if (!indicators) return 'low';
                // Если хотя бы один чекбокс в разделе "Высокий риск" отмечен - критичность высокая
                return Object.values(indicators).some(value => value === true) ? 'high' : 'low';
            };

            useEffect(() => {
                setEffects({
                    financial: financialEffects,
                    additionalMetrics: selectedAdditionalMetrics,
                    strategyIndicators,
                    criticality: calculateCriticality(strategyIndicators)
                });
            }, [financialEffects, selectedAdditionalMetrics, strategyIndicators]);

            const handleFinancialChange = (id, field, value) => {
                setFinancialEffects({ ...financialEffects, [id]: { ...financialEffects[id], [field]: value } });
            };

            const handleAdditionalMetricAdd = () => {
                setSelectedAdditionalMetrics([
                    ...selectedAdditionalMetrics,
                    { metricId: '', unit: '%', baseline: '', target: '' }
                ]);
            };

            const handleAdditionalMetricRemove = (index) => {
                setSelectedAdditionalMetrics(selectedAdditionalMetrics.filter((_, i) => i !== index));
            };

            const handleAdditionalMetricChange = (index, field, value) => {
                const updated = [...selectedAdditionalMetrics];
                updated[index][field] = value;
                setSelectedAdditionalMetrics(updated);
            };

            const handleStrategyIndicatorToggle = (id) => {
                setStrategyIndicators({ ...strategyIndicators, [id]: !strategyIndicators[id] });
            };

            return (
                <Box>
                    <Paper sx={{ p: 3, mb: 3 }}>
                        <Typography variant="h6" sx={{ fontWeight: 500, mb: 3 }}>
                            Индикаторы изменения стратегии принятия решения по кредитам ФЛ
                        </Typography>

                        <Box sx={{ mb: 3 }}>
                            <Typography variant="subtitle1" sx={{ fontWeight: 600, color: '#d32f2f', mb: 2, pb: 1, borderBottom: '2px solid #d32f2f' }}>
                                Высокий риск внедрения вне зависимости от эффекта
                            </Typography>

                            <Box sx={{ display: 'flex', alignItems: 'center', mb: 1.5, ml: 2 }}>
                                <input
                                    type="checkbox"
                                    checked={strategyIndicators['new_product'] || false}
                                    onChange={() => handleStrategyIndicatorToggle('new_product')}
                                    style={{ width: 20, height: 20, marginRight: 8, cursor: 'pointer' }}
                                />
                                <Typography variant="body2">Запуск новый кредитный продукт/закрытие продукта</Typography>
                            </Box>

                            <Box sx={{ display: 'flex', alignItems: 'center', mb: 1.5, ml: 2 }}>
                                <input
                                    type="checkbox"
                                    checked={strategyIndicators['new_segment'] || false}
                                    onChange={() => handleStrategyIndicatorToggle('new_segment')}
                                    style={{ width: 20, height: 20, marginRight: 8, cursor: 'pointer' }}
                                />
                                <Typography variant="body2">Ввод нового сегмента Клиентов</Typography>
                            </Box>

                            <Box sx={{ display: 'flex', alignItems: 'center', mb: 1.5, ml: 2 }}>
                                <input
                                    type="checkbox"
                                    checked={strategyIndicators['new_channel'] || false}
                                    onChange={() => handleStrategyIndicatorToggle('new_channel')}
                                    style={{ width: 20, height: 20, marginRight: 8, cursor: 'pointer' }}
                                />
                                <Typography variant="body2">Включение нового канала продаж</Typography>
                            </Box>

                            <Box sx={{ display: 'flex', alignItems: 'center', mb: 2, ml: 2 }}>
                                <input
                                    type="checkbox"
                                    checked={strategyIndicators['new_partner'] || false}
                                    onChange={() => handleStrategyIndicatorToggle('new_partner')}
                                    style={{ width: 20, height: 20, marginRight: 8, cursor: 'pointer' }}
                                />
                                <Typography variant="body2">Подключение нового Партнера</Typography>
                            </Box>

        // Компонент: Управление артефактами

                if (!newArtifact.name || !newArtifact.url) {
                    alert('Заполните название и ссылку на артефакт');

                onChange([...artifacts, { ...newArtifact, id: Date.now() }]);

            const handleRemoveArtifact = (id) => {
                onChange(artifacts.filter(a => a.id !== id));

                onSave({
                    name: deploymentName,
                    description: deploymentDescription,
                    product: selectedProduct,
                    subproducts: selectedSubproducts,
                    artifacts: artifacts

            const currentProduct = products.find(p => p.id === selectedProduct);

            };

                if (item.ratifierName) {
                    return {
                        label: `Утверждающий: ${item.ratifierName}`,
                        bgcolor: '#e8f5e9',

                return {
                    label: 'Утверждающий: не выбран',
                    bgcolor: '#fff3e0',
                    color: '#e65100'
                };
            };

            // Получаем связанные данные

            const relatedScorecards = mockScorecards.filter(sc => sc.product === initiative.product);

            const handleSelectSimulation = (simId) => {
                setSelectedSimulations(prev =>
                    prev.includes(simId) ? prev.filter(id => id !== simId) : [...prev, simId]
                );
            };

            const handleSelectPilot = (pilotId) => {
                setSelectedPilots(prev =>
                    prev.includes(pilotId) ? prev.filter(id => id !== pilotId) : [...prev, pilotId]
                );
            };

            const handleToggleApprovalSelection = (id) => {
                setSelectedForApproval(prev =>
                    prev.includes(id) ? prev.filter(itemId => itemId !== id) : [...prev, id]
                );
            };

            const handleToggleRecallSelection = (id) => {
                setSelectedForRecall(prev =>
                    prev.includes(id) ? prev.filter(itemId => itemId !== id) : [...prev, id]
                );
            };

            const handleSendForApproval = () => {
                setApprovalDialogOpen(true);
            };

            const handleRecall = () => {
                alert(`Отозвано с согласования/утверждения: ${selectedForRecall.length} элемент(ов)`);
                setSelectedForRecall([]);
            };

                setApprovalDialogOpen(false);
                setBriefPreviewOpen(true);
            };

            const handleBriefSend = () => {

                setBriefPreviewOpen(false);
                setSelectedForApproval([]);

                // Найти пилоты или внедрения, связанные со скоркартой
                const relatedPilot = mockPilots.find(p => p.scorecards?.includes(scorecard.id));
                const relatedDeployment = mockDeployments.find(c => c.scorecards?.includes(scorecard.id));

                if (relatedPilot) {
                    const initiative = mockInitiatives.find(d => d.id === relatedPilot.initiativeId);
                    return initiative ? initiative.name : null;
                }
                if (relatedDeployment) {
                    const initiative = mockInitiatives.find(d => d.id === relatedDeployment.initiativeId);
                    return initiative ? initiative.name : null;
                }
                return null;

                // Создаем HTML таблицу для Excel с учетом примененных фильтров
                let html = '<html><head><meta charset="utf-8"></head><body><table border="1">';
                html += '<tr><th>ID</th><th>Название</th><th>Продукт</th><th>Шаблон</th><th>Версия</th><th>Критичность</th><th>Статус</th><th>Ручная</th><th>Дата создания</th><th>AR(абс)</th><th>Объём выдач</th><th>NPV</th><th>RC</th></tr>';

                filteredData.forEach(sc => {

                    html += '<tr>';
                    html += `<td>SC-${sc.id}</td>`;
                    html += `<td>${sc.name}</td>`;
                    html += `<td>${prod?.label || sc.product}</td>`;
                    html += `<td>${sc.templateVersion || ''}</td>`;

                    html += '</tr>';
