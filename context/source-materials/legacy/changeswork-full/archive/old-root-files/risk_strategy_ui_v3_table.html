                                                                                                            <Typography variant="caption" color="text.secondary" display="block" fontSize="0.65rem">
                                                                                                                Объём
                                                                                                            </Typography>
                                                                                                            <Typography variant="body2" fontWeight={600} color="primary" fontSize="0.75rem">
                                                                                                                {sc.financialEffects.volume}
                                                                                                            </Typography>
                                                                                                        </Paper>
                                                                                                    </Grid>
                                                                                                    <Grid item xs={3}>
                                                                                                        <Paper variant="outlined" sx={{ p: 0.75, bgcolor: 'white', textAlign: 'center' }}>
                                                                                                            <Typography variant="caption" color="text.secondary" display="block" fontSize="0.65rem">
                                                                                                                NPV
                                                                                                            </Typography>
                                                                                                            <Typography variant="body2" fontWeight={600} color="primary" fontSize="0.75rem">
                                                                                                                {sc.financialEffects.npv}
                                                                                                            </Typography>
                                                                                                        </Paper>
                                                                                                    </Grid>
                                                                                                    <Grid item xs={3}>
                                                                                                        <Paper variant="outlined" sx={{ p: 0.75, bgcolor: 'white', textAlign: 'center' }}>
                                                                                                            <Typography variant="caption" color="text.secondary" display="block" fontSize="0.65rem">
                                                                                                                RC
                                                                                                            </Typography>
                                                                                                            <Typography variant="body2" fontWeight={600} color="primary" fontSize="0.75rem">
                                                                                                                {sc.financialEffects.rc}
                                                                                                            </Typography>
                                                                                                        </Paper>
                                                                                                    </Grid>
                                                                                                </Grid>
                                                                                            </Box>
                                                                                        )}
                                                                                    </Paper>
                                                                                ))}
                                                                            </Stack>
                                                                        </Box>
                                                                    )}
                                                                </Paper>
                                                            );
                                                        })}
                                                    </Stack>
                                                </Box>
                                            );
                                        })()}
                                    </Stack>
                                </DialogContent>
                                <DialogActions>
                                    <Button onClick={() => setPackageDetailOpen(false)}>
                                        Закрыть
                                    </Button>
                                </DialogActions>
                            </>
                        )}
                    </Dialog>
                </Box>
            );
        }

        // Компонент: Пакеты
        function PackagesView({ data, productFilter, onSelectPilot, onSelectDeployment, onSelectScorecard }) {
            const [activeTab, setActiveTab] = useState(0);
            const [selectedForApproval, setSelectedForApproval] = useState([]);
            const [selectedForRecall, setSelectedForRecall] = useState([]);
            const [approvalDialogOpen, setApprovalDialogOpen] = useState(false);
            const [briefPreviewOpen, setBriefPreviewOpen] = useState(false);
            const [approvalRoute, setApprovalRoute] = useState(null);

            const handleToggleApprovalSelection = (id) => {
                setSelectedForApproval(prev =>
                    prev.includes(id) ? prev.filter(itemId => itemId !== id) : [...prev, id]
                );
            };

            const handleToggleRecallSelection = (id) => {
                setSelectedForRecall(prev =>
                    prev.includes(id) ? prev.filter(itemId => itemId !== id) : [...prev, id]
                );
            };

            const handleSendForApproval = () => {
                setApprovalDialogOpen(true);
            };

            const handleApprovalSubmit = (route) => {
                setApprovalRoute(route);
                setApprovalDialogOpen(false);
                setBriefPreviewOpen(true);
            };

            const handleBriefSend = () => {
                alert(`Отправлено на утверждение: ${selectedForApproval.length} элемент(ов)`);
                setBriefPreviewOpen(false);
                setSelectedForApproval([]);
            };

            const handleRecall = () => {
                alert(`Отозвано с согласования/утверждения: ${selectedForRecall.length} элемент(ов)`);
                setSelectedForRecall([]);
            };

            // Получаем пилоты и изменения с учетом выбранного продуктового фильтра
            const allPilots = productFilter === 'all'
                ? mockPilots
                : mockPilots.filter(pilot => pilot.product === productFilter);
            const allDeployments = productFilter === 'all'
                ? mockDeployments
                : mockDeployments.filter(deployment => deployment.product === productFilter);

            const getRatifierMeta = (item) => {
                if (item.ratifierName) {
                    return {
                        label: `Утверждающий: ${item.ratifierName}`,
                        bgcolor: '#e8f5e9',
                        color: '#2e7d32'
                    };
                }

                return {
                    label: 'Утверждающий: не выбран',
                    bgcolor: '#fff3e0',
                    color: '#e65100'
                };
            };

            const getItemBySelectionId = (itemId) => {
                if (itemId.startsWith('pilot-')) {
                    const pilotId = parseInt(itemId.replace('pilot-', ''));
                    return allPilots.find(p => p.id === pilotId);
                }
                if (itemId.startsWith('deployment-')) {
                    const deploymentId = parseInt(itemId.replace('deployment-', ''));
                    return allDeployments.find(c => c.id === deploymentId);
                }
                return null;
            };

            const selectedApprovalItems = selectedForApproval
                .map(getItemBySelectionId)
                .filter(Boolean);

            // Подсчитываем количество элементов для каждой вкладки
            const requiresRatificationCount =
                allPilots.filter(p => p.status === 'requires_ratification').length +
                allDeployments.filter(c => c.status === 'requires_ratification').length;

            const inProcessCount =
                allPilots.filter(p => p.status === 'in_approval' || p.status === 'in_ratification').length +
                allDeployments.filter(c => c.status === 'in_approval' || c.status === 'in_ratification').length;

            const rejectedCount =
                allPilots.filter(p => p.status === 'rejected').length +
                allDeployments.filter(c => c.status === 'rejected').length;

            // Группируем элементы по инициативам
            const groupByInitiative = (items) => {
                const grouped = {};
                items.forEach(item => {
                    if (!grouped[item.initiativeId]) {
                        const initiative = mockInitiatives.find(d => d.id === item.initiativeId);
                        grouped[item.initiativeId] = {
                            initiative: initiative,
                            items: []
                        };
                    }
                    grouped[item.initiativeId].items.push(item);
                });
                return Object.values(grouped);
            };

            return (
                <Box sx={{ width: '100%' }}>
                    <Paper>
                        <Tabs value={activeTab} onChange={(e, v) => setActiveTab(v)}>
                            <Tab label={`Требуют утверждения (${requiresRatificationCount})`} />
                            <Tab label={`На согласовании/утверждении (${inProcessCount})`} />
                            <Tab label={`Отклонено (${rejectedCount})`} />
                            <Tab label="История согласований/утверждений" />
                        </Tabs>

                        <Box sx={{ p: 3 }}>
                            {/* Tab 0: Требуют утверждения */}
                            {activeTab === 0 && (
                                <Box>
                                    <Stack direction="row" justifyContent="space-between" alignItems="center" sx={{ mb: 2 }}>
                                        <Typography variant="h6">Требуют утверждения</Typography>
                                        {selectedForApproval.length > 0 && (
                                            <Button
                                                variant="contained"
                                                startIcon={<span className="material-icons">send</span>}
                                                onClick={handleSendForApproval}
                                                sx={{ bgcolor: '#2c4f7c', '&:hover': { bgcolor: '#1e3a5f' } }}
                                            >
                                                Отправить на утверждение ({selectedForApproval.length})
                                            </Button>
                                        )}
                                    </Stack>

                                    {(() => {
                                        const requiresRatificationItems = [
                                            ...allPilots.filter(p => p.status === 'requires_ratification').map(p => ({...p, type: 'pilot'})),
                                            ...allDeployments.filter(c => c.status === 'requires_ratification').map(c => ({...c, type: 'deployment'}))
                                        ];
                                        const grouped = groupByInitiative(requiresRatificationItems);

                                        return grouped.length > 0 ? (
                                            <Stack spacing={3}>
                                                {grouped.map(group => (
                                                    <Box key={group.initiative.id}>
                                                        <Typography variant="subtitle2" sx={{ mb: 1, color: '#666', fontWeight: 600 }}>
                                                            Инициатива: {group.initiative.name}
                                                        </Typography>
                                                        <Stack spacing={1}>
                                                            {group.items.map(item => {
                                                                const itemId = `${item.type}-${item.id}`;
                                                                const isSelected = selectedForApproval.includes(itemId);
                                                                const ratifierMeta = getRatifierMeta(item);
                                                                return (
                                                                    <Box
                                                                        key={itemId}
                                                                        sx={{
                                                                            p: 1.5,
                                                                            bgcolor: isSelected ? '#e3f2fd' : '#fafafa',
                                                                            borderRadius: 1,
                                                                            border: isSelected ? '2px solid #90caf9' : '1px solid #e0e0e0'
                                                                        }}
                                                                    >
                                                                        <Stack direction="row" justifyContent="space-between" alignItems="center">
                                                                            <Stack direction="row" spacing={2} alignItems="center" sx={{ flex: 1 }}>
                                                                                <Checkbox
                                                                                    checked={isSelected}
                                                                                    onChange={() => handleToggleApprovalSelection(itemId)}
                                                                                />
                                                                                <Box>
                                                                                    <Typography
                                                                                        variant="body2"
                                                                                        fontWeight={500}
                                                                                        sx={{
                                                                                            color: '#1976d2',
                                                                                            cursor: 'pointer',
                                                                                            '&:hover': { textDecoration: 'underline' }
                                                                                        }}
                                                                                        onClick={(e) => {
                                                                                            e.stopPropagation();
                                                                                            if (item.type === 'pilot') {
                                                                                                onSelectPilot && onSelectPilot(item);
                                                                                            } else {
                                                                                                onSelectDeployment && onSelectDeployment(item);
                                                                                            }
                                                                                        }}
                                                                                    >
                                                                                        {item.type === 'pilot' ? 'Пилот' : 'Внедрение'}: {item.name}
                                                                                    </Typography>
                                                                                    <Typography variant="caption" color="text.secondary">
                                                                                        {item.type === 'pilot' ? 'PLT' : 'DEP'}-{item.id} • Создан {item.createdAt}
                                                                                    </Typography>
                                                                                    <EntityScorecardBlock entity={item} maxItems={2} onSelectScorecard={onSelectScorecard} />
                                                                                    <Box sx={{ mt: 0.75 }}>
                                                                                        <Chip
                                                                                            label={ratifierMeta.label}
                                                                                            size="small"
                                                                                            sx={{
                                                                                                bgcolor: ratifierMeta.bgcolor,
                                                                                                color: ratifierMeta.color,
                                                                                                fontWeight: 500,
                                                                                                height: 22
                                                                                            }}
                                                                                        />
                                                                                    </Box>
                                                                                </Box>
                                                                            </Stack>
                                                                            <Chip
                                                                                label={getStatusLabel(item.status)}
                                                                                size="small"
                                                                                color="warning"
                                                                            />
                                                                        </Stack>
                                                                    </Box>
                                                                );
                                                            })}
                                                        </Stack>
                                                    </Box>
                                                ))}
                                            </Stack>
                                        ) : (
                                            <Typography variant="body2" color="text.secondary">
                                                Нет элементов, требующих утверждения
                                            </Typography>
                                        );
                                    })()}
                                </Box>
                            )}

                            {/* Tab 1: На согласовании/утверждении */}
                            {activeTab === 1 && (
                                <Box>
                                    <Stack direction="row" justifyContent="space-between" alignItems="center" sx={{ mb: 2 }}>
                                        <Typography variant="h6">На согласовании/утверждении</Typography>
                                        {selectedForRecall.length > 0 && (
                                            <Button
                                                variant="outlined"
                                                color="error"
                                                startIcon={<span className="material-icons">undo</span>}
                                                onClick={handleRecall}
                                            >
                                                Отозвать ({selectedForRecall.length})
                                            </Button>
                                        )}
                                    </Stack>

                                    {(() => {
                                        const inProcessItems = [
                                            ...allPilots.filter(p => p.status === 'in_approval' || p.status === 'in_ratification').map(p => ({...p, type: 'pilot'})),
                                            ...allDeployments.filter(c => c.status === 'in_approval' || c.status === 'in_ratification').map(c => ({...c, type: 'deployment'}))
                                        ];
                                        const grouped = groupByInitiative(inProcessItems);

                                        return grouped.length > 0 ? (
                                            <Stack spacing={3}>
                                                {grouped.map(group => (
                                                    <Box key={group.initiative.id}>
                                                        <Typography variant="subtitle2" sx={{ mb: 1, color: '#666', fontWeight: 600 }}>
                                                            Инициатива: {group.initiative.name}
                                                        </Typography>
                                                        <Stack spacing={1}>
                                                            {group.items.map(item => {
                                                                const itemId = `${item.type}-${item.id}`;
                                                                const isSelected = selectedForRecall.includes(itemId);
                                                                const ratifierMeta = getRatifierMeta(item);
                                                                return (
                                                                    <Box
                                                                        key={itemId}
                                                                        sx={{
                                                                            p: 1.5,
                                                                            bgcolor: isSelected ? '#ffebee' : '#fafafa',
                                                                            borderRadius: 1,
                                                                            border: isSelected ? '2px solid #ef9a9a' : '1px solid #e0e0e0'
                                                                        }}
                                                                    >
                                                                        <Stack direction="row" justifyContent="space-between" alignItems="center">
                                                                            <Stack direction="row" spacing={2} alignItems="center" sx={{ flex: 1 }}>
                                                                                <Checkbox
                                                                                    checked={isSelected}
                                                                                    onChange={() => handleToggleRecallSelection(itemId)}
                                                                                />
                                                                                <Box>
                                                                                    <Typography
                                                                                        variant="body2"
                                                                                        fontWeight={500}
                                                                                        sx={{
                                                                                            color: '#1976d2',
                                                                                            cursor: 'pointer',
                                                                                            '&:hover': { textDecoration: 'underline' }
                                                                                        }}
                                                                                        onClick={(e) => {
                                                                                            e.stopPropagation();
                                                                                            if (item.type === 'pilot') {
                                                                                                onSelectPilot && onSelectPilot(item);
                                                                                            } else {
                                                                                                onSelectDeployment && onSelectDeployment(item);
                                                                                            }
                                                                                        }}
                                                                                    >
                                                                                        {item.type === 'pilot' ? 'Пилот' : 'Внедрение'}: {item.name}
                                                                                    </Typography>
                                                                                    <Typography variant="caption" color="text.secondary">
                                                                                        {item.type === 'pilot' ? 'PLT' : 'DEP'}-{item.id} • Создан {item.createdAt}
                                                                                    </Typography>
                                                                                    <EntityScorecardBlock entity={item} maxItems={2} onSelectScorecard={onSelectScorecard} />
                                                                                    <Box sx={{ mt: 0.75 }}>
                                                                                        <Chip
                                                                                            label={ratifierMeta.label}
                                                                                            size="small"
                                                                                            sx={{
                                                                                                bgcolor: ratifierMeta.bgcolor,
                                                                                                color: ratifierMeta.color,
                                                                                                fontWeight: 500,
                                                                                                height: 22
                                                                                            }}
                                                                                        />
                                                                                    </Box>
                                                                                </Box>
                                                                            </Stack>
                                                                            <Chip
                                                                                label={getStatusLabel(item.status)}
                                                                                size="small"
                                                                                color="info"
                                                                            />
                                                                        </Stack>
                                                                    </Box>
                                                                );
                                                            })}
                                                        </Stack>
                                                    </Box>
                                                ))}
                                            </Stack>
                                        ) : (
                                            <Typography variant="body2" color="text.secondary">
                                                Нет элементов на согласовании/утверждении
                                            </Typography>
                                        );
                                    })()}
                                </Box>
                            )}

                            {/* Tab 2: Отклонено */}
                            {activeTab === 2 && (
                                <Box>
                                    <Typography variant="h6" sx={{ mb: 2 }}>Отклонено</Typography>

                                    {(() => {
                                        const rejectedItems = [
                                            ...allPilots.filter(p => p.status === 'rejected').map(p => ({...p, type: 'pilot'})),
                                            ...allDeployments.filter(c => c.status === 'rejected').map(c => ({...c, type: 'deployment'}))
                                        ];
                                        const grouped = groupByInitiative(rejectedItems);

                                        return grouped.length > 0 ? (
                                            <Stack spacing={3}>
                                                {grouped.map(group => (
                                                    <Box key={group.initiative.id}>
                                                        <Typography variant="subtitle2" sx={{ mb: 1, color: '#666', fontWeight: 600 }}>
                                                            Инициатива: {group.initiative.name}
                                                        </Typography>
                                                        <Stack spacing={1}>
                                                            {group.items.map(item => {
                                                                const ratifierMeta = getRatifierMeta(item);
                                                                return (
                                                                    <Box key={`${item.type}-${item.id}`} sx={{ p: 1.5, bgcolor: '#ffebee', borderRadius: 1 }}>
                                                                        <Stack direction="row" justifyContent="space-between" alignItems="center">
                                                                            <Box>
                                                                                <Typography
                                                                                    variant="body2"
                                                                                    fontWeight={500}
                                                                                    sx={{
                                                                                        color: '#1976d2',
                                                                                        cursor: 'pointer',
                                                                                        '&:hover': { textDecoration: 'underline' }
                                                                                    }}
                                                                                    onClick={() => {
                                                                                        if (item.type === 'pilot') {
                                                                                            onSelectPilot && onSelectPilot(item);
                                                                                        } else {
                                                                                            onSelectChange && onSelectChange(item);
                                                                                        }
                                                                                    }}
                                                                                >
                                                                                    {item.type === 'pilot' ? 'Пилот' : 'Внедрение'}: {item.name}
                                                                                </Typography>
                                                                                <Typography variant="caption" color="text.secondary">
                                                                                    {item.type === 'pilot' ? 'PLT' : 'DEP'}-{item.id} • Отклонено на этапе {item.rejectedAt === 'approval' ? 'согласования' : 'утверждения'}
                                                                                </Typography>
                                                                                <EntityScorecardBlock entity={item} maxItems={2} onSelectScorecard={onSelectScorecard} />
                                                                                <Box sx={{ mt: 0.75 }}>
                                                                                    <Chip
                                                                                        label={ratifierMeta.label}
                                                                                        size="small"
                                                                                        sx={{
                                                                                            bgcolor: ratifierMeta.bgcolor,
                                                                                            color: ratifierMeta.color,
                                                                                            fontWeight: 500,
                                                                                            height: 22
                                                                                        }}
                                                                                    />
                                                                                </Box>
                                                                                <Typography variant="caption" color="error.main" sx={{ display: 'block', mt: 0.5 }}>
                                                                                    Причина: {item.rejectionReason}
                                                                                </Typography>
                                                                            </Box>
                                                                            <Chip label="Отклонено" color="error" size="small" />
                                                                        </Stack>
                                                                    </Box>
                                                                );
                                                            })}
                                                        </Stack>
                                                    </Box>
                                                ))}
                                            </Stack>
                                        ) : (
                                            <Typography variant="body2" color="text.secondary">
                                                Нет отклоненных элементов
                                            </Typography>
                                        );
                                    })()}
                                </Box>
                            )}

                            {/* Tab 3: История согласований/утверждений */}
                            {activeTab === 3 && (
                                <Box>
                                    <Typography variant="h6" sx={{ mb: 2 }}>История согласований/утверждений</Typography>
                                    <Stack spacing={2}>
                                        <Box sx={{ p: 1.5, bgcolor: '#f5f5f5', borderRadius: 1 }}>
                                            <Typography variant="body2" fontWeight={500}>
                                                Внедрение "Внедрение новой скоркарты Premium" одобрено
                                            </Typography>
                                            <Typography variant="caption" color="text.secondary">
                                                2026-02-20 • Одобрил: Петров П.П.
                                            </Typography>
                                        </Box>
                                        <Box sx={{ p: 1.5, bgcolor: '#f5f5f5', borderRadius: 1 }}>
                                            <Typography variant="body2" fontWeight={500}>
                                                Пилот "Пилот Premium Q1 2026" активирован
                                            </Typography>
                                            <Typography variant="caption" color="text.secondary">
                                                2026-02-10 • Одобрил: Иванов И.И.
                                            </Typography>
                                        </Box>
                                        <Box sx={{ p: 1.5, bgcolor: '#ffebee', borderRadius: 1 }}>
                                            <Typography variant="body2" fontWeight={500}>
                                                Внедрение "Снижение минимального дохода" отклонено на этапе утверждения
                                            </Typography>
                                            <Typography variant="caption" color="text.secondary">
                                                2026-02-14 • Отклонил: Волков А.Н.
                                            </Typography>
                                            <Typography variant="caption" color="error.main" sx={{ display: 'block', mt: 0.5 }}>
                                                Причина: Высокие риски увеличения дефолтности
                                            </Typography>
                                        </Box>
                                        <Box sx={{ p: 1.5, bgcolor: '#ffebee', borderRadius: 1 }}>
                                            <Typography variant="body2" fontWeight={500}>
                                                Пилот "Пилот Classic базовые условия" отклонен на этапе согласования
                                            </Typography>
                                            <Typography variant="caption" color="text.secondary">
                                                2026-02-11 • Отклонил: Морозова Е.И.
                                            </Typography>
                                            <Typography variant="caption" color="error.main" sx={{ display: 'block', mt: 0.5 }}>
                                                Причина: Недостаточное обоснование изменений
                                            </Typography>
                                        </Box>
                                    </Stack>
                                </Box>
                            )}
                        </Box>
                    </Paper>

                    <RatificationRouteDialog
                        open={approvalDialogOpen}
                        onClose={() => setApprovalDialogOpen(false)}
                        items={selectedApprovalItems}
                        onSubmit={handleApprovalSubmit}
                    />

                    <BriefPreviewDialog
                        open={briefPreviewOpen}
                        onClose={() => setBriefPreviewOpen(false)}
                        items={selectedApprovalItems}
                        route={approvalRoute}
                        onSend={handleBriefSend}
                    />
                </Box>
            );
        }

        // Рендер приложения
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
