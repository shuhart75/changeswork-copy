<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP Tasks Review - Interactive Playground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.6;
        }

        .container {
            display: grid;
            grid-template-columns: 400px 1fr;
            grid-template-rows: 1fr auto;
            height: 100vh;
            gap: 0;
        }

        .sidebar {
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid #30363d;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 12px;
        }

        .stat {
            padding: 8px;
            background: #0d1117;
            border-radius: 6px;
            text-align: center;
            font-size: 12px;
        }

        .stat-value {
            display: block;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .stat.keep { color: #3fb950; }
        .stat.remove { color: #f85149; }
        .stat.adjust { color: #d29922; }

        .filters {
            padding: 16px 20px;
            border-bottom: 1px solid #30363d;
        }

        .filter-group {
            margin-bottom: 12px;
        }

        .filter-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #8b949e;
            margin-bottom: 6px;
            display: block;
        }

        .filter-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 4px 10px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: #30363d;
        }

        .filter-btn.active {
            background: #1f6feb;
            border-color: #1f6feb;
            color: white;
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .task-item {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .task-item:hover {
            border-color: #58a6ff;
            background: #161b22;
        }

        .task-item.active {
            border-color: #1f6feb;
            background: #161b22;
        }

        .task-item.keep {
            border-left: 3px solid #3fb950;
        }

        .task-item.remove {
            border-left: 3px solid #f85149;
            opacity: 0.6;
        }

        .task-item.adjust {
            border-left: 3px solid #d29922;
        }

        .task-id {
            font-weight: 600;
            color: #58a6ff;
            font-size: 13px;
        }

        .task-summary {
            font-size: 13px;
            margin-top: 4px;
            color: #c9d1d9;
        }

        .task-meta {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            font-size: 11px;
            color: #8b949e;
        }

        .main-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .detail-header {
            padding: 20px;
            border-bottom: 1px solid #30363d;
            background: #161b22;
        }

        .detail-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .decision-buttons {
            display: flex;
            gap: 8px;
        }

        .decision-btn {
            padding: 8px 16px;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: #21262d;
            color: #c9d1d9;
        }

        .decision-btn:hover {
            background: #30363d;
        }

        .decision-btn.keep {
            background: #238636;
            border-color: #238636;
            color: white;
        }

        .decision-btn.keep:hover {
            background: #2ea043;
        }

        .decision-btn.remove {
            background: #da3633;
            border-color: #da3633;
            color: white;
        }

        .decision-btn.remove:hover {
            background: #f85149;
        }

        .decision-btn.adjust {
            background: #9e6a03;
            border-color: #9e6a03;
            color: white;
        }

        .decision-btn.adjust:hover {
            background: #bb7506;
        }

        .detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .field-group {
            margin-bottom: 20px;
        }

        .field-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #8b949e;
            margin-bottom: 6px;
            display: block;
        }

        .field-input {
            width: 100%;
            padding: 8px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }

        .field-input:focus {
            outline: none;
            border-color: #1f6feb;
        }

        textarea.field-input {
            min-height: 100px;
        }

        .field-value {
            padding: 8px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-size: 13px;
        }

        .criteria-list {
            list-style: none;
        }

        .criteria-item {
            padding: 6px 0;
            font-size: 13px;
            color: #8b949e;
        }

        .criteria-item::before {
            content: '□ ';
            color: #58a6ff;
            margin-right: 6px;
        }

        .prompt-panel {
            grid-column: 1 / -1;
            background: #161b22;
            border-top: 1px solid #30363d;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .prompt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .prompt-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            color: #8b949e;
        }

        .copy-btn {
            padding: 6px 12px;
            background: #238636;
            border: 1px solid #238636;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #2ea043;
        }

        .copy-btn.copied {
            background: #1f6feb;
            border-color: #1f6feb;
        }

        .prompt-content {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: #c9d1d9;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8b949e;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #0d1117;
        }

        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="header">
                <h1>MVP Tasks Review</h1>
                <div class="stats">
                    <div class="stat keep">
                        <span class="stat-value" id="keepCount">0</span>
                        <span>Keep</span>
                    </div>
                    <div class="stat remove">
                        <span class="stat-value" id="removeCount">0</span>
                        <span>Remove</span>
                    </div>
                    <div class="stat adjust">
                        <span class="stat-value" id="adjustCount">0</span>
                        <span>Adjust</span>
                    </div>
                </div>
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label class="filter-label">Task Type</label>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter-type="type" data-value="all">All</button>
                        <button class="filter-btn" data-filter-type="type" data-value="BE">Backend</button>
                        <button class="filter-btn" data-filter-type="type" data-value="FE">Frontend</button>
                        <button class="filter-btn" data-filter-type="type" data-value="AN">Analytics</button>
                        <button class="filter-btn" data-filter-type="type" data-value="QA">QA</button>
                    </div>
                </div>

                <div class="filter-group">
                    <label class="filter-label">Decision</label>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter-type="decision" data-value="all">All</button>
                        <button class="filter-btn" data-filter-type="decision" data-value="pending">Pending</button>
                        <button class="filter-btn" data-filter-type="decision" data-value="keep">Keep</button>
                        <button class="filter-btn" data-filter-type="decision" data-value="adjust">Adjust</button>
                        <button class="filter-btn" data-filter-type="decision" data-value="remove">Remove</button>
                    </div>
                </div>
            </div>

            <div class="task-list" id="taskList"></div>
        </div>

        <div class="main-panel">
            <div class="detail-header" id="detailHeader" style="display: none;">
                <div class="detail-title" id="detailTitle"></div>
                <div class="decision-buttons">
                    <button class="decision-btn keep" onclick="setDecision('keep')">✓ Keep</button>
                    <button class="decision-btn adjust" onclick="setDecision('adjust')">⚡ Adjust</button>
                    <button class="decision-btn remove" onclick="setDecision('remove')">✗ Remove</button>
                </div>
            </div>

            <div class="detail-content" id="detailContent">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div>Select a task to review</div>
                </div>
            </div>
        </div>

        <div class="prompt-panel">
            <div class="prompt-header">
                <div class="prompt-title">Export Summary</div>
                <button class="copy-btn" onclick="copyPrompt()">Copy to Clipboard</button>
            </div>
            <div class="prompt-content" id="promptContent">No decisions made yet. Review tasks and make decisions to generate export.</div>
        </div>
    </div>

            { id: 'QA-8', type: 'QA', summary: 'Регрессионное тестирование', description: 'Регрессионное тестирование:\n- Полное тестирование функционала\n- Проверка багов\n- Smoke тесты\n- Sanity тесты', priority: 'Критический', estimate: '5 дней', dependencies: ['QA-7'], acceptanceCriteria: ['Регрессия пройдена', 'Баги задокументированы', 'Smoke тесты готовы', 'Sanity тесты готовы'] },
            { id: 'QA-9', type: 'QA', summary: 'Подготовка к релизу', description: 'Подготовка к релизу:\n- Финальная проверка\n- Release notes\n- Чек-лист релиза\n- Rollback план', priority: 'Критический', estimate: '3 дня', dependencies: ['QA-8'], acceptanceCriteria: ['Финальная проверка пройдена', 'Release notes готовы', 'Чек-лист готов', 'Rollback план готов'] }
        ];

        let state = {
            tasks: TASKS.map(t => ({ ...t, decision: 'pending', comment: '', edited: false })),
            activeTaskId: null,
            filters: {
                type: 'all',
                decision: 'all'
            }
        };

        function init() {
            renderTaskList();
            renderStats();
            updatePrompt();
            setupEventListeners();
        }

        function setupEventListeners() {
            document.querySelectorAll('[data-filter-type]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const filterType = e.target.dataset.filterType;
                    const value = e.target.dataset.value;
                    
                    document.querySelectorAll(`[data-filter-type="${filterType}"]`).forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    
                    state.filters[filterType] = value;
                    renderTaskList();
                });
            });
        }

        function getFilteredTasks() {
            return state.tasks.filter(task => {
                if (state.filters.type !== 'all' && task.type !== state.filters.type) return false;
                if (state.filters.decision !== 'all' && task.decision !== state.filters.decision) return false;
                return true;
            });
        }

        function renderTaskList() {
            const taskList = document.getElementById('taskList');
            const filtered = getFilteredTasks();
            
            if (filtered.length === 0) {
                taskList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><div>No tasks match filters</div></div>';
                return;
            }
            
            taskList.innerHTML = filtered.map(task => `
                <div class="task-item ${task.decision} ${state.activeTaskId === task.id ? 'active' : ''}" onclick="selectTask('${task.id}')">
                    <div class="task-id">${task.id}</div>
                    <div class="task-summary">${task.summary}</div>
                    <div class="task-meta">
                        <span>${task.priority}</span>
                        <span>•</span>
                        <span>${task.estimate}</span>
                    </div>
                </div>
            `).join('');
        }

        function selectTask(taskId) {
            state.activeTaskId = taskId;
            const task = state.tasks.find(t => t.id === taskId);
            
            renderTaskList();
            renderTaskDetail(task);
        }

        function renderTaskDetail(task) {
            const header = document.getElementById('detailHeader');
            const content = document.getElementById('detailContent');
            const title = document.getElementById('detailTitle');
            
            header.style.display = 'block';
            title.textContent = `${task.id}: ${task.summary}`;
            
            content.innerHTML = `
                <div class="field-group">
                    <label class="field-label">Summary</label>
                    <input type="text" class="field-input" value="${task.summary}" onchange="updateTaskField('${task.id}', 'summary', this.value)">
                </div>
                
                <div class="field-group">
                    <label class="field-label">Description</label>
                    <textarea class="field-input" onchange="updateTaskField('${task.id}', 'description', this.value)">${task.description}</textarea>
                </div>
                
                <div class="field-group">
                    <label class="field-label">Priority</label>
                    <div class="field-value">${task.priority}</div>
                </div>
                
                <div class="field-group">
                    <label class="field-label">Estimate</label>
                    <div class="field-value">${task.estimate}</div>
                </div>
                
                <div class="field-group">
                    <label class="field-label">Dependencies</label>
                    <div class="field-value">${task.dependencies.length > 0 ? task.dependencies.join(', ') : 'None'}</div>
                </div>
                
                <div class="field-group">
                    <label class="field-label">Acceptance Criteria</label>
                    <ul class="criteria-list">
                        ${task.acceptanceCriteria.map(c => `<li class="criteria-item">${c}</li>`).join('')}
                    </ul>
                </div>
                
                <div class="field-group">
                    <label class="field-label">Comments / Adjustments</label>
                    <textarea class="field-input" placeholder="Add your comments or describe adjustments..." onchange="updateTaskField('${task.id}', 'comment', this.value)">${task.comment}</textarea>
                </div>
            `;
        }

        function updateTaskField(taskId, field, value) {
            const task = state.tasks.find(t => t.id === taskId);
            if (task) {
                task[field] = value;
                if (field === 'summary' || field === 'description') {
                    task.edited = true;
                }
                renderTaskList();
                updatePrompt();
            }
        }

        function setDecision(decision) {
            if (!state.activeTaskId) return;
            
            const task = state.tasks.find(t => t.id === state.activeTaskId);
            if (task) {
                task.decision = decision;
                renderTaskList();
                renderStats();
                updatePrompt();
            }
        }

        function renderStats() {
            const keep = state.tasks.filter(t => t.decision === 'keep').length;
            const remove = state.tasks.filter(t => t.decision === 'remove').length;
            const adjust = state.tasks.filter(t => t.decision === 'adjust').length;
            
            document.getElementById('keepCount').textContent = keep;
            document.getElementById('removeCount').textContent = remove;
            document.getElementById('adjustCount').textContent = adjust;
        }

        function updatePrompt() {
            const keep = state.tasks.filter(t => t.decision === 'keep');
            const adjust = state.tasks.filter(t => t.decision === 'adjust');
            const remove = state.tasks.filter(t => t.decision === 'remove');
            
            if (keep.length === 0 && adjust.length === 0 && remove.length === 0) {
                document.getElementById('promptContent').textContent = 'No decisions made yet. Review tasks and make decisions to generate export.';
                return;
            }
            
            let prompt = '# MVP Tasks Review Summary\n\n';
            
            if (keep.length > 0) {
                prompt += `## ✅ Tasks to KEEP (${keep.length})\n\n`;
                keep.forEach(t => {
                    prompt += `**${t.id}**: ${t.summary}\n`;
                    if (t.comment) prompt += `  → Comment: ${t.comment}\n`;
                    prompt += '\n';
                });
            }
            
            if (adjust.length > 0) {
                prompt += `## ⚡ Tasks to ADJUST (${adjust.length})\n\n`;
                adjust.forEach(t => {
                    prompt += `**${t.id}**: ${t.summary}\n`;
                    if (t.edited) prompt += `  → Summary/Description edited\n`;
                    if (t.comment) prompt += `  → Adjustments: ${t.comment}\n`;
                    prompt += '\n';
                });
            }
            
            if (remove.length > 0) {
                prompt += `## ❌ Tasks to REMOVE (${remove.length})\n\n`;
                remove.forEach(t => {
                    prompt += `**${t.id}**: ${t.summary}\n`;
                    if (t.comment) prompt += `  → Reason: ${t.comment}\n`;
                    prompt += '\n';
                });
            }
            
            prompt += '\n---\n\n';
            prompt += `**Total reviewed**: ${keep.length + adjust.length + remove.length} / ${state.tasks.length}\n`;
            prompt += `**Pending**: ${state.tasks.filter(t => t.decision === 'pending').length}\n`;
            
            document.getElementById('promptContent').textContent = prompt;
        }

        function copyPrompt() {
            const content = document.getElementById('promptContent').textContent;
            navigator.clipboard.writeText(content).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '✓ Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copy to Clipboard';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
