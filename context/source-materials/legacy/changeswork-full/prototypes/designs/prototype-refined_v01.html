<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            /* Refined Color Palette */
            --color-navy: #0a1628;
            --color-navy-light: #1e4d7b;
            --color-gold: #d4af37;
            --color-gold-light: #e8c968;
            --color-bg: #faf9f7;
            --color-surface: #f5f3ef;
            --color-surface-elevated: #ffffff;
            --color-text: #2d2d2d;
            --color-text-secondary: #6b6b6b;
            --color-text-tertiary: #9a9a9a;
            --color-border: rgba(45, 45, 45, 0.12);
            --color-success: #2d5016;
            --color-warning: #c45500;
            --color-error: #8b1538;

            /* Typography */
            --font-display: 'Crimson Pro', serif;
            --font-body: 'Work Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            /* Spacing */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-2xl: 48px;

            /* Shadows */
            --shadow-sm: 0 1px 3px rgba(10, 22, 40, 0.08), 0 1px 2px rgba(10, 22, 40, 0.06);
            --shadow-md: 0 4px 6px rgba(10, 22, 40, 0.07), 0 2px 4px rgba(10, 22, 40, 0.06);
            --shadow-lg: 0 10px 15px rgba(10, 22, 40, 0.1), 0 4px 6px rgba(10, 22, 40, 0.05);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: var(--font-body);
            background-color: var(--color-bg);
            color: var(--color-text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Subtle texture overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' /%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.03' /%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        #root {
            height: 100vh;
            display: flex;
        }

        /* Refined Sidebar */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, var(--color-navy) 0%, #0d1f35 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            border-right: 1px solid rgba(212, 175, 55, 0.15);
            position: relative;
        }

        .sidebar::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg,
                transparent 0%,
                var(--color-gold) 20%,
                var(--color-gold) 80%,
                transparent 100%);
            opacity: 0.3;
        }

        .sidebar-header {
            padding: var(--spacing-xl) var(--spacing-lg);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sidebar-header h1 {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 var(--spacing-xs) 0;
            color: var(--color-gold);
            letter-spacing: -0.5px;
        }

        .sidebar-header p {
            font-size: 13px;
            margin: 0;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
        }

        .sidebar-menu {
            flex: 1;
            padding: var(--spacing-md) 0;
        }

        .sidebar-item {
            padding: 14px var(--spacing-lg);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            color: rgba(255, 255, 255, 0.75);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 15px;
            font-weight: 400;
            position: relative;
        }

        .sidebar-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 0;
            background: var(--color-gold);
            transition: height 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-item:hover {
            background-color: rgba(255, 255, 255, 0.04);
            color: #ffffff;
        }

        .sidebar-item:hover::before {
            height: 60%;
        }

        .sidebar-item.active {
            background-color: rgba(212, 175, 55, 0.12);
            color: var(--color-gold-light);
            font-weight: 500;
        }

        .sidebar-item.active::before {
            height: 100%;
        }

        .sidebar-item .material-icons {
            font-size: 20px;
            opacity: 0.9;
        }

        .sidebar-subitem {
            padding: 11px var(--spacing-lg) 11px 58px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            transition: all 0.2s;
            position: relative;
        }

        .sidebar-subitem::before {
            content: '—';
            position: absolute;
            left: 42px;
            color: rgba(255, 255, 255, 0.3);
        }

        .sidebar-subitem:hover {
            background-color: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.9);
        }

        .sidebar-subitem.active {
            background-color: rgba(212, 175, 55, 0.08);
            color: var(--color-gold-light);
            font-weight: 500;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Refined Top Bar */
        .top-bar {
            background: var(--color-surface-elevated);
            padding: var(--spacing-md) var(--spacing-xl);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }

        .top-bar-title {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 600;
            color: var(--color-navy);
            margin: 0;
            letter-spacing: -0.5px;
        }

        .content-wrapper {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: var(--spacing-xl);
        }

        /* Refined Status Chips */
        .status-chip {
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 500;
            height: 26px;
            border-radius: 4px;
            letter-spacing: 0.3px;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--color-surface);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(10, 22, 40, 0.2);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(10, 22, 40, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const {

            Dialog, DialogTitle, DialogContent, DialogActions, Tabs, Tab,
            List, ListItem, ListItemText, ListItemAvatar, Avatar, Divider,

        const React = window.React;
        const { useState, useEffect } = React;

        // Refined Theme
        const theme = createTheme({
            palette: {
                primary: {
                    main: '#0a1628',
                    light: '#1e4d7b',
                    dark: '#050b14',

                secondary: {
                    main: '#d4af37',

                },

                },

                    light: '#e67a33',
                },

                h2: { fontFamily: "'Crimson Pro', serif", fontWeight: 700, letterSpacing: '-0.5px' },
                h3: { fontFamily: "'Crimson Pro', serif", fontWeight: 600, letterSpacing: '-0.3px' },
                h4: { fontFamily: "'Crimson Pro', serif", fontWeight: 600, letterSpacing: '-0.3px' },

                        },

                },

        // Status utilities with refined colors
        const getStatusColor = (status) => {
            const colors = {
                draft: 'default',
                active: 'primary',
                running: 'info',
                completed: 'success',
                failed: 'error',
                requires_activation: 'warning',
                requires_approval: 'warning',
                requires_ratification: 'warning',
                requires_correction: 'warning',
                in_approval: 'info',
                in_ratification: 'info',
                approved: 'success',
                deployed: 'success',
                archived: 'default',
                pending: 'default',
                in_progress: 'info',
                rejected: 'error',
                disabled: 'default',
            };
            return colors[status] || 'default';
        };

        const getStatusStyles = (status) => {
            const styles = {
                draft: { bgcolor: '#e8e6e1', color: '#6b6b6b' },
                archived: { bgcolor: '#e8e6e1', color: '#6b6b6b' },

                active: { bgcolor: '#d4e3f0', color: '#1e4d7b' },
                
                running: { bgcolor: '#cfe2f3', color: '#0a1628' },
                in_approval: { bgcolor: '#cfe2f3', color: '#0a1628' },
                in_ratification: { bgcolor: '#cfe2f3', color: '#0a1628' },
                in_progress: { bgcolor: '#cfe2f3', color: '#0a1628' },
                
                requires_activation: { bgcolor: '#fce8d6', color: '#c45500' },
                requires_approval: { bgcolor: '#fce8d6', color: '#c45500' },
                requires_ratification: { bgcolor: '#fce8d6', color: '#c45500' },
                requires_correction: { bgcolor: '#fce8d6', color: '#c45500' },
                
                completed: { bgcolor: '#d9ead3', color: '#2d5016' },
                approved: { bgcolor: '#d9ead3', color: '#2d5016' },
                deployed: { bgcolor: '#d9ead3', color: '#2d5016' },
                
                failed: { bgcolor: '#f4cccc', color: '#8b1538' },
                rejected: { bgcolor: '#f4cccc', color: '#8b1538' },
            };
            return styles[status] || { bgcolor: '#e8e6e1', color: '#6b6b6b' };
        };

        const getStatusLabel = (status) => {
            const labels = {
                draft: 'Черновик',
                new: 'Новый',
                active: 'Активен',
                disabled: 'Выключен',
                running: 'Выполняется',
                completed: 'Завершено',
                failed: 'Ошибка',
                requires_activation: 'Требует активации',
                requires_approval: 'Требует одобрения',
                requires_ratification: 'Требует утверждения',
                requires_correction: 'Требует корректировки',

                in_ratification: 'На утверждении',
                approved: 'Одобрено',
                deployed: 'Внедрено',

                pending: 'Ожидание',

                rejected: 'Отклонено',
                simulation: 'Симуляция',
                pilot: 'Пилот',
                change: 'Внедрение',
            };
            return labels[status] || status;
        };

        const getCriticalityStyles = (criticality) => {
            if (criticality === 'high') {
                return { bgcolor: '#f4cccc', color: '#8b1538' };
            }
            if (criticality === 'low') {
                return { bgcolor: '#d9ead3', color: '#2d5016' };
            }
            return { bgcolor: '#e8e6e1', color: '#6b6b6b' };
        };

        const getCriticalityLabel = (criticality) => {
            const labels = {
                high: 'высокая',
                low: 'низкая',
            };
            return labels[criticality] || 'низкая';
        };

        const getPriorityStyles = (priority) => {
            const styles = {
                high: { bgcolor: '#f4cccc', color: '#8b1538' },
                medium: { bgcolor: '#fce8d6', color: '#c45500' },
                low: { bgcolor: '#e8e6e1', color: '#6b6b6b' },
            };
            return styles[priority] || { bgcolor: '#e8e6e1', color: '#6b6b6b' };
        };

        const getPriorityLabel = (priority) => {
            const labels = {
                high: 'Высокий',
                medium: 'Средний',
                low: 'Низкий',
            };
            return labels[priority] || priority;
        };

        // Mock Data
        const products = [
            {

                    { id: 'cc_standard', label: 'Стандартная карта' },
                    { id: 'cc_premium', label: 'Премиум карта' },

                ]
            },
            {

                subproducts: [
                    { id: 'consumer_standard', label: 'Стандартный ПК' },
                    { id: 'consumer_express', label: 'Экспресс ПК' },
                ]
            },
            {
                id: 'mortgage',
                label: 'Жилищное кредитование',
                subproducts: [
                    { id: 'mortgage_standard', label: 'Стандартная ипотека' },
                    { id: 'mortgage_family', label: 'Семейная ипотека' },
                ]
            },
        ];

        const mockInitiatives = [
            {
                id: 'INI-001',
                name: 'Оптимизация скоринга Premium карт',
                product: 'Кредитные карты',
                subproduct: 'Премиум карта',

            {

            {

                subproduct: 'Карта с кэшбэком',
                status: 'completed',

                created: '2025-12-10',

        ];

        const mockScorecards = [
            {

                product: 'Кредитные карты',
                status: 'active',
                version: '2.3',
                created: '2026-01-20',

            {

        ];

        // Main App Component
        function App() {
            const [currentView, setCurrentView] = useState('initiatives');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [expandedProducts, setExpandedProducts] = useState({});

            const toggleProduct = (productId) => {
                setExpandedProducts(prev => ({
                    ...prev,
                    [productId]: !prev[productId]
                }));
            };

            return (
                <ThemeProvider theme={theme}>
                    <Box sx={{ display: 'flex', height: '100vh' }}>
                        {/* Sidebar */}
                        <Box className="sidebar">
                            <Box className="sidebar-header">
                                <h1>Риск-Стратегии</h1>
                                <p>Система управления внедрениями</p>
                            </Box>
                            
                            <Box className="sidebar-menu">
                                <Box
                                    className={`sidebar-item ${currentView === 'initiatives' ? 'active' : ''}`}
                                    onClick={() => setCurrentView('initiatives')}
                                >
                                    <span className="material-icons">dashboard</span>
                                    <span>Инициативы</span>
                                </Box>
                                
                                <Box
                                    className={`sidebar-item ${currentView === 'scorecards' ? 'active' : ''}`}

                                <Typography

                                        display: 'block',
