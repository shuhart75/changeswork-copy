                  <Typography variant="h6">Окно агента</Typography>

                <Button variant="text" color="inherit" onClick={onClose}>
                  Свернуть
                </Button>
              </Stack>

              <Alert severity={context.eligible ? "success" : "info"} sx={{ borderRadius: 2 }}>
                {context.eligible
                  ? "Пользователь может открыть окно прямо из этого состояния страницы и увидеть доступное действие «Сформировать БТ»."
                  : "Окно агента открывается и в этом состоянии, но кнопка «Сформировать БТ» внутри панели скрыта."}
              </Alert>

              <Grid container spacing={1.5}>
                <Grid item xs={12}>
                  <MetricCard label="Контекст страницы" value={context.label} tone={context.eligible ? "success" : "warning"} />
                </Grid>
                <Grid item xs={12}>
                  <MetricCard label="Текущий маршрут" value={context.route} />
                </Grid>
                <Grid item xs={12} sm={6} lg={12}>
                  <MetricCard label="session_id" value={sessionId} />
                </Grid>
                <Grid item xs={12} sm={6} lg={12}>
                  <MetricCard label="Старт диалога" value={dialogStartedAt} />
                </Grid>
              </Grid>

              <Paper variant="outlined" sx={{ p: 2, borderRadius: 2.5 }}>
                <Stack spacing={1.5}>
                  <Typography variant="subtitle2" sx={{ fontWeight: 700 }}>
                    Что уходит в REST при открытии
                  </Typography>
                  <Paper
                    sx={{
                      p: 1.75,
                      bgcolor: "#1a1d23",
                      color: "#f3f5f8",
                      borderRadius: 2,
                      fontFamily: '"Cascadia Code", monospace',
                      fontSize: 13,
                      overflowX: "auto",
                    }}
                  >
                    POST /dialog/session
                    {"\n"}
                    {`{`}
                    {"\n"}
                    {`  "session_id": "${sessionId}"`}
                    {"\n"}
                    {`}`}
                  </Paper>
                  <Stack direction="row" spacing={1} flexWrap="wrap" useFlexGap>
                    <Chip label="Только session_id" color="primary" variant="outlined" />
                    <Chip label="Без contextPrompt" variant="outlined" />
                    <Chip label="Без клиентской истории" variant="outlined" />
                  </Stack>
                </Stack>
              </Paper>

              <Paper variant="outlined" sx={{ p: 2, borderRadius: 2.5 }}>
                <Stack spacing={1.5}>
                  <Typography variant="subtitle2" sx={{ fontWeight: 700 }}>
                    Поведение панели при навигации
                  </Typography>
                  <Stack spacing={1}>
                    <Stack direction="row" justifyContent="space-between" alignItems="center">
                      <Typography variant="body2">Маршрут страницы</Typography>
                      <Chip size="small" label="Не меняется" sx={{ bgcolor: "#edf3fb", color: "#2c4f7c" }} />
                    </Stack>
                    <Stack direction="row" justifyContent="space-between" alignItems="center">
                      <Typography variant="body2">История диалога</Typography>
                      <Chip size="small" label="Восстанавливается по session_id" sx={{ bgcolor: "#edf3fb", color: "#2c4f7c" }} />
                    </Stack>
                    <Stack direction="row" justifyContent="space-between" alignItems="center">
                      <Typography variant="body2">Сформировать БТ</Typography>
                      <Chip
                        size="small"
                        label={context.btState}
                        sx={{
                          bgcolor: context.eligible ? "#e8f3ea" : "#f2f3f5",
                          color: context.eligible ? "#4c8f57" : "#6f7785",
                        }}
                      />
                    </Stack>
                  </Stack>
                  {!context.eligible ? <LinearProgress variant="determinate" value={46} sx={{ borderRadius: 99 }} /> : null}
                  <Typography variant="body2" color="text.secondary">
                    {context.stateReason}
                  </Typography>
                </Stack>
              </Paper>

              <Paper variant="outlined" sx={{ p: 2, borderRadius: 2.5, bgcolor: "#ffffff" }}>
                <Stack spacing={1}>
                  <Typography variant="subtitle2" sx={{ fontWeight: 700 }}>
                    Что важно для handoff
                  </Typography>
                  <Typography variant="body2" color="text.secondary">
                    Точка входа визуально живёт в существующем разделе симуляций и не уводит пользователя на отдельный экран.
                  </Typography>
                  <Typography variant="body2" color="text.secondary">
                    Открытая панель не накрывает интерфейс модальной подложкой, поэтому список, деталка и форма редактирования остаются интерактивными.
                  </Typography>
                </Stack>
              </Paper>

              <Box sx={{ flexGrow: 1 }} />

              <Button variant="contained" color="primary" fullWidth>
                {context.eligible ? "Сформировать БТ доступно в этом контексте" : "В этом контексте доступен только вход в диалог"}
              </Button>
            </Stack>
          </Drawer>
        );
      }

      function App() {
        const [contextId, setContextId] = React.useState("detail");
        const [drawerOpen, setDrawerOpen] = React.useState(true);
        const context = contexts.find((item) => item.id === contextId);

        return (
          <ThemeProvider theme={theme}>
            <CssBaseline />
            <Box sx={{ display: "flex", minHeight: "100%" }}>
              <Box
                sx={{
                  width: 240,
                  bgcolor: "#1a1d23",
                  color: "#ffffff",
                  display: { xs: "none", md: "flex" },
                  flexDirection: "column",
                  borderRight: "1px solid rgba(255,255,255,0.08)",
                }}
              >
                <Box sx={{ p: 2.5, borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
                  <Typography variant="h6">Система внедрений</Typography>
                </Box>
                <Box sx={{ py: 1.5 }}>
                  <SidebarItem label="Пилоты" />
                  <SidebarItem label="Пересечения" />
                  <SidebarItem label="История изменений" />
                  <SidebarItem label="Симуляции" active />
                  <SidebarItem label="Метрики" />
                </Box>
                <Box sx={{ mt: "auto", pb: 2 }}>
                  <SidebarItem label="База знаний" />
                  <SidebarItem label="Поддержка" />
                </Box>
              </Box>

              <Box
                sx={{
                  flexGrow: 1,
                  minWidth: 0,
                  pr: { xs: 0, lg: drawerOpen ? `${drawerWidth}px` : 0 },
                  transition: "padding-right 0.25s ease",
                }}
              >
                <AppBar position="sticky" elevation={0} color="inherit" sx={{ borderBottom: "1px solid #e3e7ee", bgcolor: "rgba(255,255,255,0.98)" }}>
                  <Toolbar sx={{ minHeight: 78, gap: 2 }}>
                    <Box sx={{ flexGrow: 1 }}>
                      <Typography variant="body2" color="text.secondary">
                        delivery prototype / simulation-bt-agent / agent-entrypoint
                      </Typography>
                      <Typography variant="h4" sx={{ mt: 0.5 }}>
                        Прототип точки входа в окно агента
                      </Typography>
                    </Box>
                    <Paper
                      variant="outlined"
                      sx={{
                        px: 2,
                        py: 1.25,
                        borderRadius: 1.5,
                        display: { xs: "none", sm: "flex" },
                        alignItems: "center",
                        gap: 1.25,
                      }}
                    >
                      <span className="material-icons" style={{ fontSize: 18, color: "#6c757d" }}>
                        apartment
                      </span>
                      <Typography variant="body2" sx={{ fontWeight: 600 }}>
                        ДРРБ
                      </Typography>
                    </Paper>
                    <Stack direction="row" spacing={1.25} alignItems="center">
                      <Avatar sx={{ bgcolor: "#e8edf4", color: "#2c4f7c" }}>М</Avatar>
                      <Typography variant="body2" sx={{ fontWeight: 600, display: { xs: "none", md: "block" } }}>
                        Матаков Мирослав Полад Оглы
                      </Typography>
                    </Stack>
                  </Toolbar>
                </AppBar>

                <Box sx={{ p: { xs: 2, md: 3 } }}>
                  <Stack spacing={3}>
                    <Card sx={{ borderRadius: 3 }}>
                      <CardContent sx={{ p: { xs: 2, md: 3 } }}>
                        <Stack spacing={2}>
                          <Stack
                            direction={{ xs: "column", md: "row" }}
                            justifyContent="space-between"
                            alignItems={{ xs: "flex-start", md: "center" }}
                            spacing={2}
                          >
                            <Box>
                              <Typography variant="h6">Контекст запуска</Typography>
                              <Typography color="text.secondary">
                                Один и тот же `session_id` сопровождает окно агента между списком, деталкой, вкладкой итогов и редактированием.
                              </Typography>
                            </Box>
                            <Button variant={drawerOpen ? "outlined" : "contained"} onClick={() => setDrawerOpen((value) => !value)}>
                              {drawerOpen ? "Свернуть панель агента" : "Открыть панель агента"}
                            </Button>
                          </Stack>
                          <Stack direction="row" spacing={1} flexWrap="wrap" useFlexGap>
                            {contexts.map((item) => (
                              <Button
                                key={item.id}
                                variant={item.id === contextId ? "contained" : "outlined"}
                                color={item.eligible ? "primary" : "inherit"}
                                onClick={() => setContextId(item.id)}
                              >
                                {item.label}
                              </Button>
                            ))}
                          </Stack>
                          <Alert severity={context.eligible ? "success" : "info"} sx={{ borderRadius: 2 }}>
                            {context.eligible
                              ? `Текущий контекст: ${context.label}. В панели можно показать действие «Сформировать БТ», но маршрут страницы не меняется.`
                              : `Текущий контекст: ${context.label}. Панель агента открывается, но действие «Сформировать БТ» скрыто.`}
                          </Alert>
                          <Grid container spacing={1.5}>
                            <Grid item xs={12} md={4}>
                              <MetricCard label="Маршрут" value={context.route} />
                            </Grid>
                            <Grid item xs={12} md={4}>
                              <MetricCard label="Точка запуска" value={context.tabLabel} />
                            </Grid>
                            <Grid item xs={12} md={4}>
                              <MetricCard label="Состояние БТ в панели" value={context.btState} tone={context.eligible ? "success" : "warning"} />
                            </Grid>
                          </Grid>
                        </Stack>
                      </CardContent>
                    </Card>

                    <Paper sx={{ p: { xs: 2, md: 3 }, borderRadius: 4, minHeight: 720 }}>
                      <PagePreview context={context} />
                    </Paper>
                  </Stack>
                </Box>
              </Box>

              <AgentDrawer context={context} open={drawerOpen} onClose={() => setDrawerOpen(false)} />
            </Box>
          </ThemeProvider>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
