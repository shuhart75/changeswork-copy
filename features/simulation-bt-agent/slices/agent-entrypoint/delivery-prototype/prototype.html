<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>simulation-bt-agent / agent-entrypoint / delivery prototype</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@mui/material@5.15.20/umd/material-ui.development.js"></script>
    <script src="https://unpkg.com/@emotion/react@11/dist/emotion-react.umd.min.js"></script>
    <script src="https://unpkg.com/@emotion/styled@11/dist/emotion-styled.umd.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body {
        margin: 0;
        font-family: "Roboto", sans-serif;
        background: #f5f7fa;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const {
        Alert,
        AppBar,
        Avatar,
        Box,
        Button,
        Chip,
        CssBaseline,
        Divider,
        Drawer,
        Grid,
        IconButton,
        Paper,
        Stack,
        Table,
        TableBody,
        TableCell,
        TableHead,
        TableRow,
        Toolbar,
        Typography,
        createTheme,
        ThemeProvider,
      } = MaterialUI;

      const DRAWER_WIDTH = 392;

      const contexts = [
        {
          id: "list",
          label: "Список симуляций",
          route: "/simulations",
          location: "list",
          pageTitle: "Симуляции",
          eligible: false,
          reason: "Нет конкретной симуляции",
          openPayload: { session_id: "3ccabaf4-7d41-4b91-a020-a6f7547f11d2" },
        },
        {
          id: "detail",
          label: "Деталка завершённой симуляции",
          route: "/simulations/SIM-CC-148",
          location: "detail",
          pageTitle: "SIM-CC-148",
          eligible: true,
          reason: "Доступно действие `Сформировать БТ`",
          openPayload: { session_id: "3ccabaf4-7d41-4b91-a020-a6f7547f11d2" },
        },
        {
          id: "results",
          label: "Вкладка итогов симуляции",
          route: "/simulations/SIM-CC-148/results",
          location: "results",
          pageTitle: "Итоги симуляции SIM-CC-148",
          eligible: true,
          reason: "Тот же контекст завершённой симуляции",
          openPayload: { session_id: "3ccabaf4-7d41-4b91-a020-a6f7547f11d2" },
        },
        {
          id: "edit",
          label: "Форма редактирования",
          route: "/simulations/SIM-CC-148/edit",
          location: "edit",
          pageTitle: "Редактирование SIM-CC-148",
          eligible: true,
          reason: "Окно открывается без смены маршрута",
          openPayload: { session_id: "3ccabaf4-7d41-4b91-a020-a6f7547f11d2" },
        },
        {
          id: "ineligible",
          label: "Неподходящая симуляция",
          route: "/simulations/SIM-CC-147",
          location: "detail",
          pageTitle: "SIM-CC-147",
          eligible: false,
          reason: "Симуляция ещё не завершена",
          openPayload: { session_id: "3ccabaf4-7d41-4b91-a020-a6f7547f11d2" },
        },
      ];

      const rows = [
        ["SIM-CC-148", "157-1", "Завершена", "Формирование отчета"],
        ["SIM-CC-147", "dfgsdg", "Новая", "Подготовка"],
        ["SIM-CC-146", "test23.04-4", "Выведена в ПРОМ", "Установка риск-параметров"],
      ];

      const theme = createTheme({
        palette: {
          primary: { main: "#2c4f7c" },
          success: { main: "#4f8c63" },
          background: { default: "#f5f7fa", paper: "#ffffff" },
          text: { primary: "#1a1d23", secondary: "#6c757d" },
        },
        typography: {
          fontFamily: '"Roboto", sans-serif',
          fontSize: 13,
          h5: { fontWeight: 700, fontSize: "1.35rem" },
          h6: { fontWeight: 700, fontSize: "1rem" },
          button: { textTransform: "none", fontWeight: 600, fontSize: "0.9rem" },
        },
        components: {
          MuiButton: {
            styleOverrides: {
              root: { borderRadius: 8, boxShadow: "none" },
              contained: { boxShadow: "none", "&:hover": { boxShadow: "none" } },
            },
          },
          MuiChip: {
            styleOverrides: {
              root: { borderRadius: 8, height: 28, fontSize: 12.5 },
            },
          },
        },
      });

      function icon(name, sx) {
        return <Box component="span" className="material-icons" sx={sx}>{name}</Box>;
      }

      function StatusChip({ eligible }) {
        return (
          <Chip
            label={eligible ? "БТ доступно" : "Только чат"}
            color={eligible ? "success" : "default"}
            variant="outlined"
          />
        );
      }

      function Shell({ children, drawer }) {
        return (
          <Box sx={{ display: "flex", minHeight: "100%" }}>
            <Box
              sx={{
                width: 232,
                backgroundColor: "#17191d",
                color: "#fff",
                display: { xs: "none", lg: "flex" },
                flexDirection: "column",
                py: 1.5,
              }}
            >
              <Box sx={{ px: 3, py: 2.5, borderBottom: "1px solid rgba(255,255,255,0.08)" }} />
              <Stack spacing={1.2} sx={{ mt: 3 }}>
                {[
                  ["track_changes", "Пилоты"],
                  ["query_stats", "Пересечения"],
                  ["history", "История изменений"],
                  ["monitor_heart", "Симуляции"],
                  ["bar_chart", "Метрики"],
                ].map(([i, label]) => (
                  <Box
                    key={label}
                    sx={{
                      px: 2.2, py: 1.35, mx: 1.5, borderRadius: 2,
                      display: "flex", alignItems: "center", gap: 1.5,
                      color: label === "Симуляции" ? "#2ce6b1" : "rgba(255,255,255,0.62)",
                      backgroundColor: label === "Симуляции" ? "rgba(255,255,255,0.08)" : "transparent",
                      fontWeight: label === "Симуляции" ? 700 : 600, fontSize: 15,
                    }}
                  >
                    {icon(i, { fontSize: 24 })}
                    <span>{label}</span>
                  </Box>
                ))}
              </Stack>
              <Box sx={{ flexGrow: 1 }} />
            </Box>

            <Box sx={{ flex: 1, minWidth: 0, mr: `${DRAWER_WIDTH}px` }}>
              <AppBar position="sticky" elevation={0} color="transparent" sx={{ borderBottom: "1px solid #e5e7eb" }}>
                <Toolbar sx={{ justifyContent: "flex-end", gap: 2, backgroundColor: "#fff", minHeight: 60 }}>
                  <Button
                    variant="outlined"
                    startIcon={icon("corporate_fare", { fontSize: 22 })}
                    endIcon={icon("expand_more", { fontSize: 20 })}
                    sx={{ minWidth: 156, justifyContent: "space-between", px: 1.75 }}
                  >
                    ДРРБ
                  </Button>
                  <Divider orientation="vertical" flexItem />
                  <Stack direction="row" spacing={1.5} alignItems="center">
                    <Avatar sx={{ backgroundColor: "#d1d5db", color: "#374151", width: 34, height: 34 }}>ММ</Avatar>
                    <Typography sx={{ fontWeight: 600, fontSize: 14.5 }}>Матаков Мираслав Полад Оглы</Typography>
                  </Stack>
                  <IconButton>{icon("logout", { fontSize: 24, color: "#4b5563" })}</IconButton>
                </Toolbar>
              </AppBar>

              <Box sx={{ px: { xs: 2, md: 3.5 }, py: 2.5 }}>
                {children}
              </Box>
            </Box>

            <Drawer
              anchor="right"
              open
              variant="persistent"
              PaperProps={{
                sx: {
                  width: DRAWER_WIDTH,
                  borderLeft: "1px solid #dfe3eb",
                  backgroundColor: "#ffffff",
                },
              }}
            >
              {drawer}
            </Drawer>
          </Box>
        );
      }

      function EntryPointPrototype() {
        const [contextId, setContextId] = React.useState("detail");
        const context = contexts.find((item) => item.id === contextId);

        return (
          <ThemeProvider theme={theme}>
            <CssBaseline />
            <Shell
              drawer={
                <Stack sx={{ height: "100%" }}>
                  <Box sx={{ px: 2, py: 1.5, borderBottom: "1px solid #e5e7eb" }}>
                    <Stack direction="row" justifyContent="space-between" spacing={2}>
                      <Box>
                        <Stack direction="row" spacing={1} alignItems="center">
                          {icon("smart_toy", { fontSize: 24, color: "#2c4f7c" })}
                          <Typography variant="h6">AI-агент RAIN</Typography>
                        </Stack>
                        <Stack direction="row" spacing={0.8} sx={{ mt: 0.9 }}>
                          <Chip label="Онлайн" color="success" size="small" />
                          <Chip label="Перезапустить сессию" variant="outlined" size="small" />
                        </Stack>
                      </Box>
                      <IconButton>{icon("close", { color: "#6b7280" })}</IconButton>
                    </Stack>
                  </Box>

                  <Box sx={{ px: 2, py: 1.5, flex: 1, overflowY: "auto" }}>
                    <Stack spacing={1.2}>
                      <Paper variant="outlined" sx={{ p: 1.5, borderRadius: 3, backgroundColor: "#f6f8fb" }}>
                        <Typography sx={{ fontWeight: 700, fontSize: 13.5 }}>Handoff notes</Typography>
                        <Typography color="text.secondary" sx={{ mt: 0.6, fontSize: 12.5, lineHeight: 1.4 }}>
                          Этот slice фиксирует только точку входа и восстановление панели. Открытие выполняется всегда через
                          единый REST `POST /dialog/session`, где в payload уходит только `session_id`.
                        </Typography>
                      </Paper>

                      <Paper variant="outlined" sx={{ p: 1.5, borderRadius: 3 }}>
                        <Typography sx={{ fontWeight: 700, fontSize: 13.5 }}>Open / restore request</Typography>
                        <Box
                          component="pre"
                          sx={{
                            mt: 1,
                            mb: 0,
                            p: 1.25,
                            fontSize: 12,
                            borderRadius: 2,
                            backgroundColor: "#0f172a",
                            color: "#e2e8f0",
                            overflowX: "auto",
                          }}
                        >
{`POST /dialog/session
{
  "session_id": "${context.openPayload.session_id}"
}`}
                        </Box>
                      </Paper>

                      <Paper variant="outlined" sx={{ p: 1.5, borderRadius: 3 }}>
                        <Typography sx={{ fontWeight: 700, fontSize: 13.5 }}>Локально в user session</Typography>
                        <Stack spacing={0.8} sx={{ mt: 1 }}>
                          <Chip label="session_id хранится между экранами симуляций" variant="outlined" />
                          <Chip label="dialog_started_at фиксируется, но не отправляется при open" variant="outlined" />
                          <Chip label="контекст страницы влияет только на доступность БТ" variant="outlined" />
                        </Stack>
                      </Paper>
                    </Stack>
                  </Box>
                </Stack>
              }
            >
              <Stack spacing={2.5}>
                <Stack direction={{ xs: "column", lg: "row" }} spacing={2} justifyContent="space-between">
                  <Box>
                    <Typography variant="h5">Agent Entrypoint Delivery Prototype</Typography>
                    <Typography color="text.secondary" sx={{ mt: 0.5 }}>
                      Схема для фронтенда: где вызывается панель и как она восстанавливается по `session_id`.
                    </Typography>
                  </Box>
                  <Stack direction="row" spacing={1} useFlexGap flexWrap="wrap">
                    {contexts.map((item) => (
                      <Button
                        key={item.id}
                        variant={item.id === contextId ? "contained" : "outlined"}
                        onClick={() => setContextId(item.id)}
                      >
                        {item.label}
                      </Button>
                    ))}
                  </Stack>
                </Stack>

                <Paper sx={{ p: 2.25, borderRadius: 4 }}>
                  <Stack direction={{ xs: "column", md: "row" }} spacing={2} justifyContent="space-between">
                    <Box>
                      <Typography sx={{ fontWeight: 700, fontSize: 15 }}>{context.pageTitle}</Typography>
                      <Typography color="text.secondary" sx={{ mt: 0.6, fontSize: 12.5 }}>
                        Route: `{context.route}`
                      </Typography>
                    </Box>
                    <Stack direction="row" spacing={1} alignItems="center">
                      <StatusChip eligible={context.eligible} />
                      <Button variant="outlined" startIcon={icon("smart_toy", { fontSize: 20 })}>
                        AI-агент RAIN
                      </Button>
                    </Stack>
                  </Stack>
                </Paper>

                <Grid container spacing={2.5}>
                  <Grid item xs={12} xl={8}>
                    {context.location === "list" ? (
                      <Paper sx={{ p: 2.25, borderRadius: 4 }}>
                        <Typography sx={{ fontWeight: 700, mb: 1.5 }}>Хост-экран: список симуляций</Typography>
                        <Table size="small">
                          <TableHead>
                            <TableRow sx={{ backgroundColor: "#eef1ff" }}>
                              <TableCell>ID</TableCell>
                              <TableCell>Название</TableCell>
                              <TableCell>Статус</TableCell>
                              <TableCell>Этап</TableCell>
                            </TableRow>
                          </TableHead>
                          <TableBody>
                            {rows.map((row) => (
                              <TableRow key={row[0]}>
                                {row.map((cell) => <TableCell key={cell}>{cell}</TableCell>)}
                              </TableRow>
                            ))}
                          </TableBody>
                        </Table>
                      </Paper>
                    ) : (
                      <Paper sx={{ p: 2.25, borderRadius: 4 }}>
                        <Typography sx={{ fontWeight: 700, mb: 1.5 }}>
                          Хост-экран: {context.location === "edit" ? "форма редактирования" : "деталка симуляции"}
                        </Typography>
                        <Grid container spacing={1.75}>
                          {[
                            ["Пространство симуляции", "Кредитные карты"],
                            ["Название симуляции", context.id === "ineligible" ? "dfgsdg" : "157-1"],
                            ["Режим симуляции", "Изменение риск-параметров"],
                            ["ID ФП Симуляции", context.id === "ineligible" ? "sim-147-uuid" : "sim-148-uuid"],
                          ].map(([label, value]) => (
                            <Grid item xs={12} md={6} key={label}>
                              <Paper variant="outlined" sx={{ p: 1.25, borderRadius: 3 }}>
                                <Typography color="text.secondary" sx={{ fontSize: 12 }}>{label}</Typography>
                                <Typography sx={{ mt: 0.4, fontWeight: 600 }}>{value}</Typography>
                              </Paper>
                            </Grid>
                          ))}
                        </Grid>
                      </Paper>
                    )}
                  </Grid>

                  <Grid item xs={12} xl={4}>
                    <Stack spacing={2}>
                      <Alert severity={context.eligible ? "success" : "info"}>
                        {context.reason}
                      </Alert>
                      <Paper sx={{ p: 2, borderRadius: 4, backgroundColor: "#eef6ff" }}>
                        <Typography sx={{ fontWeight: 700 }}>Что показать фронтендеру</Typography>
                        <Stack spacing={1} sx={{ mt: 1.2 }}>
                          <Typography sx={{ fontSize: 13.5 }}>
                            1. Кнопка вызова панели одинаково называется `AI-агент RAIN` на всех экранах.
                          </Typography>
                          <Typography sx={{ fontSize: 13.5 }}>
                            2. При open / restore не отправляем route, simulation id, context prompt и историю.
                          </Typography>
                          <Typography sx={{ fontSize: 13.5 }}>
                            3. Доступность `Сформировать БТ` вычисляется уже внутри панели по контексту страницы.
                          </Typography>
                        </Stack>
                      </Paper>
                    </Stack>
                  </Grid>
                </Grid>
              </Stack>
            </Shell>
          </ThemeProvider>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<EntryPointPrototype />);
    </script>
  </body>
</html>
