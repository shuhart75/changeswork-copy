<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>simulation-bt-agent / bt-publication / delivery prototype</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@mui/material@5.15.20/umd/material-ui.development.js"></script>
    <script src="https://unpkg.com/@emotion/react@11/dist/emotion-react.umd.min.js"></script>
    <script src="https://unpkg.com/@emotion/styled@11/dist/emotion-styled.umd.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body { margin: 0; font-family: "Roboto", sans-serif; background: #f5f7fa; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const {
        Alert,
        AppBar,
        Avatar,
        Box,
        Button,
        Chip,
        CssBaseline,
        Divider,
        Drawer,
        Grid,
        IconButton,
        Link,
        Paper,
        Stack,
        TextField,
        Toolbar,
        Tooltip,
        Typography,
        createTheme,
        ThemeProvider,
      } = MaterialUI;

      const DRAWER_WIDTH = 392;

      const contexts = {
        eligible: {
          label: "Подходящая завершённая симуляция",
          eligible: true,
          tooltip:
            "Подставит в поле ввода черновик запроса по текущей завершённой симуляции. После этого текст можно отредактировать и отправить.",
          draft:
            "Меня зовут Матаков Мираслав Полад Оглы. Поменяй значение риск-параметра PD_LIMIT на 0.42 и UTIL_SEGMENT_CAP на 125000 и TURNOVER_GATE на 1.\nБизнес-цель -- Рост одобрения по кредитным картам без выхода за лимит потерь",
          btUrl: "https://confluence.example.local/pages/viewpage.action?pageId=1002451",
        },
        ineligible: {
          label: "Неподходящая симуляция",
          eligible: false,
          tooltip: "Кнопка доступна только на завершённых деталках симуляций с возможностью вывода в ПРОМ.",
          draft: "",
          btUrl: "",
        },
      };

      const theme = createTheme({
        palette: {
          primary: { main: "#2c4f7c" },
          success: { main: "#4f8c63" },
          background: { default: "#f5f7fa", paper: "#ffffff" },
          text: { primary: "#1a1d23", secondary: "#6c757d" },
        },
        typography: {
          fontFamily: '"Roboto", sans-serif',
          fontSize: 13,
          h5: { fontWeight: 700, fontSize: "1.35rem" },
          h6: { fontWeight: 700, fontSize: "1rem" },
          button: { textTransform: "none", fontWeight: 600, fontSize: "0.9rem" },
        },
        components: {
          MuiButton: {
            styleOverrides: {
              root: { borderRadius: 8, boxShadow: "none" },
              contained: { boxShadow: "none", "&:hover": { boxShadow: "none" } },
            },
          },
          MuiChip: {
            styleOverrides: {
              root: { borderRadius: 8, height: 28, fontSize: 12.5 },
            },
          },
          MuiInputBase: {
            styleOverrides: {
              root: { fontSize: 14 },
            },
          },
        },
      });

      function icon(name, sx) {
        return <Box component="span" className="material-icons" sx={sx}>{name}</Box>;
      }

      function Shell({ children, drawer }) {
        return (
          <Box sx={{ display: "flex", minHeight: "100%" }}>
            <Box
              sx={{
                width: 232,
                backgroundColor: "#17191d",
                color: "#fff",
                display: { xs: "none", lg: "flex" },
                flexDirection: "column",
                py: 1.5,
              }}
            >
              <Box sx={{ px: 3, py: 2.5, borderBottom: "1px solid rgba(255,255,255,0.08)" }} />
              <Stack spacing={1.2} sx={{ mt: 3 }}>
                {[
                  ["track_changes", "Пилоты"],
                  ["query_stats", "Пересечения"],
                  ["history", "История изменений"],
                  ["monitor_heart", "Симуляции"],
                ].map(([i, label]) => (
                  <Box
                    key={label}
                    sx={{
                      px: 2.2, py: 1.35, mx: 1.5, borderRadius: 2,
                      display: "flex", alignItems: "center", gap: 1.5,
                      color: label === "Симуляции" ? "#2ce6b1" : "rgba(255,255,255,0.62)",
                      backgroundColor: label === "Симуляции" ? "rgba(255,255,255,0.08)" : "transparent",
                      fontWeight: label === "Симуляции" ? 700 : 600, fontSize: 15,
                    }}
                  >
                    {icon(i, { fontSize: 24 })}
                    <span>{label}</span>
                  </Box>
                ))}
              </Stack>
            </Box>

            <Box sx={{ flex: 1, minWidth: 0, mr: `${DRAWER_WIDTH}px` }}>
              <AppBar position="sticky" elevation={0} color="transparent" sx={{ borderBottom: "1px solid #e5e7eb" }}>
                <Toolbar sx={{ justifyContent: "flex-end", gap: 2, backgroundColor: "#fff", minHeight: 60 }}>
                  <Button variant="outlined" startIcon={icon("smart_toy", { fontSize: 20 })}>AI-агент RAIN</Button>
                  <Divider orientation="vertical" flexItem />
                  <Stack direction="row" spacing={1.5} alignItems="center">
                    <Avatar sx={{ backgroundColor: "#d1d5db", color: "#374151", width: 34, height: 34 }}>ММ</Avatar>
                    <Typography sx={{ fontWeight: 600, fontSize: 14.5 }}>Матаков Мираслав Полад Оглы</Typography>
                  </Stack>
                </Toolbar>
              </AppBar>
              <Box sx={{ px: { xs: 2, md: 3.5 }, py: 2.5 }}>{children}</Box>
            </Box>

            <Drawer
              anchor="right"
              open
              variant="persistent"
              PaperProps={{
                sx: {
                  width: DRAWER_WIDTH,
                  borderLeft: "1px solid #dfe3eb",
                  backgroundColor: "#ffffff",
                },
              }}
            >
              {drawer}
            </Drawer>
          </Box>
        );
      }

      function App() {
        const [contextId, setContextId] = React.useState("eligible");
        const [copied, setCopied] = React.useState(false);
        const context = contexts[contextId];

        return (
          <ThemeProvider theme={theme}>
            <CssBaseline />
            <Shell
              drawer={
                <Stack sx={{ height: "100%" }}>
                  <Box sx={{ px: 2, py: 1.5, borderBottom: "1px solid #e5e7eb" }}>
                    <Stack direction="row" justifyContent="space-between" spacing={2}>
                      <Box>
                        <Stack direction="row" spacing={1} alignItems="center">
                          {icon("smart_toy", { fontSize: 24, color: "#2c4f7c" })}
                          <Typography variant="h6">AI-агент RAIN</Typography>
                        </Stack>
                        <Stack direction="row" spacing={0.8} sx={{ mt: 0.9 }}>
                          <Chip label="Онлайн" color="success" size="small" />
                          <Chip label="Перезапустить сессию" variant="outlined" size="small" />
                        </Stack>
                      </Box>
                      <IconButton>{icon("close", { color: "#6b7280" })}</IconButton>
                    </Stack>
                  </Box>

                  <Box sx={{ px: 2, py: 1.5, flex: 1, overflowY: "auto" }}>
                    <Stack spacing={1}>
                      <Paper sx={{ px: 1.6, py: 1.25, borderRadius: 2.5, backgroundColor: "#f6f8fb", border: "1px solid #e1e6ee" }}>
                        <Typography sx={{ whiteSpace: "pre-line", fontSize: 13.5, lineHeight: 1.45 }}>
                          Используйте кнопку `Сформировать БТ`, чтобы подготовить черновик запроса по текущей симуляции.
                        </Typography>
                      </Paper>
                      {context.btUrl ? (
                        <Paper sx={{ px: 1.6, py: 1.35, borderRadius: 2.5, backgroundColor: "#f6fbf8", border: "1px solid #cfe0d5" }}>
                          <Stack spacing={1}>
                            <Typography sx={{ fontWeight: 700, fontSize: 13.5 }}>
                              Ссылка на опубликованный БТ
                            </Typography>
                            <Link href={context.btUrl} underline="hover" sx={{ fontSize: 13.5, wordBreak: "break-all" }}>
                              {context.btUrl}
                            </Link>
                            <Stack direction="row" spacing={1} alignItems="center" justifyContent="space-between">
                              <Typography color="text.secondary" sx={{ fontSize: 12.5, lineHeight: 1.35, flex: 1 }}>
                                В MVP ссылка не сохраняется автоматически в данные симуляции. Пользователь копирует её из окна агента вручную.
                              </Typography>
                              <Button variant="outlined" size="small" onClick={() => setCopied(true)}>
                                {copied ? "Скопировано" : "Копировать ссылку"}
                              </Button>
                            </Stack>
                          </Stack>
                        </Paper>
                      ) : null}
                    </Stack>
                  </Box>

                  <Divider />
                  <Box sx={{ p: 2 }}>
                    <Stack spacing={1.25}>
                      <TextField
                        size="small"
                        multiline
                        rows={5}
                        fullWidth
                        value={context.draft}
                        inputProps={{ style: { overflowY: "auto" }, readOnly: true }}
                        placeholder="Введите сообщение агенту."
                      />
                      <Stack direction="row" spacing={1.25}>
                        <Tooltip title={context.tooltip}>
                          <span>
                            <Button variant="contained" color="primary" disabled={!context.eligible}>
                              Сформировать БТ
                            </Button>
                          </span>
                        </Tooltip>
                        <Button variant="contained" disabled={!context.eligible}>Отправить</Button>
                      </Stack>
                    </Stack>
                  </Box>
                </Stack>
              }
            >
              <Stack spacing={2.5}>
                <Stack direction={{ xs: "column", lg: "row" }} justifyContent="space-between" spacing={2}>
                  <Box>
                    <Typography variant="h5">BT Publication Delivery Prototype</Typography>
                    <Typography color="text.secondary" sx={{ mt: 0.5 }}>
                      Схема для фронтенда: eligibility, tooltip у `Сформировать БТ`, локальная вставка draft и возврат `btUrl`.
                    </Typography>
                  </Box>
                  <Stack direction="row" spacing={1} useFlexGap flexWrap="wrap">
                    {Object.entries(contexts).map(([id, item]) => (
                      <Button
                        key={id}
                        variant={id === contextId ? "contained" : "outlined"}
                        onClick={() => {
                          setContextId(id);
                          setCopied(false);
                        }}
                      >
                        {item.label}
                      </Button>
                    ))}
                  </Stack>
                </Stack>

                <Grid container spacing={2.5}>
                  <Grid item xs={12} xl={7}>
                    <Paper sx={{ p: 2.25, borderRadius: 4 }}>
                      <Typography sx={{ fontWeight: 700, fontSize: 15 }}>Источник данных для draft</Typography>
                      <Stack spacing={1.1} sx={{ mt: 1.3 }}>
                        <Chip label="Имя пользователя из профиля: Матаков Мираслав Полад Оглы" variant="outlined" />
                        <Chip label="Risk params: PD_LIMIT / UTIL_SEGMENT_CAP / TURNOVER_GATE" variant="outlined" />
                        <Chip label="Business goal берётся из текущей симуляции" variant="outlined" />
                        <Chip label="Автоотправки после вставки draft нет" variant="outlined" />
                      </Stack>
                    </Paper>
                  </Grid>

                  <Grid item xs={12} xl={5}>
                    <Stack spacing={2}>
                      <Alert severity={context.eligible ? "success" : "info"}>
                        {context.eligible
                          ? "В этом состоянии tooltip объясняет следующий шаг: отредактировать и отправить draft вручную."
                          : "В этом состоянии tooltip объясняет причину недоступности действия по БТ."}
                      </Alert>

                      <Paper sx={{ p: 2, borderRadius: 4, backgroundColor: "#eef6ff" }}>
                        <Typography sx={{ fontWeight: 700 }}>Результат публикации</Typography>
                        {context.btUrl ? (
                          <Stack spacing={0.9} sx={{ mt: 1.1 }}>
                            <Typography sx={{ fontSize: 13.5 }}>
                              После успешной отправки UI должен показать ссылку в окне агента и дать пользователю вручную скопировать её.
                            </Typography>
                            <Link href={context.btUrl} underline="hover">{context.btUrl}</Link>
                            <Typography color="text.secondary" sx={{ fontSize: 12.5 }}>
                              Автоматическое обновление поля `Ссылка на БТ` на host page в MVP не выполняется.
                            </Typography>
                          </Stack>
                        ) : (
                          <Typography color="text.secondary" sx={{ mt: 1.1, fontSize: 13.5 }}>
                            В неподходящем контексте `btUrl` не формируется.
                          </Typography>
                        )}
                      </Paper>
                    </Stack>
                  </Grid>
                </Grid>
              </Stack>
            </Shell>
          </ThemeProvider>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
