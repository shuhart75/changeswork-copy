<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>simulation-bt-agent / dialog-session / delivery prototype</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@mui/material@5.15.20/umd/material-ui.development.js"></script>
    <script src="https://unpkg.com/@emotion/react@11/dist/emotion-react.umd.min.js"></script>
    <script src="https://unpkg.com/@emotion/styled@11/dist/emotion-styled.umd.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body { margin: 0; font-family: "Roboto", sans-serif; background: #f5f7fa; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const {
        Alert,
        AppBar,
        Avatar,
        Box,
        Button,
        Chip,
        CssBaseline,
        Divider,
        Drawer,
        Grid,
        IconButton,
        LinearProgress,
        Paper,
        Stack,
        TextField,
        Toolbar,
        Typography,
        createTheme,
        ThemeProvider,
      } = MaterialUI;

      const DRAWER_WIDTH = 392;

      const variants = {
        restored: {
          label: "Восстановленная сессия",
          status: "online",
          showDetails: false,
          loading: false,
          inputDisabled: false,
          messages: [
            { role: "assistant", text: "Здравствуйте. Сессия восстановлена по `session_id`, можно продолжать диалог." },
            { role: "user", text: "Покажи итоговые параметры последней завершённой симуляции." },
            { role: "assistant", text: "- PD_LIMIT: 0.42\n- UTIL_SEGMENT_CAP: 125000\n- TURNOVER_GATE: 1" },
          ],
        },
        loading: {
          label: "Отправка сообщения",
          status: "online",
          showDetails: false,
          loading: true,
          inputDisabled: true,
          messages: [
            { role: "assistant", text: "Сообщение принято, ожидаем ответ агента." },
          ],
        },
        error: {
          label: "Ошибка агента",
          status: "error",
          showDetails: true,
          loading: false,
          inputDisabled: false,
          messages: [
            { role: "assistant", text: "Не удалось получить ответ от агента. Проверьте статус и перезапустите сессию." },
          ],
        },
      };

      const theme = createTheme({
        palette: {
          primary: { main: "#2c4f7c" },
          success: { main: "#4f8c63" },
          error: { main: "#c95a5a" },
          background: { default: "#f5f7fa", paper: "#ffffff" },
          text: { primary: "#1a1d23", secondary: "#6c757d" },
        },
        typography: {
          fontFamily: '"Roboto", sans-serif',
          fontSize: 13,
          h5: { fontWeight: 700, fontSize: "1.35rem" },
          h6: { fontWeight: 700, fontSize: "1rem" },
          button: { textTransform: "none", fontWeight: 600, fontSize: "0.9rem" },
        },
        components: {
          MuiButton: {
            styleOverrides: {
              root: { borderRadius: 8, boxShadow: "none" },
              contained: { boxShadow: "none", "&:hover": { boxShadow: "none" } },
            },
          },
          MuiChip: {
            styleOverrides: {
              root: { borderRadius: 8, height: 28, fontSize: 12.5 },
            },
          },
          MuiInputBase: {
            styleOverrides: {
              root: { fontSize: 14 },
            },
          },
        },
      });

      function icon(name, sx) {
        return <Box component="span" className="material-icons" sx={sx}>{name}</Box>;
      }

      function Message({ role, text }) {
        const user = role === "user";
        return (
          <Stack alignItems={user ? "flex-end" : "flex-start"}>
            <Paper
              sx={{
                maxWidth: "94%",
                px: 1.6,
                py: 1.25,
                borderRadius: 2.5,
                backgroundColor: user ? "#2c4f7c" : "#f6f8fb",
                color: user ? "#fff" : "#1a1d23",
                border: user ? "none" : "1px solid #e1e6ee",
              }}
            >
              <Typography sx={{ whiteSpace: "pre-line", fontSize: 13.5, lineHeight: 1.45 }}>
                {text.replaceAll("`", "")}
              </Typography>
            </Paper>
          </Stack>
        );
      }

      function Shell({ drawer, children }) {
        return (
          <Box sx={{ display: "flex", minHeight: "100%" }}>
            <Box
              sx={{
                width: 232,
                backgroundColor: "#17191d",
                color: "#fff",
                display: { xs: "none", lg: "flex" },
                flexDirection: "column",
                py: 1.5,
              }}
            >
              <Box sx={{ px: 3, py: 2.5, borderBottom: "1px solid rgba(255,255,255,0.08)" }} />
              <Stack spacing={1.2} sx={{ mt: 3 }}>
                {[
                  ["track_changes", "Пилоты"],
                  ["query_stats", "Пересечения"],
                  ["history", "История изменений"],
                  ["monitor_heart", "Симуляции"],
                ].map(([i, label]) => (
                  <Box
                    key={label}
                    sx={{
                      px: 2.2, py: 1.35, mx: 1.5, borderRadius: 2,
                      display: "flex", alignItems: "center", gap: 1.5,
                      color: label === "Симуляции" ? "#2ce6b1" : "rgba(255,255,255,0.62)",
                      backgroundColor: label === "Симуляции" ? "rgba(255,255,255,0.08)" : "transparent",
                      fontWeight: label === "Симуляции" ? 700 : 600, fontSize: 15,
                    }}
                  >
                    {icon(i, { fontSize: 24 })}
                    <span>{label}</span>
                  </Box>
                ))}
              </Stack>
            </Box>

            <Box sx={{ flex: 1, minWidth: 0, mr: `${DRAWER_WIDTH}px` }}>
              <AppBar position="sticky" elevation={0} color="transparent" sx={{ borderBottom: "1px solid #e5e7eb" }}>
                <Toolbar sx={{ justifyContent: "flex-end", gap: 2, backgroundColor: "#fff", minHeight: 60 }}>
                  <Button variant="outlined" startIcon={icon("smart_toy", { fontSize: 20 })}>AI-агент RAIN</Button>
                  <Divider orientation="vertical" flexItem />
                  <Stack direction="row" spacing={1.5} alignItems="center">
                    <Avatar sx={{ backgroundColor: "#d1d5db", color: "#374151", width: 34, height: 34 }}>ММ</Avatar>
                    <Typography sx={{ fontWeight: 600, fontSize: 14.5 }}>Матаков Мираслав Полад Оглы</Typography>
                  </Stack>
                </Toolbar>
              </AppBar>
              <Box sx={{ px: { xs: 2, md: 3.5 }, py: 2.5 }}>{children}</Box>
            </Box>

            <Drawer
              anchor="right"
              open
              variant="persistent"
              PaperProps={{
                sx: {
                  width: DRAWER_WIDTH,
                  borderLeft: "1px solid #dfe3eb",
                  backgroundColor: "#ffffff",
                },
              }}
            >
              {drawer}
            </Drawer>
          </Box>
        );
      }

      function App() {
        const [variantId, setVariantId] = React.useState("restored");
        const variant = variants[variantId];

        return (
          <ThemeProvider theme={theme}>
            <CssBaseline />
            <Shell
              drawer={
                <Stack sx={{ height: "100%" }}>
                  <Box sx={{ px: 2, py: 1.5, borderBottom: "1px solid #e5e7eb" }}>
                    <Stack direction="row" justifyContent="space-between" spacing={2}>
                      <Box>
                        <Stack direction="row" spacing={1} alignItems="center">
                          {icon("smart_toy", { fontSize: 24, color: "#2c4f7c" })}
                          <Typography variant="h6">AI-агент RAIN</Typography>
                        </Stack>
                        <Stack direction="row" spacing={0.8} sx={{ mt: 0.9 }}>
                          <Chip
                            label={variant.status === "error" ? "Ошибка" : "Онлайн"}
                            color={variant.status === "error" ? "error" : "success"}
                            size="small"
                          />
                          <Chip label="Перезапустить сессию" variant="outlined" size="small" />
                        </Stack>
                      </Box>
                      <IconButton>{icon("close", { color: "#6b7280" })}</IconButton>
                    </Stack>
                    {variant.showDetails ? (
                      <Paper
                        variant="outlined"
                        sx={{
                          mt: 1.25, p: 1.25, borderRadius: 2.5,
                          backgroundColor: "#fff4f4", borderColor: "#f0b7b7",
                        }}
                      >
                        <Typography sx={{ fontWeight: 700, fontSize: 13.5 }}>Ошибка подключения к агенту</Typography>
                        <Typography color="text.secondary" sx={{ mt: 0.6, fontSize: 12.5, lineHeight: 1.35 }}>
                          Во время работы агента произошла ошибка. Рекомендация: перезапустите сессию и повторите отправку.
                        </Typography>
                      </Paper>
                    ) : null}
                  </Box>

                  {variant.loading ? <LinearProgress /> : null}

                  <Box sx={{ px: 2, py: 1.5, flex: 1, overflowY: "auto" }}>
                    <Stack spacing={1}>
                      {variant.messages.map((message, index) => <Message key={index} {...message} />)}
                    </Stack>
                  </Box>

                  <Divider />
                  <Box sx={{ p: 2 }}>
                    <Stack spacing={1.25}>
                      <TextField
                        size="small"
                        multiline
                        rows={5}
                        fullWidth
                        disabled={variant.inputDisabled}
                        defaultValue={variantId === "restored" ? "Покажи текст последнего ответа в виде Markdown." : ""}
                        inputProps={{ style: { overflowY: "auto" } }}
                        placeholder="Введите сообщение агенту."
                      />
                      <Stack direction="row" spacing={1.25}>
                        <Button variant="contained" color="primary" disabled>Сформировать БТ</Button>
                        <Button variant="contained" disabled={variant.inputDisabled}>Отправить</Button>
                      </Stack>
                    </Stack>
                  </Box>
                </Stack>
              }
            >
              <Stack spacing={2.5}>
                <Stack direction={{ xs: "column", lg: "row" }} justifyContent="space-between" spacing={2}>
                  <Box>
                    <Typography variant="h5">Dialog Session Delivery Prototype</Typography>
                    <Typography color="text.secondary" sx={{ mt: 0.5 }}>
                      Схема для фронтенда: восстановление истории, локальная блокировка controls и status chip в шапке панели.
                    </Typography>
                  </Box>
                  <Stack direction="row" spacing={1} useFlexGap flexWrap="wrap">
                    {Object.entries(variants).map(([id, item]) => (
                      <Button
                        key={id}
                        variant={id === variantId ? "contained" : "outlined"}
                        onClick={() => setVariantId(id)}
                      >
                        {item.label}
                      </Button>
                    ))}
                  </Stack>
                </Stack>

                <Grid container spacing={2.5}>
                  <Grid item xs={12} xl={8}>
                    <Paper sx={{ p: 2.25, borderRadius: 4 }}>
                      <Typography sx={{ fontWeight: 700, fontSize: 15 }}>Что важно для реализации панели</Typography>
                      <Stack spacing={1} sx={{ mt: 1.3 }}>
                        <Typography sx={{ fontSize: 13.5 }}>
                          1. После open / restore чат рендерится сразу под шапкой. Между ними нет информационных карточек.
                        </Typography>
                        <Typography sx={{ fontSize: 13.5 }}>
                          2. Поле ввода фиксировано на 5 строк и получает внутренний вертикальный scroll при переполнении.
                        </Typography>
                        <Typography sx={{ fontSize: 13.5 }}>
                          3. Во время <code>POST /dialog/{"{session_id}"}/message</code> блокируются только textarea и кнопка `Отправить`.
                        </Typography>
                        <Typography sx={{ fontSize: 13.5 }}>
                          4. Ошибка отображается через status chip и раскладывающийся details block, а не отдельной модалкой.
                        </Typography>
                      </Stack>
                    </Paper>
                  </Grid>

                  <Grid item xs={12} xl={4}>
                    <Stack spacing={2}>
                      <Paper sx={{ p: 2, borderRadius: 4, backgroundColor: "#eef6ff" }}>
                        <Typography sx={{ fontWeight: 700 }}>Payload отправки сообщения</Typography>
                        <Box
                          component="pre"
                          sx={{
                            mt: 1,
                            mb: 0,
                            p: 1.25,
                            fontSize: 12,
                            borderRadius: 2,
                            backgroundColor: "#0f172a",
                            color: "#e2e8f0",
                            overflowX: "auto",
                          }}
                        >
{`POST /dialog/{session_id}/message
{
  "user_prompt": "...",
  "user_full_name": "Матаков Мираслав Полад Оглы",
  "dialog_started_at": "27.04.2026 12:06:14"
}`}
                        </Box>
                      </Paper>
                      <Alert severity="info">
                        Основной экран симуляций в этом slice остаётся интерактивным во всех состояниях панели.
                      </Alert>
                    </Stack>
                  </Grid>
                </Grid>
              </Stack>
            </Shell>
          </ThemeProvider>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
