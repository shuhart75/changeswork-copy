            if (criticality === 'high') {
                return { bgcolor: '#ffebee', color: '#c62828' };
            }
            if (criticality === 'low') {
                return { bgcolor: '#e8f5e9', color: '#2e7d32' };
            }
            return { bgcolor: '#f5f5f5', color: '#616161' };
        };

        const getCriticalityLabel = (criticality) => {
            const labels = {
                high: 'высокая',
                low: 'низкая',
            };

        };

            const label = criticality
                ? `${prefixWithSeparator}${getCriticalityLabel(criticality)}`
                : `${prefixWithSeparator}не рассчитана`;

                    size={size}

                const defaultFinancial = financialMetrics.reduce((acc, m) => ({ ...acc, [m.id]: { enabled: false, unit: '%', baseline: '=', target: '0.00' } }), {});

                    // Merge incoming effects with defaults to ensure all metrics exist
                    return { ...defaultFinancial, ...effects.financial };
                }
                return defaultFinancial;

                effects?.additionalMetrics || []
            );

                effects?.strategyIndicators || {}
            );

            const calculateCriticality = (indicators) => {
                if (!indicators) return 'low';
                return Object.values(indicators).some(value => value === true) ? 'high' : 'low';
            };

            useEffect(() => {
                setEffects({
                    financial: financialEffects,
                    additionalMetrics: selectedAdditionalMetrics,
                    strategyIndicators,
                    criticality: calculateCriticality(strategyIndicators)
                });
            }, [financialEffects, selectedAdditionalMetrics, strategyIndicators]);

                setSelectedAdditionalMetrics([
                    ...selectedAdditionalMetrics,
                    { metricId: '', unit: '%', baseline: '=', target: '0.00' }

                setSelectedAdditionalMetrics(updated);

                                    <Grid item xs={12} md={3}>

                        {selectedAdditionalMetrics.length === 0 && (

        // Sidebar Component
        function Sidebar() {
            return (
                <Box className="sidebar">

                    <Box className="sidebar-menu">

        // Main App Component
        function App() {
            const [scorecards, setScorecards] = useState([]);

            const addScorecard = () => {
                const newScorecard = {
                    id: Date.now(),
                    creationMode: 'manual',
                    sourceSimulationId: null,
                    existingScorecardId: null,
                    name: '',
                    criticality: 'low',
                    isAllSubproducts: false,
                    subproducts: [],
                    showEffects: false,
                    showUsage: false,
                    linkedPilots: [],
                    linkedDeployments: [],
                    effects: {
                        financial: {},
                        additionalMetrics: [],
                        strategyIndicators: {},
                        criticality: 'low'
                    }
                };
                setScorecards([...scorecards, newScorecard]);
            };

            const removeScorecard = (id) => {
                setScorecards(scorecards.filter(sc => sc.id !== id));
            };

            const updateScorecard = (id, field, value) => {
                setScorecards(scorecards.map(sc =>
                    sc.id === id ? { ...sc, [field]: value } : sc
                ));
            };

            const handleCreationModeChange = (id, mode) => {
                setScorecards(scorecards.map(sc =>
                    sc.id === id
                        ? {
                            ...sc,
                            creationMode: mode,
                            sourceSimulationId: mode === 'from_simulation' ? sc.sourceSimulationId : null,
                            existingScorecardId: mode === 'existing' ? sc.existingScorecardId : null
                        }
                        : sc
                ));
            };

            const handleSourceSimulationChange = (id, simulationId) => {
                setScorecards(scorecards.map(sc =>
                    sc.id === id ? { ...sc, sourceSimulationId: simulationId } : sc
                ));
            };

            const handleExistingScorecardChange = (id, scorecardId) => {
                const existingScorecard = availableScorecards.find(s => s.id === parseInt(scorecardId));
                setScorecards(scorecards.map(sc =>
                    sc.id === id
                        ? {
                            ...sc,
                            existingScorecardId: scorecardId,
                            name: existingScorecard ? existingScorecard.name : sc.name
                        }
                        : sc
                ));
            };

            const addLinkedEntity = (scorecardId, entityType, entityId) => {
                setScorecards(scorecards.map(sc => {
                    if (sc.id !== scorecardId) return sc;

                    if (entityType === 'pilot') {
                        if (sc.linkedPilots.includes(entityId)) return sc;
                        return { ...sc, linkedPilots: [...sc.linkedPilots, entityId] };
                    } else {
                        if (sc.linkedDeployments.includes(entityId)) return sc;
                        return { ...sc, linkedDeployments: [...sc.linkedDeployments, entityId] };
                    }
                }));
            };

            const removeLinkedEntity = (scorecardId, entityType, entityId) => {
                setScorecards(scorecards.map(sc => {
                    if (sc.id !== scorecardId) return sc;

                    if (entityType === 'pilot') {
                        return { ...sc, linkedPilots: sc.linkedPilots.filter(id => id !== entityId) };
                    } else {
                        return { ...sc, linkedDeployments: sc.linkedDeployments.filter(id => id !== entityId) };
                    }
                }));
            };

            return (
                <ThemeProvider theme={theme}>
                    <Sidebar />
                    <Box className="main-content">
                        <Box className="top-bar">
                            <Typography variant="h6">Создание скоркарты</Typography>
                        </Box>
                        <Box className="content-wrapper">
                            <Container maxWidth="lg">
                                <Paper sx={{ p: 3, mb: 2 }}>
                                    <Box sx={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', mb: 2 }}>
                                        <Typography variant="h6" sx={{ fontWeight: 500 }}>
                                            Критичность и целевые метрики {scorecards.length === 0 && <Chip label="Обязательно" color="error" size="small" sx={{ ml: 1 }} />}
                                        </Typography>
                                        <Button
                                            variant="outlined"
                                            size="small"
                                            startIcon={<span className="material-icons">add</span>}
                                            onClick={addScorecard}
                                        >
                                            Добавить скоркарту
                                        </Button>
                                    </Box>

                                    {scorecards.length === 0 ? (
                                        <Paper variant="outlined" sx={{ p: 3, textAlign: 'center', border: '1px dashed #bdbdbd' }}>
                                            <Typography color="text.secondary" variant="body2">
                                                Добавьте хотя бы одну скоркарту для пилота
                                            </Typography>
                                        </Paper>
                                    ) : (
                                        <Stack spacing={2}>
                                            {scorecards.map((scorecard, index) => (
                                                <Paper key={scorecard.id} variant="outlined" sx={{ p: 2, bgcolor: '#fafafa' }}>
                                                    <Box sx={{ display: 'flex', gap: 2, alignItems: 'flex-start' }}>
                                                        <Box sx={{ flex: 1 }}>
                                                            <Box sx={{ display: 'flex', alignItems: 'center', gap: 1, mb: 1 }}>
                                                                <Typography variant="subtitle2" color="text.secondary">
                                                                    Скоркарта #{index + 1}
                                                                </Typography>
                                                                <CriticalityChip
                                                                    criticality={scorecard.effects?.criticality || scorecard.criticality || 'low'}
                                                                    size="small"
                                                                    prefix=""
                                                                />
                                                                <Tooltip title="Рассчитывается автоматически на основе индикаторов риска" arrow>
                                                                    <IconButton size="small" sx={{ p: 0.5 }}>
                                                                        <span className="material-icons" style={{ fontSize: 16, color: '#666' }}>info</span>
                                                                    </IconButton>
                                                                </Tooltip>
                                                            </Box>
                                                            <Grid container spacing={2}>
                                                                <Grid item xs={12}>
                                                                    <FormControl component="fieldset">
                                                                        <FormLabel component="legend" sx={{ fontSize: '0.875rem', mb: 1 }}>
                                                                            Способ создания
                                                                        </FormLabel>
                                                                        <RadioGroup
                                                                            row
                                                                            value={scorecard.creationMode}
                                                                            onChange={(e) => handleCreationModeChange(scorecard.id, e.target.value)}
                                                                        >
                                                                            <FormControlLabel
                                                                                value="manual"
                                                                                control={<Radio size="small" />}
                                                                                label="Создать вручную"
                                                                            />
                                                                            <FormControlLabel
                                                                                value="from_simulation"
                                                                                control={<Radio size="small" />}
                                                                                label="На основе симуляции"
                                                                            />
                                                                            <FormControlLabel
                                                                                value="existing"
                                                                                control={<Radio size="small" />}
                                                                                label="Использовать существующую"
                                                                            />
                                                                        </RadioGroup>
                                                                    </FormControl>
                                                                </Grid>
                                                                {scorecard.creationMode === 'from_simulation' && (
                                                                    <Grid item xs={12}>
                                                                        <Autocomplete
                                                                            size="small"
                                                                            options={mockSimulations}
                                                                            value={mockSimulations.find(s => s.id === scorecard.sourceSimulationId) || null}
                                                                            onChange={(event, newValue) => {
                                                                                handleSourceSimulationChange(scorecard.id, newValue ? newValue.id : null);
                                                                            }}
                                                                            getOptionLabel={(option) => `SIM-${option.id}: ${option.name}`}
                                                                            renderInput={(params) => (
                                                                                <TextField {...params} label="Выберите симуляцию" />
                                                                            )}
                                                                            renderOption={(props, option) => (
                                                                                <li {...props} key={option.id}>
                                                                                    <Box>
                                                                                        <Typography variant="body2">
                                                                                            <strong>SIM-{option.id}</strong>: {option.name}
                                                                                        </Typography>
                                                                                    </Box>
                                                                                </li>
                                                                            )}
                                                                            filterOptions={(options, { inputValue }) => {
                                                                                const searchTerm = inputValue.toLowerCase();
                                                                                return options.filter(option =>
                                                                                    option.name.toLowerCase().includes(searchTerm) ||
                                                                                    option.id.toString().includes(searchTerm)
                                                                                );
                                                                            }}
                                                                            isOptionEqualToValue={(option, value) => option.id === value.id}
                                                                        />
                                                                    </Grid>
                                                                )}
                                                                {scorecard.creationMode === 'existing' && (
                                                                    <Grid item xs={12}>
                                                                        <Autocomplete
                                                                            size="small"
                                                                            options={availableScorecards}
                                                                            value={availableScorecards.find(s => s.id === parseInt(scorecard.existingScorecardId)) || null}
                                                                            onChange={(event, newValue) => {
                                                                                handleExistingScorecardChange(scorecard.id, newValue ? newValue.id : null);
                                                                            }}
                                                                            getOptionLabel={(option) => `SC-${option.id}: ${option.name}`}
                                                                            renderInput={(params) => (
                                                                                <TextField {...params} label="Выберите существующую скоркарту" />
                                                                            )}
                                                                            renderOption={(props, option) => (
                                                                                <li {...props} key={option.id}>
                                                                                    <Box>
                                                                                        <Typography variant="body2">
                                                                                            <strong>SC-{option.id}</strong>: {option.name}
                                                                                        </Typography>
                                                                                    </Box>
                                                                                </li>
                                                                            )}
                                                                            filterOptions={(options, { inputValue }) => {
                                                                                const searchTerm = inputValue.toLowerCase();
                                                                                return options.filter(option =>
                                                                                    option.name.toLowerCase().includes(searchTerm) ||
                                                                                    option.id.toString().includes(searchTerm)
                                                                                );
                                                                            }}
                                                                            isOptionEqualToValue={(option, value) => option.id === value.id}
                                                                        />
                                                                    </Grid>
                                                                )}
                                                                <Grid item xs={12}>
                                                                    <TextField
                                                                        fullWidth
                                                                        size="small"
                                                                        label="Название скоркарты"
                                                                        value={scorecard.name}
                                                                        onChange={(e) => updateScorecard(scorecard.id, 'name', e.target.value)}
                                                                        disabled={scorecard.creationMode === 'existing' && !!scorecard.existingScorecardId}
                                                                    />
                                                                </Grid>
                                                                <Grid item xs={12}>
                                                                    <Button
                                                                        variant="outlined"
                                                                        size="small"
                                                                        startIcon={<span className="material-icons">{scorecard.showEffects ? 'expand_less' : 'expand_more'}</span>}
                                                                        onClick={() => updateScorecard(scorecard.id, 'showEffects', !scorecard.showEffects)}
                                                                    >
                                                                        {scorecard.showEffects ? 'Скрыть' : 'Настроить'} Эффекты и метрики
                                                                    </Button>
                                                                </Grid>
                                                            </Grid>
                                                        </Box>
                                                        <IconButton
                                                            size="small"
                                                            color="error"
                                                            onClick={() => removeScorecard(scorecard.id)}
                                                        >
                                                            <span className="material-icons">delete</span>
                                                        </IconButton>
                                                    </Box>
                                                    {scorecard.showEffects && (
                                                        <Box sx={{ mt: 2, pt: 2, borderTop: '1px solid #e0e0e0' }}>
                                                            <ScorecardForm
                                                                effects={scorecard.effects}
                                                                setEffects={(effects) => {
                                                                    updateScorecard(scorecard.id, 'effects', effects);
                                                                    if (effects.criticality) {
                                                                        updateScorecard(scorecard.id, 'criticality', effects.criticality);
                                                                    }
                                                                }}
                                                            />
                                                        </Box>
                                                    )}
                                                </Paper>
                                            ))}
                                        </Stack>
                                    )}
                                </Paper>
                            </Container>
                        </Box>
                    </Box>
                </ThemeProvider>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
