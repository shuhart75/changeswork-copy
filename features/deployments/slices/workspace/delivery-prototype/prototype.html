        // Утилиты
        const getScorecardById = (scorecardId) =>
            mockScorecards.find(scorecard => scorecard.id === scorecardId);

        const getScorecardsForEntity = (entity) =>
            (entity.scorecards || []).map(getScorecardById).filter(Boolean);

        const getEntityCriticality = (entity) => {
            const scorecards = getScorecardsForEntity(entity);
            if (scorecards.length === 0) return null;
            return scorecards.some(scorecard => scorecard.criticality === 'high') ? 'high' : 'low';
        };

        const hasSharedScorecard = (pilot, change) => {
            const pilotScorecards = pilot.scorecards || [];
            const changeScorecards = change.scorecards || [];
            return pilotScorecards.some(scorecardId => changeScorecards.includes(scorecardId));
        };

        const getRelatedPilotsForChange = (change, pilots = mockPilots) =>
            pilots.filter(pilot => hasSharedScorecard(pilot, change));

        const getSimulationById = (simulationId) =>
            mockSimulations.find(sim => sim.id === simulationId);

        const getResultScorecardsForSimulation = (simulationId) => {
            const simulation = getSimulationById(simulationId);
            if (!simulation || !simulation.resultScorecards) return [];
            return simulation.resultScorecards.map(getScorecardById).filter(Boolean);
        };

            if (change.simulationIds && change.simulationIds.length > 0) {
                return { type: 'simulation', simulationId: change.simulationIds[0] };

            return { type: 'general' };

        // Компонент: Управление артефактами (режим редактирования)

                { value: 'business_case', label: 'Бизнес-кейс' },
                { value: 'rov', label: 'ROV' },
                { value: 'other', label: 'Другое' }

                if (!newArtifact.name || !newArtifact.url) {
                    alert('Заполните название и ссылку на артефакт');
                    return;
                }
                onChange([...artifacts, { ...newArtifact, id: Date.now() }]);
                setNewArtifact({ name: '', type: 'business_case', url: '' });
            };

            const handleRemoveArtifact = (index) => {
                onChange(artifacts.filter((_, i) => i !== index));
            };

                <Box>

                { id: 'ar', label: 'AR(абс)' },
                { id: 'volume', label: 'Объём выдач' },
                { id: 'rc', label: 'RC' },
                { id: 'npv', label: 'NPV' }

                { id: 'avg_check', label: 'Средний чек' },
            ];

                const defaultFinancial = financialMetrics.reduce((acc, m) => ({ ...acc, [m.id]: { enabled: false, unit: '%', baseline: '=', target: '0.00' } }), {});
                if (effects?.financial && Object.keys(effects.financial).length > 0) {
                    return { ...defaultFinancial, ...effects.financial };
                }
                return defaultFinancial;
            });

            const [selectedAdditionalMetrics, setSelectedAdditionalMetrics] = useState(

            const getStatusColor = (status) => {
                switch (status) {
                    case 'completed': return '#4caf50';
                    case 'current': return '#2196f3';
                    case 'pending': return '#bdbdbd';
                    default: return '#bdbdbd';
                }
            };

            const getStatusBg = (status) => {
                switch (status) {
                    case 'approved': return '#e8f5e9';
                    case 'pending': return '#fff3e0';
                    case 'rejected': return '#ffebee';
                    default: return '#f5f5f5';
                }
            };

            const getStatusTextColor = (status) => {
                switch (status) {
                    case 'approved': return '#2e7d32';
                    case 'pending': return '#f57c00';
                    case 'rejected': return '#c62828';
                    default: return '#666';
                }
            };

            const getStatusLabel = (status) => {
                switch (status) {
                    case 'approved': return 'Согласовано';
                    case 'pending': return 'Ожидает';
                    case 'rejected': return 'Отклонено';
                    default: return status;

                    const resultScorecards = getResultScorecardsForSimulation(editableSimulationId);

                            // Находим существующую скоркарту из симуляции

                                        <Typography variant="subtitle2" color="text.secondary" gutterBottom>
                                            Тип
                                        </Typography>
                                        <ChangeTypeChip change={change} />
                                    </Paper>
                                </Grid>
                                <Grid item xs={12} md={4}>
                                    <Paper variant="outlined" sx={{ p: 2 }}>
                                        <Typography variant="subtitle2" color="text.secondary" gutterBottom>
                                            Автор
                                        </Typography>
                                        <Typography variant="body2">{change.createdBy}</Typography>
                                    </Paper>
                                </Grid>
                                <Grid item xs={12} md={4}>
                                    <Paper variant="outlined" sx={{ p: 2 }}>
                                        <Typography variant="subtitle2" color="text.secondary" gutterBottom>
                                            Дата создания
                                        </Typography>
                                        <Typography variant="body2">{change.createdAt}</Typography>
                                    </Paper>
                                </Grid>
                                <Grid item xs={12} md={4}>
                                    <Paper variant="outlined" sx={{ p: 2 }}>
                                        <Typography variant="subtitle2" color="text.secondary" gutterBottom>
                                            Дата внедрения
                                        </Typography>
                                        <Typography variant="body2">{change.deployedAt || '—'}</Typography>
                                    </Paper>
                                </Grid>
                            </Grid>
                        )}

                        {/* Внедрение по результатам симуляции */}
                        <Paper sx={{ p: 2, mb: 3, mt: 3 }}>
                            <ChangeSimulationBanner
                                change={isEditMode ? {
                                    ...change,
                                    simulationIds: editableChangeType === 'simulation' && editableSimulationId ? [editableSimulationId] : []
                                } : change}
                                onSelectSimulation={(sim) => {
                                    console.log('Navigate to simulation:', sim);
                                }}
                            />
                        </Paper>

                        {/* Связанные скоркарты */}
                        {!isEditMode && (
                            <Grid container spacing={3}>
                                <Grid item xs={12}>
                                    <Paper variant="outlined" sx={{ p: 2 }}>
                                        <Typography variant="subtitle2" color="text.secondary" gutterBottom>
                                            Связанные скоркарты
                                        </Typography>
                                        <ScorecardLinks entity={change} maxItems={8} onSelectScorecard={onSelectScorecard} />
                                    </Paper>
                                </Grid>
                            </Grid>
                        )}

                        <Stack direction="row" spacing={2} sx={{ mt: 3 }}>
                            {!isEditMode ? (
                                <>
                                    <Button
                                        variant="outlined"
                                        startIcon={<span className="material-icons">edit</span>}
                                        onClick={handleEdit}
                                    >
                                        Редактировать
                                    </Button>
                                    {change.status === 'approved' && (
                                        <Button variant="contained" color="success" startIcon={<span className="material-icons">rocket_launch</span>}>
                                            Внедрить
                                        </Button>
                                    )}
                                </>
                            ) : (
                                <>
                                    <Button
                                        variant="contained"
                                        onClick={handleSave}
                                    >
                                        Сохранить
                                    </Button>
                                    <Button
                                        variant="outlined"
                                        onClick={handleCancel}
                                    >
                                        Отменить
                                    </Button>
                                </>
                            )}
                        </Stack>

                    {/* Скоркарты - в режиме редактирования показываем формы */}
                    {isEditMode && (
                        <Box sx={{ mb: 3 }}>
                            <Paper sx={{ p: 3, mb: 2 }}>
                                <Box sx={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', mb: 2 }}>
                                    <Typography variant="h6" sx={{ fontWeight: 500 }}>
                                        Критичность и целевые метрики
                                    </Typography>
                                    <Button
                                        variant="outlined"
                                        size="small"
                                        startIcon={<span className="material-icons">add</span>}
                                        onClick={handleAddScorecard}
                                    >
                                        Добавить скоркарту
                                    </Button>
                                </Box>

                                {editableScorecards.length === 0 ? (
                                    <Paper variant="outlined" sx={{ p: 3, textAlign: 'center', border: '1px dashed #bdbdbd' }}>
                                        <Typography color="text.secondary" variant="body2">
                                            Добавьте хотя бы одну скоркарту для внедрения
                                        </Typography>
                                    </Paper>
                                ) : (
                                    <Stack spacing={2}>
                                        {editableScorecards.map((scorecard, index) => (
                                            <Paper
                                                key={scorecard.id}
                                                variant="outlined"
                                                sx={{
                                                    p: 2,
                                                    bgcolor: '#fafafa',
                                                    border: scorecard.isFromSimulation ? '2px solid #2c4f7c' : '1px solid #e0e0e0',
                                                    position: 'relative'
                                                }}
                                            >
                                                {/* Пометка для скоркарты из симуляции */}
                                                {scorecard.isFromSimulation && (
                                                    <Box
                                                        sx={{
                                                            position: 'absolute',
                                                            top: 0,
                                                            right: 0,
                                                            bgcolor: '#2c4f7c',
                                                            color: '#fff',
                                                            px: 1.5,
                                                            py: 0.5,
                                                            fontSize: '0.75rem',
                                                            fontWeight: 600,
                                                            borderBottomLeftRadius: 4,
                                                            display: 'flex',
                                                            alignItems: 'center',
                                                            gap: 0.5
                                                        }}
                                                    >
                                                        <span className="material-icons" style={{ fontSize: 14 }}>lock</span>
                                                        Из симуляции
                                                    </Box>
                                                )}
                                                <Box sx={{ display: 'flex', gap: 2, alignItems: 'flex-start', mt: scorecard.isFromSimulation ? 2 : 0 }}>
                                                    <Box sx={{ flex: 1 }}>
                                                        <Box sx={{ display: 'flex', alignItems: 'center', gap: 1, mb: 1 }}>
                                                            <Typography variant="subtitle2" color="text.secondary">
                                                                Скоркарта #{index + 1}
                                                            </Typography>
                                                            <Chip
                                                                label="низкая"
                                                                size="small"
                                                                sx={{
                                                                    bgcolor: '#e8f5e9',
                                                                    color: '#2e7d32',
                                                                    fontWeight: 500
                                                                }}
                                                            />
                                                            <Tooltip title="Рассчитывается автоматически на основе индикаторов риска" arrow>
                                                                <IconButton size="small" sx={{ p: 0.5 }}>
                                                                    <span className="material-icons" style={{ fontSize: 16, color: '#666' }}>info</span>
                                                                </IconButton>
                                                            </Tooltip>
                                                        </Box>
                                                        <Grid container spacing={2}>
                                                            <Grid item xs={12}>
                                                                <FormControl component="fieldset">
                                                                    <FormLabel component="legend" sx={{ fontSize: '0.875rem', mb: 1 }}>
                                                                        Способ создания
                                                                    </FormLabel>
                                                                    <RadioGroup
                                                                        row
                                                                        value={scorecard.creationMode}
                                                                        onChange={(e) => handleCreationModeChange(index, e.target.value)}
                                                                        disabled={scorecard.isFromSimulation}
                                                                    >
                                                                        <FormControlLabel
                                                                            value="manual"
                                                                            control={<Radio size="small" />}
                                                                            label="Создать вручную"
                                                                        />
                                                                        <FormControlLabel
                                                                            value="from_simulation"
                                                                            control={<Radio size="small" />}
                                                                            label="На основе симуляции"
                                                                        />
                                                                        <FormControlLabel
                                                                            value="existing"
                                                                            control={<Radio size="small" />}
                                                                            label="Использовать существующую"
                                                                        />
                                                                    </RadioGroup>
                                                                </FormControl>
                                                            </Grid>
                                                            {scorecard.creationMode === 'from_simulation' && (
                                                                <Grid item xs={12}>
                                                                    <Autocomplete
                                                                        size="small"
                                                                        options={mockSimulations}
                                                                        value={mockSimulations.find(s => s.id === scorecard.sourceSimulationId) || null}
                                                                        onChange={(event, newValue) => {
                                                                            handleScorecardFieldChange(index, 'sourceSimulationId', newValue ? newValue.id : null);
                                                                        }}
                                                                        getOptionLabel={(option) => `SIM-${option.id}: ${option.name}`}
                                                                        renderInput={(params) => (
                                                                            <TextField {...params} label="Выберите симуляцию" />
                                                                        )}
                                                                        isOptionEqualToValue={(option, value) => option.id === value.id}
                                                                        disabled={scorecard.isFromSimulation}
                                                                    />
                                                                </Grid>
                                                            )}
                                                            {scorecard.creationMode === 'existing' && (
                                                                <Grid item xs={12}>
                                                                    <Autocomplete
                                                                        size="small"
                                                                        options={mockScorecards}
                                                                        value={mockScorecards.find(s => s.id === scorecard.existingScorecardId) || null}
                                                                        onChange={(event, newValue) => {
                                                                            handleScorecardFieldChange(index, 'existingScorecardId', newValue ? newValue.id : null);
                                                                            if (newValue) {
                                                                                handleScorecardFieldChange(index, 'name', newValue.name);
                                                                            }
                                                                        }}
                                                                        getOptionLabel={(option) => `SC-${option.id}: ${option.name}`}
                                                                        renderInput={(params) => (
                                                                            <TextField {...params} label="Выберите существующую скоркарту" />
                                                                        )}
                                                                        isOptionEqualToValue={(option, value) => option.id === value.id}
                                                                    />
                                                                </Grid>
                                                            )}
                                                            <Grid item xs={12}>
                                                                <TextField
                                                                    fullWidth
                                                                    size="small"
                                                                    label="Название скоркарты"
                                                                    value={scorecard.name}
                                                                    onChange={(e) => handleScorecardFieldChange(index, 'name', e.target.value)}
                                                                    disabled={scorecard.creationMode === 'existing' && !!scorecard.existingScorecardId || scorecard.isFromSimulation}
                                                                />
                                                            </Grid>
                                                            <Grid item xs={12}>
                                                                <Button
                                                                    variant="outlined"
                                                                    size="small"
                                                                    startIcon={<span className="material-icons">{scorecard.showEffects ? 'expand_less' : 'expand_more'}</span>}
                                                                    onClick={() => handleScorecardFieldChange(index, 'showEffects', !scorecard.showEffects)}
                                                                >
                                                                    {scorecard.showEffects ? 'Скрыть' : 'Настроить'} Эффекты и метрики
                                                                </Button>
                                                            </Grid>
                                                        </Grid>
                                                    </Box>
                                                    {!scorecard.isFromSimulation && (
                                                        <IconButton
                                                            size="small"
                                                            color="error"
                                                            onClick={() => handleRemoveScorecard(index)}
                                                        >
                                                            <span className="material-icons">delete</span>
                                                        </IconButton>
                                                    )}
                                                </Box>
                                                {scorecard.showEffects && (
                                                    <Box sx={{ mt: 2, pt: 2, borderTop: '1px solid #e0e0e0' }}>
                                                        <ScorecardForm
                                                            effects={scorecard.effects}
                                                            setEffects={(effects) => handleScorecardEffectsChange(index, effects)}
                                                        />
                                                    </Box>
                                                )}
                                            </Paper>
                                        ))}
                                    </Stack>
                                )}
                            </Paper>
                        </Box>
                    )}

                    {/* Связанные сущности - скрываем в режиме редактирования */}
                    {!isEditMode && (
                        <Paper sx={{ p: 3, mb: 3 }}>
                            <Typography variant="h6" gutterBottom>Связанные сущности</Typography>

                            {relatedSimulations.length > 0 && (
                                <Box sx={{ mb: 3 }}>
                                    <Typography variant="subtitle2" color="text.secondary" gutterBottom>
                                        Симуляции ({relatedSimulations.length})
                                    </Typography>
                                    <Stack spacing={1}>
                                        {relatedSimulations.map(sim => (
                                            <Chip
                                                key={sim.id}
                                                icon={<span className="material-icons" style={{ fontSize: 16 }}>science</span>}
                                                label={`SIM-${sim.id}: ${sim.name}`}
                                                sx={{ justifyContent: 'flex-start', cursor: 'pointer' }}
                                            />
                                        ))}
                                    </Stack>
                                </Box>
                            )}

                            {relatedPilots.length > 0 && (
                                <Box>
                                    <Typography variant="subtitle2" color="text.secondary" gutterBottom>
                                        Пилоты ({relatedPilots.length})
                                    </Typography>
                                    <Stack spacing={1}>
                                        {relatedPilots.map(pilot => (
                                            <Chip
                                                key={pilot.id}
                                                icon={<span className="material-icons" style={{ fontSize: 16 }}>flight_takeoff</span>}
                                                label={`PLT-${pilot.id}: ${pilot.name}`}
                                                sx={{ justifyContent: 'flex-start', cursor: 'pointer' }}
                                            />
                                        ))}
                                    </Stack>
                                </Box>
                            )}

                            {relatedSimulations.length === 0 && relatedPilots.length === 0 && (
                                <Typography variant="body2" color="text.secondary">
                                    Нет связанных сущностей
                                </Typography>
                            )}
                        </Paper>
                    )}
                        </>
                    )}
                </Paper>

                    {/* Контент вкладки "Согласование" */}
                    {activeTab === 'approval' && (
                        <>
                        <Paper sx={{ p: 3, mb: 3 }}>
                            <Box sx={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', mb: 2 }}>
                                <Typography variant="h6" fontWeight={600}>
                                    Цепочка согласования
                                </Typography>
                            </Box>
                            <ApprovalChainDialog changeId={change.id} />
                        </Paper>

                        {/* Кнопки действий согласования */}
                        <Paper sx={{ p: 3, mb: 3 }}>
                            <Box sx={{ display: 'flex', gap: 2, justifyContent: 'flex-end' }}>
                                {change.status === 'draft' && (
                                    <Button
                                        variant="contained"
                                        color="primary"
                                        onClick={handleSendToApproval}
                                        startIcon={<span className="material-icons">send</span>}
                                    >
                                        Отправить на согласование
                                    </Button>
                                )}
                                {change.status === 'in_approval' && (
                                    <Button
                                        variant="outlined"
                                        color="error"
                                        onClick={handleWithdraw}
                                        startIcon={<span className="material-icons">undo</span>}
                                    >
                                        Отозвать
                                    </Button>
                                )}
                                {change.status === 'approved' && (
                                    <Button
                                        variant="contained"
                                        color="success"
                                        onClick={handleSendToRatification}
                                        startIcon={<span className="material-icons">verified</span>}
                                    >
                                        Отправить на утверждение
                                    </Button>
                                )}
                                {change.status === 'in_ratification' && (
                                    <Button
                                        variant="outlined"
                                        color="error"
                                        onClick={handleWithdraw}
                                        startIcon={<span className="material-icons">undo</span>}
                                    >
                                        Отозвать
                                    </Button>
                                )}
                            </Box>
                        </Paper>
                        </>
                    )}

                    {/* Контент вкладки "Артефакты" */}
                    {activeTab === 'artifacts' && (
                        <Paper sx={{ p: 3, mb: 3 }}>
                            <Box sx={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', mb: 2 }}>
                                <Typography variant="h6" fontWeight={600}>
                                    Артефакты
                                </Typography>
                                <Button
                                    variant="outlined"
                                    size="small"
                                    startIcon={<span className="material-icons">{isArtifactsEditMode ? 'check' : 'edit'}</span>}
                                    onClick={() => setIsArtifactsEditMode(!isArtifactsEditMode)}
                                >
                                    {isArtifactsEditMode ? 'Сохранить' : 'Редактировать'}
                                </Button>
                            </Box>
                            {!isArtifactsEditMode ? (
                                <ArtifactsDisplay artifacts={editableArtifacts} />
                            ) : (
                                <ArtifactsManager artifacts={editableArtifacts} onChange={setEditableArtifacts} />
                            )}
                        </Paper>
                    )}
                </Box>
            );
        }

        // Главный компонент приложения
        function App() {
            const [currentView, setCurrentView] = useState('changes');
            const [selectedChange, setSelectedChange] = useState(null);
            const [selectedScorecard, setSelectedScorecard] = useState(null);
            const [productFilter, setProductFilter] = useState('all');

            return (
                <ThemeProvider theme={theme}>
                    <Box sx={{ display: 'flex', height: '100vh', width: '100%' }}>
                        {/* Sidebar */}
                        <Box className="sidebar">
                            <Box className="sidebar-header">
                                <Typography variant="h6" sx={{ color: '#fff', fontWeight: 600 }}>
                                    Риск-стратегии MVP
                                </Typography>
                                <Typography variant="caption" sx={{ color: 'rgba(255,255,255,0.5)' }}>
                                    Архитектура на основе Внедрений
                                </Typography>
                            </Box>
                            <Box className="sidebar-menu">
                                <div
                                    className={`sidebar-item ${currentView === 'deployments' ? 'active' : ''}`}
                                    onClick={() => setCurrentView('deployments')}
                                >
                                    <span className="material-icons">folder</span>
                                    <span>Инициативы</span>
                                </div>
                                <div
                                    className={`sidebar-item ${currentView === 'simulations' ? 'active' : ''}`}
                                    onClick={() => setCurrentView('simulations')}
                                    style={{ paddingLeft: '40px', fontSize: '14px' }}
                                >
                                    <span className="material-icons" style={{ fontSize: '18px' }}>science</span>
                                    <span>Симуляции</span>
                                </div>
                                <div
                                    className={`sidebar-item ${currentView === 'pilots' ? 'active' : ''}`}
                                    onClick={() => setCurrentView('pilots')}
                                    style={{ paddingLeft: '40px', fontSize: '14px' }}
                                >
                                    <span className="material-icons" style={{ fontSize: '18px' }}>flight_takeoff</span>
                                    <span>Пилоты</span>
                                </div>
                                <div
                                    className={`sidebar-item ${currentView === 'changes' ? 'active' : ''}`}
                                    onClick={() => setCurrentView('changes')}
                                    style={{ paddingLeft: '40px', fontSize: '14px' }}
                                >
                                    <span className="material-icons" style={{ fontSize: '18px' }}>published_with_changes</span>
                                    <span>Внедрения</span>
                                </div>
                                <div
                                    className={`sidebar-item ${currentView === 'scorecards' ? 'active' : ''}`}
                                    onClick={() => setCurrentView('scorecards')}
                                >
                                    <span className="material-icons">credit_score</span>
                                    <span>Реестр</span>
                                </div>
                                <div
                                    className={`sidebar-item ${currentView === 'packages' ? 'active' : ''}`}
                                    onClick={() => setCurrentView('packages')}
                                >
                                    <span className="material-icons">inventory_2</span>
                                    <span>Отправка на согласование</span>
                                </div>
                                <div
                                    className={`sidebar-item ${currentView === 'approvals' ? 'active' : ''}`}
                                    onClick={() => setCurrentView('approvals')}
                                >
                                    <span className="material-icons">task_alt</span>
                                    <span>Согласования</span>
                                </div>
                            </Box>
                        </Box>

                        {/* Main Content */}
                        <Box className="main-content">
                            {/* Top Bar */}
                            <Box className="top-bar">
                                <Typography variant="h6">
                                    Внедрения
                                </Typography>
                            </Box>

                            {/* Content */}
                            <Box className="content-wrapper">
                                {!selectedChange && !selectedScorecard && (
                                    <ProductFilterBar
                                        productFilter={productFilter}
                                        setProductFilter={setProductFilter}
                                    />
                                )}

                                {selectedChange ? (
                                    <ChangeDetailView
                                        change={selectedChange}
                                        onBack={() => setSelectedChange(null)}
                                        onSelectScorecard={(scorecard) => {
                                            setSelectedChange(null);
                                            setSelectedScorecard(scorecard);
                                        }}
                                    />
                                ) : selectedScorecard ? (
                                    <Box sx={{ width: '100%' }}>
                                        <Paper sx={{ p: 3 }}>
                                            <Stack direction="row" alignItems="center" spacing={2} mb={2}>
                                                <IconButton onClick={() => setSelectedScorecard(null)}>
                                                    <span className="material-icons">arrow_back</span>
                                                </IconButton>
                                                <Typography variant="h5" fontWeight={600}>
                                                    Скоркарта SC-{selectedScorecard.id}
                                                </Typography>
                                            </Stack>
                                            <Typography variant="h6" gutterBottom>
                                                {selectedScorecard.name}
                                            </Typography>
                                            <Typography variant="body2" color="text.secondary">
                                                Критичность: {getCriticalityLabel(selectedScorecard.criticality)}
                                            </Typography>
                                        </Paper>
                                    </Box>
                                ) : (
                                    <ChangesView
                                        data={mockChanges}
                                        productFilter={productFilter}
                                        onSelectChange={setSelectedChange}
                                    />
                                )}
                            </Box>
                        </Box>
                    </Box>
                </ThemeProvider>
            );
        }

        // Рендер приложения
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
